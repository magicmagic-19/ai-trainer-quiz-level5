<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>导入刷题记录</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f8fafc;color:#0f172a}
    main{max-width:760px;margin:40px auto;padding:24px}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    h1{font-size:24px;margin:0 0 12px}
    p{line-height:1.7;color:#475569}
    button,a.btn{display:inline-flex;align-items:center;justify-content:center;margin:8px 8px 0 0;padding:10px 14px;border-radius:6px;border:1px solid #2563eb;background:#2563eb;color:#fff;text-decoration:none;font-size:15px;cursor:pointer}
    button.secondary{background:#fff;color:#2563eb}
    button:disabled{opacity:.45;cursor:not-allowed}
    .ok{color:#047857}.bad{color:#b91c1c}.muted{color:#64748b}
    textarea{width:100%;min-height:120px;margin-top:10px;border:1px solid #cbd5e1;border-radius:6px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;resize:vertical}
    .summary{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;margin:10px 0;display:none}
    .summary h3{margin:0 0 6px;font-size:15px;color:#047857}
    .summary ul{margin:4px 0;padding-left:18px;font-size:14px;color:#334155}
  </style>
</head>
<body>
  <main>
    <div class="box">
      <h1>导入刷题记录</h1>
      <p>从迁移页复制了记录后，粘贴到下方框中。</p>
      <textarea id="raw" placeholder="把迁移页复制的记录粘贴到这里..."></textarea>
      <div id="summary" class="summary"></div>
      <button id="parseBtn" onclick="parseData()">📋 读取粘贴的记录</button>
      <button id="importBtn" style="display:none" onclick="doImport()">合并导入</button>
      <button id="pasteBtn" class="secondary" onclick="pasteFromClipboard()">📎 从剪贴板粘贴</button>
      <p><a href="/" class="btn secondary" style="margin-top:12px">打开刷题页</a></p>
    </div>
  </main>
  <script>
    let importData = null;
    const rawEl = document.getElementById('raw');
    const summaryEl = document.getElementById('summary');
    const importBtn = document.getElementById('importBtn');

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        rawEl.value = text;
        parseData();
      } catch(e) {
        alert('无法访问剪贴板，请手动粘贴到上方框中。');
      }
    }

    function parseData() {
      const raw = rawEl.value.trim();
      if (!raw) return alert('请先粘贴记录数据。');
      try {
        const data = JSON.parse(raw);
        if (!data.h && !data.w && !data.b && !data.n) {
          alert('粘贴的内容不像有效的刷题记录，请确认从迁移页复制了正确的内容。');
          return;
        }
        importData = data;
        const h = Array.isArray(data.h) ? data.h.length : 0;
        const w = Array.isArray(data.w) ? data.w.length : 0;
        const b = Array.isArray(data.b) ? data.b.length : 0;
        const n = data.n && typeof data.n === 'object' ? Object.keys(data.n).length : 0;
        summaryEl.innerHTML = `<h3>📦 待导入的旧记录</h3><ul><li>答题记录：${h} 条</li><li>错题：${w} 道</li><li>收藏：${b} 道</li><li>笔记：${n} 条</li></ul>`;
        summaryEl.style.display = 'block';
        importBtn.style.display = 'inline-flex';
      } catch(e) {
        alert('数据格式错误：' + e.message);
      }
    }

    function doImport() {
      if (!importData) return;
      const current = JSON.parse(localStorage.getItem('qz') || '{}');
      const merged = {
        h: [...new Set([...(importData.h||[]), ...(current.h||[])])],
        w: [...new Set([...(importData.w||[]), ...(current.w||[])])],
        b: [...new Set([...(importData.b||[]), ...(current.b||[])])],
        n: {...(importData.n||{}), ...(current.n||{})},
        i: importData.i || current.i || 0,
        br: importData.br || current.br || {round:2,r2:{},r3:{}},
        m: [...new Set([...(importData.m||[]), ...(current.m||[])])]
      };
      localStorage.setItem('qz', JSON.stringify(merged));
      alert('✅ 导入成功！已合并 ' + merged.h.length + ' 条记录。点击「打开刷题页」开始刷题。');
      importBtn.style.display = 'none';
    }

    // 如果从迁移页跳转过来，自动尝试粘贴
    if (document.referrer && document.referrer.includes('migrate-file-records')) {
      setTimeout(pasteFromClipboard, 500);
    }
  </script>
</body>
</html>
