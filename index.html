;margin-bottom:4px}.note{margin-top:14px}.ntg.has{border-color:#14b8a6;color:#0f766e;background:#f0fdfa}.nta{display:none;width:100%;min-height:86px;margin-top:8px;border:1px solid var(--line);border-radius:6px;padding:10px;font:14px/1.5 inherit}.nta.show{display:block}.nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px}.pal{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px;max-height:360px;overflow:auto}.pi{height:32px;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;background:#fff}.pi.cur{background:var(--s);border-color:var(--s);color:#fff}.pi.c{background:#dcfce7;border-color:#86efac}.pi.w{background:#fee2e2;border-color:#fca5a5}.pi.bk{box-shadow:inset 0 0 0 2px #fbbf24}.pi.nd::after{content:"";width:5px;height:5px;border-radius:50%;background:#14b8a6;margin-left:2px}.panel{margin-top:16px}.panel h2{font-size:17px;margin:14px 0 8px}.wi{list-style:none;border:1px solid var(--line);border-radius:6px;padding:10px;margin:8px 0;background:#fff}.qq{font-size:14px;line-height:1.5}.aa,.ya{font-size:12px;color:var(--t2);margin-top:4px}.muted{color:var(--t2);font-size:13px}

<script id="q-data" type="application/json">
[{"id": 1, "t": "s", "q": "OpenAI的人工智能对话聊天机器人ChatGPT的推出，是人工智能发展历程中的一个重要的里程碑。", "o": ["A. 2022年10月", "B. 2022年11月", "C. 2022年12月", "D. 2023年1月"], "a": "B", "e": "ChatGPT由OpenAI于2022年11月30日发布。A（2022年10月）和C（2022年12月）均不是准确日期；D（2023年1月）太晚。记住\"11月30日\"这个日期。"}, {"id": 3, "t": "s", "q": "人工智能AI的英文全称是             。", "o": ["A. Automatic Intelligence", "B. Artificial Intelligence", "C. Automatic Information", "D. Artificial Information"], "a": "B", "e": "AI是Artificial Intelligence（人工智能）的缩写。A\"Automatic\"是自动的、C\"Information\"是信息，均不对。D把两个都替换了。"}, {"id": 4, "t": "s", "q": "2016年3月,著名的“人机大战”,最终计算机以4:1的总比分击败围棋世界冠军李世石,这台计算机被称为        。", "o": ["A. 深蓝", "B. AlphoGo Zero", "C. AlphoGo", "D. AlphoZero"], "a": "C", "e": "2016年击败李世石的是AlphaGo（选项C）。A深蓝是1997年下国际象棋的；B AlphaGo Zero是后来不需要人类棋谱的版本；D AlphaZero是更通用的版本。注意区分这几个\"Alpha\"系列。"}, {"id": 5, "t": "s", "q": "(    )是人工智能的核心,是使计算机具有智能的主要方法,其应用遍及人工智能的各个领域。", "o": ["A. 深度学习", "B. 机器学习", "C. 人机交互", "D. 智能芯片"], "a": "B", "e": "B机器学习是AI的核心技术——深度学习、强化学习等都是机器学习的分支。A深度学习是机器学习的一个子集，不是全部核心；C人机交互关注用户体验；D智能芯片是硬件基础不是核心方法。"}, {"id": 7, "t": "s", "q": "职业道德是社会道德在职业生活中的具体化。以下哪条不属于职业道德具体化的体现。", "o": ["A. 比较具体、灵活、多样。", "B. 鲜明地表达职业义务、责任及职业行为上的道德准则。", "C. 与各种职业要求和职业生活结合,形成比较稳定的职业心理和职业习惯", "D. 用来调节从业人员外部关系"], "a": "D", "e": "ABC都是职业道德具体化的体现（灵活多样、表达职业义务、形成职业习惯），D\"调节外部关系\"已超出职业道德范畴——那是法律和社会规范的范围。注意题眼是\"不属于\"。"}, {"id": 8, "t": "s", "q": "制定现行的《中华人民共和国劳动法》的国家机关是()", "o": ["A. 全国人民代表大会", "B. 全国人大常委会", "C. 国务院", "D. 劳动与社会保障部"], "a": "B", "e": "《劳动法》由全国人大常委会制定（选项B）。A全国人大制定宪法和基本法律；C国务院制定行政法规；D劳动与社会保障部是执行部门，不是立法机关。"}, {"id": 10, "t": "s", "q": "以下哪个不属于《网络安全法》的基本原则。", "o": ["A. 网络空间主权原则", "B. 主权平等原则", "C. 网络安全与信息化发展并重原则", "D. 共同治理原则"], "a": "B", "e": "《网络安全法》的基本原则包括网络空间主权、安全与发展并重、共同治理。B\"主权平等原则\"是国际法原则，不是《网络安全法》的专属原则。注意题眼是\"不属于\"。"}, {"id": 11, "t": "s", "q": "以下不属于人工智能训练师职责的是:", "o": ["A. 收集数据", "B. 提供数据标注规则", "C. 数据验收及管理", "D. 积累领域通用数据"], "a": "D", "e": "ABC都是AI训练师的职责（采集数据、制定标注规则、验收管理数据）。D\"积累领域通用数据\"偏向数据架构师或数据治理岗位的职责，不是初级训练师的核心职责。"}, {"id": 12, "t": "s", "q": "是调整人们职业活动中各种关系的行为规范", "o": ["A. 道德", "B. 纪律", "C. 职业道德", "D. 法律"], "a": "C", "e": "C职业道德就是\"调整职业活动中各种关系的行为规范\"。A道德范围太广；B纪律是规则不是规范；D法律是强制性的，不是行为规范层面的。"}, {"id": 13, "t": "s", "q": "最早提出机器智能的测试模型,并提出了人工智能的含义", "o": ["A. 爱因斯坦", "B. 图灵", "C. 波尔", "D. 霍金"], "a": "B", "e": "B图灵在1950年提出图灵测试——判断机器是否具有智能的标准。A爱因斯坦研究物理；C波尔研究量子力学；D霍金研究宇宙物理。只有图灵关注机器智能。"}, {"id": 14, "t": "s", "q": "人工智能的目的是让机器能够       ,以实现某些脑力劳动的机械化。", "o": ["A. 具有完全的智能", "B. 和人脑一样考虑问题", "C. 完全替代人", "D. 模拟、延伸和扩展人的智能"], "a": "D", "e": "D\"模拟、延伸和扩展人的智能\"是AI的经典定义。A\"完全智能\"、B\"和人脑一样\"、C\"完全替代人\"都过于绝对，目前AI远达不到这个水平。"}, {"id": 15, "t": "s", "q": "(    )最早提出“人工智能”的概念。", "o": ["A. 图灵", "B. 冯诺依曼", "C. 麦卡锡", "D. 赫尔曼"], "a": "C", "e": "C麦卡锡在1956年达特茅斯会议上首次提出\"人工智能\"术语。A图灵提出了测试但未命名；B冯诺依曼是计算机架构之父。D赫尔曼非相关人物。"}, {"id": 16, "t": "s", "q": "(    )是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的一门新的技术科学。", "o": ["A. 人工智能", "B. 自然科学", "C. 数据挖掘", "D. 数据分析"], "a": "A", "e": "A。题干是《人工智能标准化白皮书》对AI的完整定义。D数据分析范围更窄，B自然科学、C数据挖掘都不能完全覆盖AI的技术科学定位。"}, {"id": 17, "t": "s", "q": "人工智能可以对(    )的意识、思维的信息过程的模拟", "o": ["A. 人", "B. 社会", "C. 生物", "D. 机器"], "a": "A", "e": "A。AI模拟的是\"人\"的意识与思维过程。B社会、C生物、D机器都不对——AI的目标是模拟人类智能，不是模拟社会或生物。"}, {"id": 18, "t": "s", "q": "以下关于人工智能的概念说法正确的是(    )。", "o": ["A. 人工智能是指在计算机上实现的具有人类智能的技术科学。", "B. 人工智能是一种伦理道德问题,因为它有可能超越人类智能,威胁到人类的生存。", "C. 人工智能是指在计算机上实现的能够完成复杂任务的程序。", "D. 人工智能是指在计算机上实现的自动化的生产线。"], "a": "A", "e": "A。AI是在计算机上模拟人类智能的技术科学。B把AI归为伦理问题，定义有偏差；C只说\"完成复杂任务\"不强调智能性；D\"自动化生产线\"太窄。"}, {"id": 19, "t": "s", "q": "人工智能领域的研究不包括(    )", "o": ["A. 机器人", "B. 自然语音处理", "C. 专家系统", "D. 人工生命"], "a": "D", "e": "D。机器人学是公认的AI六大研究方向之一（视觉、NLP、认知推理、机器人、博弈伦理、机器学习），属于AI研究领域而非排除项。专家系统和自然语音处理也是明确的AI研究子领域。人工生命（Artificial Life）是跨学科边缘研究领域，在AI标准教材中不总是被列为AI核心研究方向，最可能是本题【不包括】的答案。"}, {"id": 20, "t": "s", "q": "人工智能的目的就是,科学家们希望通过人造的方式,生产一种(    )出来。", "o": ["A. 虚拟", "B. 物体", "C. 智能", "D. 智慧"], "a": "C", "e": "C。题干问\"生产一种什么出来\"，答案是\"智能\"（具有智能的机器/系统）。A虚拟（不实体）、B物体（太泛）、D智慧（偏人的特质）都不如\"智能\"准确。"}, {"id": 21, "t": "s", "q": "深度学习是(    )领域中一个新的研究方向,它被引入机器学习使其更接近于最初的目标。", "o": ["A. 机器学习", "B. 前端", "C. 数学算法", "D. 大数据"], "a": "A", "e": "A。深度学习属于机器学习的一个分支，引入多层神经网络使机器学习更接近AI目标。B前端（开发领域）、C数学算法（太泛）、D大数据（数据基础）都不是机器学习的子领域。"}, {"id": 22, "t": "s", "q": "人工智能诞生于(    )。", "o": ["A. 20世纪40~50年代", "B. 20世纪50~70年代", "C. 20世纪70~80年代", "D. 1980年~1987年"], "a": "B", "e": "B。AI诞生于1956年达特茅斯会议，属于20世纪50年代。A（40-50年代）太早——那时计算机刚出现；C（70-80年代）是专家系统热潮期；D已是第二次AI热潮。"}, {"id": 23, "t": "s", "q": "最早的人工智能程序之一是由科学家(    )设计的。", "o": ["A. 联结学派的克里斯托弗·莫里斯", "B. 逻辑学家的约翰·麦卡锡", "C. 认知心理学家的乔治·米勒", "D. 医学专家的爱德华·费根鲍姆"], "a": "B", "e": "B。约翰·麦卡锡组织了达特茅斯会议并设计了最早的AI程序（如LISP语言）。其余选项的人物与最早AI程序的关联都不如麦卡锡直接。"}, {"id": 24, "t": "s", "q": "以下不属于人工智能领域分类的是(    )。", "o": ["A. 自然语音处理", "B. 项目管理", "C. 智能机器人", "D. 计算机视觉"], "a": "B", "e": "B。AI领域分类包括自然语言处理、计算机视觉、智能机器人、专家系统等。项目管理属于管理学范畴，与AI没有直接关系。"}, {"id": 25, "t": "s", "q": "人工智能是一个新兴的产业,人工智能可以被划分为三大产业,分别是人工智能软件开发、消费相关设备制造、(    )。", "o": ["A. 人工智能系统服务", "B. 集成电路", "C. 生物医药", "D. 新型农业"], "a": "A", "e": "A。根据国家统计局《战略性新兴产业分类》，AI三大产业为：AI软件开发、消费相关设备制造、AI系统服务。B集成电路属于半导体产业；C生物医药属于生物产业；D新型农业不是AI产业。"}, {"id": 26, "t": "s", "q": "人工智能产业分类分为三个内容,分别是:人工智能软件开发、人工智能系统服务和(    )。", "o": ["A. 行业洞察", "B. 价值分析", "C. 消费相关设备制造", "D. 产品建模与评估"], "a": "C", "e": "C。同上题，AI产业分三类：软件开发、系统服务、消费相关设备制造。A行业洞察太泛，B价值分析是通用概念，D产品建模也不是AI专属产业分类。"}, {"id": 27, "t": "s", "q": "以下属于人工智能软件的是(    )。", "o": ["A. 计算机视觉软件", "B. 推荐系统软件", "C. 机器学习平台软件", "D. 以上都是"], "a": "D", "e": "D。计算机视觉软件、推荐系统软件、机器学习平台软件都属于AI软件的不同方向。三个都对，选\"以上都是\"。"}, {"id": 28, "t": "s", "q": "人工智能产业链分为(    )三个层次。", "o": ["A. 低级、中级、高级", "B. 底层、中层、上层", "C. 基础、技术、应用", "D. 强人工智能、弱人工智能、超人工智能"], "a": "C", "e": "C。AI产业链划分为基础层（芯片、传感器、数据等）、技术层（算法、框架、模型）、应用层（产品、解决方案）。其他的分层方式都不是标准说法。"}, {"id": 29, "t": "s", "q": "人工智能产业链中(    )层是人工智能工业的核心。", "o": ["A. 基础", "B. 技术", "C. 标准", "D. 应用"], "a": "B", "e": "B。技术层（算法模型）是AI产业链的核心，决定了AI的能力上限。A基础层提供数据和算力支撑；C标准层不存在这一层；D应用层是落地的表现方式。"}, {"id": 30, "t": "s", "q": "人工智能产业链包括基础层,技术层以及应用层三个方面,其中(    )属于技术层面。", "o": ["A. 传感器硬件设备", "B. 芯片", "C. 计算机视觉", "D. 机器人"], "a": "C", "e": "C。计算机视觉属于技术层（算法与模型）。A传感器、B芯片属于基础层（硬件）；D机器人属于应用层（产品）。"}, {"id": 31, "t": "s", "q": "数据分析更侧重于通过分析数据的历史分布然后从中得出一些有价值的信息,其更重要的功能,就是数据(    )。", "o": ["A. 标准化", "B. 可视化", "C. 基础化", "D. 场景化"], "a": "B", "e": "B。数据可视化让复杂的统计结果变得直观可读，是数据分析最重要的功能之一。A标准化是数据预处理；C基础化和D场景化不是核心功能表述。"}, {"id": 32, "t": "s", "q": "(    )是基于数据库系统和应用程序,可以直观的查看统计分析系统中的数据,从而可以很快得到我们想要的结果。", "o": ["A. 数据清洗", "B. 数据监测", "C. 数据分析", "D. 大数据"], "a": "C", "e": "C。题干描述的\"基于数据库系统直观查看统计数据\"正是数据分析的定义。A数据清洗处理脏数据；B数据监测是监控；D大数据是数据量概念。"}, {"id": 33, "t": "s", "q": "数据分析是基于(     )和应用程序,可以直观的查看统计分析系统中的数据,从而可以很快得到我们想要的结果。", "o": ["A. 人工智能", "B. 数据库系统", "C. app", "D. 问卷调查"], "a": "B", "e": "B。数据分析基于数据库系统（存储结构化数据）和应用程序（分析工具）。同32题是同一个知识点。"}, {"id": 34, "t": "s", "q": "以下关于人工智能与数据分析关系描述错误的是(    )。", "o": ["A. 人工智能使得数据分析功能更加强大", "B. 数据分析更多的是基于现有数据,而人工智能则是基于历史数据", "C. 数据分析是人工智能的基础", "D. 数据分析可以帮助我们更好的进入人工智能时代"], "a": "B", "e": "B。题干要求选\"错误的是\"。B把AI说成仅基于\"历史数据\"——实际上AI也利用实时数据和模拟生成数据，不限于历史数据。ACD描述均正确：AI可增强分析、数据是AI基础、数据分析帮助AI发展。"}, {"id": 35, "t": "s", "q": "以下关于人工智能与数据分析关系描述错误的是(    )。", "o": ["A. 数据分析更侧重于未来和预测", "B. 数据分析更多的是指从历史数据里面发现有价值的信息,从而提高决策的科学性", "C. 人工智能使得数据分析功能更加强大", "D. 数据分析可以帮助我们更好的进入人工智能时代"], "a": "A", "e": "A。题干要求选\"错误的是\"。A说\"数据分析更侧重于未来和预测\"——这恰恰说反了：AI更侧重未来预测，数据分析更侧重历史总结。BCD均正确。"}, {"id": 36, "t": "s", "q": "人工智能更侧重于(    ),AI可以在数据和分析方面实现逐步改进。", "o": ["A. 现在", "B. 历史", "C. 未来", "D. 社会"], "a": "C", "e": "C。AI的核心能力是预测和决策，更关注未来。数据分析更关注对历史和现状的描述与解释。"}, {"id": 37, "t": "s", "q": "以下哪个描述最准确地反映了人工智能与数据分析之间的关系?", "o": ["A. 数据分析是人工智能的子集", "B. 人工智能是数据分析的子集", "C. 人工智能和数据分析是两个不相关的领域", "D. 人工智能和数据分析是同义词"], "a": "A", "e": "A。逐一排除：C（不相关）明显错，AI技术大量用于数据分析；D（同义词）完全是两个概念；B（AI是数据分析的子集）方向反了——AI的范围远大于数据分析，自动驾驶、机器人、游戏AI等都不属于数据分析范畴。A（数据分析是AI的子集）不是完美答案（传统统计分析不依赖AI），但在四个选项中是最接近事实的表述——现代数据分析越来越依赖机器学习、自然语言处理等AI技术作为核心工具。"}, {"id": 38, "t": "s", "q": "数据挖掘是指从大量的数据中通过(    )搜索隐藏于其中信息的过程。", "o": ["A. 数学", "B. 算法", "C. 讨论", "D. 调研"], "a": "B", "e": "B。数据挖掘的核心工具是算法（聚类、分类、关联规则等），通过算法自动发现隐藏模式。A数学是基础但不是直接工具；C讨论和D调研是人工方式。"}, {"id": 39, "t": "s", "q": "以下哪个描述最准确地反映了数据挖掘的概念?", "o": ["A. 通过使用大数据技术来衡量客户满意度", "B. 在公司的数据库中查找潜在的异常数据", "C. 从大量数据中发现有用的信息和模式", "D. 通过在网站上收集和分析用户数据来改进用户体验"], "a": "C", "e": "C。数据挖掘的标准定义就是\"从大量数据中发现有用信息和模式\"。A只关注客户满意度太窄；B只关注异常数据不全面；D只限网站数据范围太小。"}, {"id": 40, "t": "s", "q": "以下关于数据挖掘与人工智能关系说法错误的是(    )。", "o": ["A. 数据挖掘是一种用来证明假说的方法,并不是用来构建各种各样的假说的方法", "B. 机器学习是数据挖掘的一种重要方法,二者相辅相成", "C. 数据挖掘的很多算法都来自机器学习和统计学", "D. 机器学习中有些方法借鉴了统计学理论,实现数据挖掘目标"], "a": "A", "e": "A。题干问\"错误的是\"。数据挖掘不仅用来\"证明假说\"，更重要的功能是\"发现未知模式/构建新假说\"。A说\"不是用来构建假说\"是错误的。BCD均为正确关系描述。"}, {"id": 41, "t": "s", "q": "数据挖掘是一种(    )支持过程,它主要基于人工智能、机器学习、模式识别等,高度自动化地分析企业的数据,作出归纳性的推", "o": ["A. 决策", "B. 数据", "C. 计划", "D. 项目"], "a": "A", "e": "A。数据挖掘是一种\"决策支持过程\"，通过分析企业数据帮助管理者做出更好的决策。B数据支持太泛，C计划支持不够准确，D项目支持范围太窄。"}, {"id": 42, "t": "s", "q": "数据挖掘技术是以(    )为基础的数据分析技术。", "o": ["A. 电子政务", "B. 数据分析", "C. 知识经济", "D. 人工智能"], "a": "D", "e": "D。数据挖掘以AI技术（机器学习、模式识别等）为基础，是AI驱动的数据分析技术。A电子政务是应用领域不是技术基础。"}, {"id": 43, "t": "s", "q": "以下关于数据挖掘与人工智能的关系描述正确的是(    )", "o": ["A. 数据挖掘和人工智能是完全不相关的两个领域。", "B. 数据挖掘和人工智能有所关联,但是是两个相互独立的领域。", "C. 数据挖掘是人工智能的一部分,人工智能是数据挖掘的一部分。", "D. 数据挖掘和人工智能是两个定义模糊、缺少实际效果的研究领域。"], "a": "B", "e": "B。数据挖掘与AI有关联但相互独立——AI的目标是让机器具有智能，数据挖掘的目标是发现数据模式。A说完全无关不对；C说互为部分不对；D说定义模糊无效果更不对。"}, {"id": 44, "t": "s", "q": "大数据与人工智能的联系主要体现在(    )。", "o": ["A. 大数据提供计算和传输能力的设施基础层", "B. 大数据提供资源和能源的数据层", "C. 大数据提供核心引擎的技术层", "D. 以上都是"], "a": "D", "e": "D。大数据与AI的联系是多层次的：基础层（提供计算存储）、数据层（提供训练数据）、技术层（提供算法引擎）。三个描述都对。"}, {"id": 45, "t": "s", "q": "以下不属于大数据“5V”特点的是（    ）。", "o": ["A. Volume", "B. Valley", "C. Velocity", "D. Veracity"], "a": "B", "e": "B。大数据\"5V\"特点：Volume（大量）、Velocity（高速）、Variety（多样）、Veracity（真实性）、Value（价值）。Valley（山谷）不是5V之一。"}, {"id": 46, "t": "s", "q": "人工智能与大数据的关系是(    )。", "o": ["A. 人工智能需要大数据支撑", "B. 大数据挖掘少不了人工智能技术", "C. 人工智能发展离不开大数据总量", "D. 三者皆是"], "a": "D", "e": "D。AI需要大数据支撑训练，挖掘大数据离不开AI技术，AI发展离不开数据总量。三个表述均正确，选\"三者皆是\"。"}, {"id": 47, "t": "s", "q": "人工智能的发展需要三个重要的基础,分别是数据、算力和算法,而云计算是提供(    )的重要途径。", "o": ["A. 算法", "B. 算力", "C. 数据", "D. 学习"], "a": "B", "e": "B。AI三要素：数据（训练材料）、算力（计算资源）、算法（模型方法）。云计算通过提供弹性计算资源来提供算力。A算法靠研究不是云计算提供；C数据靠采集。"}, {"id": 48, "t": "s", "q": "以下关于云计算说法错误的是(   )。", "o": ["A. 云计算是分布式计算的一种", "B. 现阶段所说的云服务就单单是一种分布式计算", "C. 云计算是指通过计算机网络(多指因特网)形成的计算能力极强的系统", "D. 通过云计算技术,可以在短时间内完成对数以万计的数据的处理"], "a": "B", "e": "B。题干问\"错误的是\"。现阶段云服务远不止分布式计算——还包括SaaS、PaaS、IaaS、Serverless等多样化的服务模式。\"单单是一种分布式计算\"过于狭隘。"}, {"id": 49, "t": "s", "q": "云服务是对(    )技术混合演进并跃升的结果。", "o": ["A. 分布式计算", "B. 效用计算", "C. 并行计算", "D. 以上都是"], "a": "D", "e": "D。云服务融合了分布式计算、效用计算（按需付费）、并行计算（提高速度）、网络存储、虚拟化等多种计算技术。三项都参与混合演进。"}, {"id": 50, "t": "s", "q": "以下关于人工智能与云计算的关系说法正确的是(    )。", "o": ["A. 人工智能与云计算是完全不相关的两个领域", "B. 人工智能和云计算有所关联,但是是两个相互独立的领域", "C. 人工智能是云计算的一部分,大数据是人工智能的一部分", "D. 人工智能和云计算是两个定义模糊、缺少实际效果的研究领域"], "a": "B", "e": "B。AI和云计算是有关联但独立的两个领域：AI可通过云部署，云可提供AI计算资源，但两者不互相包含。A太绝对（不是完全不相关）；C关系搞反了；D说没实际效果不对。"}, {"id": 51, "t": "s", "q": "数据标注是对收集到的,未处理的初级数据,包括(    )等进行加工处理,并转换为机器可识别信息的过程。", "o": ["A. 语音", "B. 图像", "C. 文本", "D. 以上都是"], "a": "D", "e": "D。数据标注涵盖语音、图像、文本、视频等多种原始数据类型。三个选项都包含，选\"以上都是\"。"}, {"id": 52, "t": "s", "q": "数据标注是指对收集到的、（    ）的原始数据或初级数据，包括语音、图像、文本、视频等类型的数据进行加工处理，并转换为机器可识别信息的过程。", "o": ["A. 已处理", "B. 已加工", "C. 未处理", "D. 非真实"], "a": "C", "e": "C。数据标注处理的是\"未处理\"的原始/初级数据。A已处理和B已加工数据不需要再进行标注（已被处理过）；D非真实数据不是标注材料。"}, {"id": 53, "t": "s", "q": "数据标注的数据类型不包括( )。", "o": ["A. 语音", "B. 图像", "C. 姿态", "D. 文本"], "a": "C", "e": "C。数据标注的数据类型包括语音、图像、文本、视频等。\"姿态\"本身通常作为其他数据的标注维度（如人体姿态估计），不是标注的主要输入类型。"}, {"id": 54, "t": "s", "q": "以下关于数据标注描述正确的是(    )。", "o": ["A. 数据标注是将已收集的数据整理和组织的一种方法。", "B. 数据标注是收集、整合和处理数据的过程。", "C. 数据标注是为数据打上标签或注释,以帮助机器识别和分类数据的过程。", "D. 数据标注是存储和管理数据的过程。"], "a": "C", "e": "C。数据标注的核心定义是\"为数据打上标签或注释，帮助机器识别和分类\"。A描述的是数据整理（不是标注）；B描述的是数据处理全流程；D描述的是数据存储管理。"}, {"id": 55, "t": "s", "q": "以下选项关于人工智能与数据标注的关系描述正确的是(    )。", "o": ["A. 人工智能可以替代数据标注人员的角色", "B. 数据标注是人工智能的基础,没有数据标注就没有人工智能", "C. 人工智能与数据标注是两个完全独立的领域,没有任何联系", "D. 数据标注可以帮助人工智能模型进行学习和预测"], "a": "D", "e": "D。数据标注帮助AI模型进行学习和预测，两者关系是：数据标注为监督学习提供训练数据，是AI模型训练的关键前置环节。A不对——AI不能完全替代标注员（仍需人工判断）；B说法过于绝对；C说完全独立错误。"}, {"id": 56, "t": "s", "q": "数据标注是人工智能(    )得以有效运营的关键环节。", "o": ["A. 数据", "B. 管理", "C. 算法", "D. 算力"], "a": "C", "e": "C。数据标注是AI算法训练的关键环节——标注数据是监督学习的基础输入。A数据层是存储层不是标注；B管理层是数据治理；D算力是计算资源。"}, {"id": 57, "t": "s", "q": "数据是事实或观察的结果,是用于表示客观事物的(    )的原始素材。", "o": ["A. 标准化", "B. 未加工", "C. 加工处理", "D. 统一化"], "a": "B", "e": "B。数据是\"未加工\"的原始素材（事实、观察结果）。A标准化是处理后的数据；C加工处理后就不是原始数据了。"}, {"id": 58, "t": "s", "q": "(    )是制约人工智能发展的“瓶颈”。", "o": ["A. 机器", "B. 算法", "C. 数据", "D. 数字"], "a": "C", "e": "C。高质量数据是AI发展的关键瓶颈——算法可以开源、算力可以扩容，但高质量标注数据的获取成本高、耗时长。A机器、D数字不是主要瓶颈。"}, {"id": 59, "t": "s", "q": "以下不属于模拟数据的内容是(    )。", "o": ["A. 图像", "B. 声音", "C. 温度", "D. 符号"], "a": "D", "e": "D。模拟数据包括图像、声音、温度等连续量；\"符号\"是离散的数字或逻辑符号，不属于模拟数据。注意题眼是\"不属于\"。"}, {"id": 60, "t": "s", "q": "文件格式是计算机为了存储数据而使用的对数据的特殊(    )方式。", "o": ["A. 定义", "B. 编码", "C. 转换", "D. 描述"], "a": "B", "e": "B。文件格式通过特定的\"编码\"方式存储数据。A定义太宽泛，C转换是数据操作，D描述不是存储方式。"}, {"id": 61, "t": "s", "q": "结构化数据主要通过(    )进行存储和管理。", "o": ["A. 非关系型数据库", "B. 关系数型据库", "C. 独立数据库", "D. 表格"], "a": "B", "e": "B。结构化数据通过关系型数据库（MySQL、Oracle等）存储和管理，以二维表结构组织数据。A非关系型数据库（MongoDB等）存储非/半结构化数据。"}, {"id": 62, "t": "s", "q": "结构化数据也称作行数据,是由(    )表结构来逻辑表达和实现的数据。", "o": ["A. 一维", "B. 二维", "C. 三维", "D. 四维"], "a": "B", "e": "B。结构化数据是行数据（Row Data），由二维表（行×列）逻辑表达。一维、三维、四维不符合关系数据库的行列结构。"}, {"id": 63, "t": "s", "q": "属于结构化数据的有( )。", "o": ["A. 存储在通用数据库中的关系型数据", "B. Web数据", "C. 声音文件中的数据", "D. 图象文件中的数据"], "a": "A", "e": "A。关系型数据库中的数据是典型的结构化数据。B Web数据多为非/半结构化；C声音文件是非结构化；D图像文件也是非结构化。"}, {"id": 64, "t": "s", "q": "以下关于结构化数据描述错误的是(   )。", "o": ["A. 结构化数据严格地遵循数据格式与长度规范", "B. 结构化数据的存储方式通常都是以行、列的形式存储", "C. 结构化数据只能存储在ExcelAccess中", "D. 结构化数据也称作行数据,是由二维表结构来逻辑表达和实现的数据"], "a": "C", "e": "C。题干问\"错误的是\"。结构化数据不仅可存储在Excel/Access中——关系数据库（MySQL、Oracle、PostgreSQL等）才是主要存储方式。\"只能\"太绝对。"}, {"id": 65, "t": "s", "q": "以下关于非结构化数据描述错误的是(    )。", "o": ["A. 非结构化数据存储方式不统一", "B. 非结构化数据格式多样化", "C. 非结构化数据很容易标准化", "D. 非结构化数据没有预定义的数据模型"], "a": "C", "e": "C。题干问\"错误的是\"。非结构化数据恰恰\"不容易标准化\"——音频、视频、自由文本格式各异，缺乏统一结构。ABD均为非结构化数据的正确特征。"}, {"id": 66, "t": "s", "q": "非结构化数据是数据结构(    )。", "o": ["A. 完整", "B. 规则", "C. 不完整", "D. 标准"], "a": "C", "e": "C。非结构化数据结构不完整（或不规则）——没有预定义的字段/表结构。A完整是结构化数据的特性。"}, {"id": 67, "t": "s", "q": "以下属于非结构化数据的是(    )。", "o": ["A. 订单系统数据", "B. 财务系统数据", "C. 视频监控数据", "D. 客户系统数据"], "a": "C", "e": "C。视频监控数据是典型的非结构化数据。ABD（订单系统、财务系统、客户系统数据）都是关系数据库中的结构化数据。"}, {"id": 68, "t": "s", "q": "以下关于非结构化数据描述错误的是(    )。", "o": ["A. 非结构化数据格式多样化,如Word、Excel、PDF、JPEG图等等", "B. 非结构化数据只能存储于文件系统中", "C. 非结构化数据遍布于异构系统中,信息量非常大", "D. 非结构化数据难以标准化"], "a": "B", "e": "B。题干问\"错误的是\"。非结构化数据不\"只能\"存于文件系统——也可存于对象存储（如S3）、NoSQL数据库（如MongoDB）、数据湖等。"}, {"id": 69, "t": "s", "q": "以下属于半结构化数据的是(    )。", "o": ["A. 图片", "B. PDF", "C. JSON文档", "D. PPT"], "a": "C", "e": "C。JSON（JavaScript Object Notation）文档是典型的半结构化数据——有标签结构但灵活可变。A图片是非结构化，B PDF偏非结构化，D PPT也是非结构化。"}, {"id": 70, "t": "s", "q": "半结构化数据的典型场景包括(    )。", "o": ["A. 邮件系统", "B. 数据挖掘系统", "C. 档案系统", "D. 以上都是"], "a": "D", "e": "D。半结构化数据典型场景：邮件系统（邮件头+正文）、数据挖掘系统（日志/配置文件）、档案系统（XML元数据）。三项都是。"}, {"id": 71, "t": "s", "q": "以下不属于半结构化数据的是(  D  )。", "o": ["A. 邮件", "B. 数据库系统日志文件", "C. 网页", "D. 从ERP系统导出的产品采购订单表"], "a": "D", "e": "D。ERP系统导出的采购订单表是结构化数据（固定字段、行列格式）。A邮件、B日志文件、C网页都是半结构化数据的典型例子。"}, {"id": 72, "t": "s", "q": "半结构化数据的特征有(    )。", "o": ["A. 自描述性", "B. 描述的复杂性", "C. 描述的动态性", "D. 以上都是"], "a": "D", "e": "D。半结构化数据三大特征：自描述性（自带结构标记）、描述复杂性（结构不规则）、描述动态性（结构可变）。三项都对。"}, {"id": 73, "t": "s", "q": "以下不属于半结构化数据特征的是(    )。", "o": ["A. 自描述性", "B. 描述的复杂性", "C. 描述的动态性", "D. 行数据结构性"], "a": "D", "e": "D。\"行数据结构性\"是结构化数据的特征，不是半结构化的特征。ABC都是半结构化数据的正确特征。"}, {"id": 74, "t": "s", "q": "半结构化数据结构难以纳入现有的各种描述框架,实际应用中不易进行清晰的理解与把握,体现了半结构化数据(    )的特征。", "o": ["A. 自描述性", "B. 复杂性", "C. 动态性", "D. 统一性"], "a": "B", "e": "B。题干描述\"难以纳入描述框架、不易理解和把握\"对应半结构化数据的\"复杂性\"特征。A自描述性指自带标签；C动态性指结构可变化。"}, {"id": 75, "t": "s", "q": "以下关于半结构化数据描述错误的是(    )。", "o": ["A. 半结构化数据只能用XML格式来组织并保存", "B. 半结构化数据,是介于结构化和非结构化之间的数据", "C. 半结构化数据具有数据的复杂性特征", "D. 半结构化数据的比较灵活且格式不固定"], "a": "A", "e": "A。题干问\"错误的是\"。半结构化数据不仅可用XML，还可用JSON、YAML等多种格式组织保存。\"只能用XML\"太绝对。"}, {"id": 76, "t": "s", "q": "半结构化数据的存储格式可以是(    )格式。", "o": ["A. xml", "B. jpg", "C. html", "D. py"], "a": "A", "e": "A。XML是半结构化数据的典型存储格式。B jpg是图像格式；C html虽然也是标记语言但选项本意是图像相关；D py是Python源代码。"}, {"id": 77, "t": "s", "q": "python中可以用来编写HTTP请求库的是", "o": ["A. lxml", "B. beautifulsoup", "C. requests", "D. selenium"], "a": "C", "e": "C。requests是Python的HTTP请求库，用于发送GET/POST请求获取网页数据。A lxml是XML/HTML解析库；B BeautifulSoup是HTML解析库；D Selenium是浏览器自动化工具。"}, {"id": 78, "t": "s", "q": "python中关于requests说法正确的是:", "o": ["A. 使用requests不需要安装,因为是内置的第三方库。", "B. 安装requests的方法是:pip install requests", "C. 安装requests的方法是:python install requests", "D. 安装requests的方法是:cmd install requests"], "a": "B", "e": "B。requests是第三方库，安装命令是pip install requests。A说不需要安装错误（它不是内置库）；C\"python install\"不是pip命令；D\"cmd install\"不存在。"}, {"id": 79, "t": "s", "q": "在python脚本中导入requests的正确语句是:", "o": ["A. #include requests", "B. include requests", "C. #import requests", "D. import requests"], "a": "D", "e": "D。Python导入库用import关键字：import requests。A/B用#include（C/C++语法）；C用#import（不是Python语法）。"}, {"id": 80, "t": "s", "q": "python脚本中使用requests获取网页信息的方法是:", "o": ["A. requests.get(url)", "B. requests.urlopen(url)", "C. requests.request(url)", "D. requests.urllib(url)"], "a": "A", "e": "A。requests.get(url)发送GET请求获取网页内容。B urlopen是urllib的方法不是requests的；C/D是虚构的方法名。"}, {"id": 81, "t": "s", "q": "BeautifulSoup库提供的获得文本和标签属性的函数是:", "o": ["A. text()和attr()", "B. get_text()和get_attr()", "C. find()和find_all()", "D. findtext()和findattr()"], "a": "B", "e": "get_text()获取文本，get_attr()获取标签属性"}, {"id": 82, "t": "s", "q": "Python脚本使用的第三方库BeautifulSoup,说法正确的是:", "o": ["A. BeautifulSoup的作用是用来模拟浏览器发出访问请求。", "B. BeautifulSoup是用来录制用户操作,进而生成操作脚本的工具库。", "C. BeautifulSoup是用来保存爬取数据的工具库。", "D. BeautifulSoup是用来解析html或xml的工具库。"], "a": "D", "e": "D。BeautifulSoup是HTML/XML解析库，用于从网页源码中提取数据。A描述的是requests；B描述的是Selenium录制功能；C描述的是数据存储。"}, {"id": 83, "t": "s", "q": "BeautifulSoup库的安装方法是:", "o": ["A. python install bs", "B. python install bs4", "C. pip install BeautifulSoup", "D. pip install bs4"], "a": "D", "e": "D。BeautifulSoup的包名是bs4，安装命令是pip install bs4。A/B用python install错误；C包名BeautifulSoup不对应pip包名。"}, {"id": 84, "t": "s", "q": "使用BeautifulSoup解析HTML格式的字符串对象html,正确的语句是:", "o": ["A. soup=BeautifulSoup(html,lxml)", "B. soup=BeautifulSoup(html,xml)", "C. soup=BeautifulSoup(html,html)", "D. soup=BeautifulSoup(html,html5)"], "a": "A", "e": "A。BeautifulSoup解析HTML用\"lxml\"作为解析器。B用\"xml\"只能解析严格XML不是HTML；C/D是虚构的解析器名称。"}, {"id": 85, "t": "s", "q": "BeautifulSoup库操作的节点,不包括:", "o": ["A. 元素节点", "B. 超链接节点", "C. 文本节点", "D. 属性节点"], "a": "B", "e": "B。BeautifulSoup操作三种节点：元素节点（Tag）、文本节点（NavigableString）、属性节点。超链接节点只是元素节点的一种，不是独立节点类型。"}, {"id": 86, "t": "s", "q": "BeautifulSoup库的对象,说法不正确的是:", "o": ["A. Tag即HTML中的一个个的标签,对象类型是bs4.element.Tag", "B. Tag即HTML中标签的属性,对象类型是bs4.element.Tag", "C. BeautifulSoup对象表示HTML或XML文档。", "D. NavigableString 对象表示标签内的文本对象。"], "a": "B", "e": "B。题干问\"不正确的是\"。Tag对象表示HTML标签本身，对象类型是bs4.element.Tag——选项B把Tag说成\"标签的属性\"是错的。C和D描述正确。"}, {"id": 87, "t": "s", "q": "关于csv文件,正确的说法是:", "o": ["A. csv文件由记录组成,记录间用换行符分隔。每条记录由字段组成,字段间的分隔符是逗号。", "B. csv文件由单元格组成,单元格之间用换行符分隔,单元格内的文字,用逗号分隔。", "C. csv文件由记录组成,记录间用逗号分隔。每条记录由字段组成,字段间的分隔符是换行符。", "D. csv文件由字段组成,字段间用换行符分隔。每个字段由记录组成,记录间的分隔符是逗号。"], "a": "A", "e": "A。CSV文件中每条记录占一行（用换行符分隔），每条记录内字段用逗号分隔。B说换行符分隔单元格不对；C/D把记录和字段的分隔符说反了。"}, {"id": 88, "t": "s", "q": "在python中使用csv库,下列说法正确的是:", "o": ["A. csv是一个第三方的库,需要安装才能使用。可以使用python install csv进行安装。", "B. csv是一个内置的库,不需要安装,也不需要import导入,就能直接使用。", "C. 要想使用csv库,需要使用pip install csv安装。", "D. csv是一个内置的库,不需要安装,使用时直接导入即可。"], "a": "D", "e": "D。csv是Python内置标准库，不需要pip安装，使用时直接import csv即可。A/B/C都错误理解了它的安装方式。"}, {"id": 89, "t": "s", "q": "关于JSON,说法错误的是:", "o": ["A. JSON是JavaScript Object Notation 的缩写", "B. JSON通过对象和数组的组合表示数据", "C. JSON采用完全独立于语言的文本格式", "D. JSON结构化程度高,是重量级的数据交换格式。"], "a": "D", "e": "D。题干问\"错误的是\"。JSON是\"轻量级\"数据交换格式，不是\"重量级\"。XML才是重量级的。ABC对JSON的描述均正确。"}, {"id": 90, "t": "s", "q": "pip是python包管理工具,下列用法错误的是:", "o": ["A. 显示pip版本: pip -version", "B. 使用pip安装python包: pip install 包名", "C. 列出当前python环境中已经安装的包: pip list", "D. pip卸载已经安装的包: pip remove 包名"], "a": "D", "e": "D。pip卸载包的正确命令是pip uninstall 包名，不是pip remove。A（--version显示版本）B（install安装）C（list列表）均正确。注意A选项文本可能是--version或-V。"}, {"id": 91, "t": "s", "q": "文本数据采集过程中,常见的提供数据解析方法的库中,不包括:", "o": ["A. BeautifulSoup", "B. lxml", "C. re", "D. requests"], "a": "D", "e": "D。requests负责数据\"获取\"（发请求），不是数据\"解析\"。ABC（BeautifulSoup、lxml、re）都是解析工具，负责从已获取的HTML/文本中提取数据。"}, {"id": 92, "t": "s", "q": "文本数据采集过程中,提供数据获取和解析的方法的库中,属于python内置库的是:", "o": ["A. selenium", "B. requests", "C. re", "D. BeautifulSoup"], "a": "C", "e": "C。re（正则表达式）是Python内置标准库，不需要安装。A selenium、B requests、D BeautifulSoup都是需要pip安装的第三方库。"}, {"id": 93, "t": "s", "q": "关于激光扫描仪产品和适用范围,下列说法错误的是:", "o": ["A. 无人机激光雷达可以用于城市级别的测绘。", "B. 背包激光雷达扫码系统必须有GPS才能实时获取周围环境的三维点云数据。", "C. 激光手持三维扫描仪创新的定位目标点技术可以使用户根据其需要以任何方式、角度移动被测物", "D. 车载激光移动扫描可用于大空间超视距、城市道路、公路、园区、城市道路、街区"], "a": "B", "e": "B。背包激光雷达可以使用SLAM（即时定位与地图构建）在无GPS环境下工作（如室内、隧道）。\"必须有GPS\"这个前提错误。"}, {"id": 94, "t": "s", "q": "OpenCV 库中,打开笔记本的内置摄像头的操作语句时:", "o": ["A. cv2.VideoCapture(0)", "B. cv2.VideoCapture(1)", "C. cv2.VideoCapture(2)", "D. cv2.VideoCapture()"], "a": "A", "e": "A。cv2.VideoCapture(0)中0表示默认摄像头（内置摄像头）。1表示外接第二个摄像头，2表示第三个。Device编号从0开始。"}, {"id": 95, "t": "s", "q": "OpenCV中,把帧写入到视频文件方法是调用VideoWriter对象的什么方法?", "o": ["A. read()", "B. write()", "C. release()", "D. init()"], "a": "B", "e": "B。VideoWriter.write(frame)将帧写入视频文件。A read()是读取帧；C release()是释放资源；D init()不是VideoWriter的方法。"}, {"id": 96, "t": "s", "q": "语音数据采集不包括的步骤是:", "o": ["A. 麦克风拾音", "B. 模拟信号数字化", "C. 数字信号模拟化", "D. 音频文件生成"], "a": "C", "e": "C。语音采集步骤：麦克风收音→模数转换（模拟变数字）→生成音频文件。\"数字信号模拟化\"是数模转换DAC，方向反了，不是采集步骤。"}, {"id": 97, "t": "s", "q": "语音数据采集时,为了避免低频失真,采样频率应该在多少以上?", "o": ["A. 20khz", "B. 22khz", "C. 40khz", "D. 44khz"], "a": "C", "e": "C。根据奈奎斯特采样定理，采样频率应≥信号最高频率的2倍。人耳可听范围约20Hz-20kHz，最高频率为20kHz，因此采样频率应≥40kHz。D 44kHz是CD音质标准，虽然也满足要求，但题干问的是避免失真的最低标准，应为40kHz。"}, {"id": 98, "t": "s", "q": "使用 PyAudio 库打开麦克风的方法名是:", "o": ["A. read", "B. open", "C. write", "D. init"], "a": "B", "e": "B。PyAudio通过p.open(...)打开音频流获取麦克风数据。A read是读取数据的方法；C write是写入；D init不是PyAudio的麦克风操作方法。"}, {"id": 99, "t": "s", "q": "日志数据采集的目的不包括:", "o": ["A. 设计", "B. 调试", "C. 运维监控", "D. 业务分析"], "a": "A", "e": "A。日志采集用于调试（找bug）、运维监控（看系统状态）、业务分析（用户行为）。\"设计\"是在写代码之前的活动，日志从已运行系统中采集，不属于其目的。"}, {"id": 100, "t": "s", "q": "日志组成的要素不包括:", "o": ["A. 日期", "B. 开发人员", "C. 信息", "D. 级别"], "a": "B", "e": "B。日志要素一般包括时间戳、信息内容、级别（INFO/WARNING/ERROR等）。\"开发人员\"姓名不是日志的标准组成要素。"}, {"id": 101, "t": "s", "q": "关于数据库中的数据,说法不正确的是:", "o": ["A. 数据库可以很好的保证数据有效", "B. 数据库可以很好的保证数据不被破坏", "C. 数据库自身无法避免重复数据", "D. 数据库可以降低数据的冗余"], "a": "C", "e": "C。题干问\"不正确的是\"。数据库通过主键、唯一约束等机制可以避免重复数据。C说\"自身无法避免重复数据\"是错误的。ABD均为数据库的正确特性。"}, {"id": 102, "t": "s", "q": "Connect用Sqlite3提供的Connection对象。下列说法错误的是:", "o": ["A. 使用sqlite3操作数据库文件时,必须先建立和该数据库文件的Connection对象。", "B. 使用sqlite3.connect(数据库文件),当数据库文件并不存在时,会创建该数据库,再返回和该数据库的连接对象。", "C. 使用sqlite3.connect(数据库文件),当数据库文件已存在时,会返回和该数据库的连接对象。", "D. 使用sqlite3.connect(数据库文件),当数据库文件并不存在时,会返回一个null值表示数据库不存在。"], "a": "D", "e": "D。sqlite3.connect()在数据库不存在时会自动创建新数据库，不会返回null。D说\"返回null\"不符合SQLite实际行为。ABC均为正确描述。"}, {"id": 103, "t": "s", "q": "关于SQLite语法,说法错误的是:", "o": ["A. SQLite是不区分大小写的,因此查询时进行字符串比较,是忽略大小写的。", "B. SQLite是不区分大小写的,但在查询时进行字符串比较,是区分大小写的。", "C. SQL 注释以两个连续的 - 字符(ASCII 0x2d)开始", "D. 所有的 SQLite 语句可以以任何关键字开始,所有的语句以分号 ; 结束。"], "a": "A", "e": "A。题干问\"错误的是\"。SQLite不区分大小写指的是关键字（SELECT=select），但在字符串比较时是区分大小写的（'Zhang'≠'zhang'）。A说字符串比较也忽略大小写，错误。"}, {"id": 104, "t": "s", "q": "SQLite3中,错误的数据类型和数据的是:", "o": ["A. 数据类型varchar(55),数据zhangsan", "B. 数据类型float,数据128.55", "C. 数据类型int,数据520", "D. 数据类型boolean,数据false"], "a": "D", "e": "D。SQLite没有独立的boolean类型，布尔值用整数0/1存储。A varchar存zhangsan、B float存128.55、C int存520都是类型兼容的。"}, {"id": 105, "t": "s", "q": "SQLite3中创建数据库,说法错误的是:", "o": ["A. SQLite的sqlite3命令被用来创建新的SQLite数据库,创建之前,必须通过grant进行授权。", "B. sqlite3命令的基本语法如下: sqlite3 DatabaseName.db", "C. 通常情况下,数据库名称在 RDBMS内应该是唯一的。", "D. 另外我们也可以使用 .open 来建立新的数据库文件: sqlite>.open test.db"], "a": "A", "e": "A。题干问\"错误的是\"。SQLite创建数据库不需要grant授权（SQLite是嵌入式数据库，没有用户权限管理系统）。grant用于MySQL等网络数据库。"}, {"id": 106, "t": "s", "q": "SQLite3在sqlite提示符下使用的命令,说法错误的是:", "o": ["A. .open,打开数据库文件", "B. .show 显示打开的数据库", "C. .dump 导入导出数据库", "D. .tables 查看表"], "a": "C", "e": "C。题干问\"错误的是\"。.dump命令用于导出数据库为SQL脚本，不是\"导入导出\"双向命令。A正确（.open打开），B正确（.show显示），D正确（.tables查看表）。"}, {"id": 107, "t": "s", "q": "SQLite3的数据库testDB.db,导出到SQL脚本文件testDB.sql的命令是:", "o": ["A. sqlite testDB.db > testDB.sql", "B. sqlite3 testDB.db > testDB.sql", "C. sqlite testDB.db .dump > testDB.sql", "D. sqlite3 testDB.db .dump > testDB.sql"], "a": "D", "e": "D。正确命令格式：sqlite3 testDB.db .dump > testDB.sql。先指定数据库，再执行.dump命令，最后重定向输出。A用的是sqlite（不是sqlite3）；B/C缺少.dump命令。"}, {"id": 108, "t": "s", "q": "SQLite3中创建表test_table正确的是:", "o": ["A. CREATE TABLE test_table( ID PRIMARY KEY INT, NAME NOT NULL )", "B. CREATE TABLE ( ID PRIMARY KEY INT, NAME NOT NULL TEXT ) test_table", "C. CREATE TABLE test_table( ID INT PRIMARY KEY, NAME TEXT NOT NULL )", "D. CREATE TABLE ( ID INT PRIMARY KEY, NAME TEXT NOT NULL ) test_table"], "a": "C", "e": "C。正确语法：CREATE TABLE 表名(列名 数据类型 约束, ...)。C中ID INT PRIMARY KEY（类型在前约束在后）, NAME TEXT NOT NULL符合语法。A中ID的INT类型写在PRIMARY KEY之后（语法错），且NAME缺TEXT类型；B和D的表名test_table放在了括号外面，不符合CREATE TABLE语法。"}, {"id": 109, "t": "s", "q": "SQLite3创建表test_table后,来验证表是否已成功创建,可以使用的命令是:", "o": ["A. .show查看表是否已经存在于当前数据库了。", "B. .tables列出当前数据库中的所有表。", "C. .database查看表的完整信息", "D. .schema列出当前数据库中的所有表。"], "a": "B", "e": "B。.tables命令列出当前数据库中的所有表，可验证表是否创建成功。A .show不是SQLite命令；C .database列出数据库信息不是表列表；D .schema显示表结构不是表列表。"}, {"id": 110, "t": "s", "q": "SQLite3删除已经创建的表test_table,正确的语句是:", "o": ["A. drop table test_table;", "B. drop test_table;", "C. delete table test_table;", "D. delete test_table;"], "a": "A", "e": "A。删除表的正确SQL是DROP TABLE 表名。B缺少TABLE关键字；C/D用DELETE——DELETE用于删除表中数据行，不是删除整个表结构。"}, {"id": 111, "t": "s", "q": "从表test_table中查询所有记录的名字(name),正确的查询语句是:", "o": ["A. from test_name select name;", "B. select from test_table;", "C. select name test_table;", "D. select name from test_table;"], "a": "D", "e": "D。SELECT name FROM test_table是正确语序：SELECT 列名 FROM 表名。A FROM在SELECT前是错的；B SELECT后面没有列名；C缺少FROM关键字。"}, {"id": 112, "t": "s", "q": "从表test_table中查询编号(id)为12的名字(name),正确的查询语句是:", "o": ["A. select name from test_table id=12;", "B. from test_table select name id=12;", "C. select name from test_table where id=12;", "D. select name where id=12 from test_table;"], "a": "C", "e": "C。带条件的查询：SELECT name FROM test_table WHERE id=12。WHERE放在FROM之后指定筛选条件。A缺少WHERE；B语序全错；D WHERE在FROM之前语序错。"}, {"id": 113, "t": "s", "q": "从表test_table中查询编号(id)为12,并且性别(gender)是男(用数字1表示)的名字(name),性别(gender),正确的查询语句是:", "o": ["A. select name, gender from test_table where id=12 and gender=1;", "B. select name, gender from test_table where id=12 or gender=1;", "C. select name, gender from test_table where id=12,gender=1;", "D. select name, gender from test_table where id=12 where gender=1;"], "a": "A", "e": "A。多条件查询用AND连接：SELECT name, gender FROM test_table WHERE id=12 AND gender=1。B用OR逻辑不对（应同时满足）；C用逗号不是标准语法；D两个WHERE语法错误。"}, {"id": 114, "t": "s", "q": "从表test_table中查询有提成(commission_pct)的员工的编号(id),姓名(name)和提成(commission_pct),正确的sql语句是:", "o": ["A. select name from test_table where commission_pct>0;", "B. select id, name, commission_pct from test_table where commission_pct>0;", "C. select name from test_table where commission_pct is not null;", "D. select id, name, commission_pct from test_table where commission_pct is not null;"], "a": "D", "e": "D。查询有提成的员工：WHERE commission_pct IS NOT NULL。NULL表示未知/无值，不能用=或>比较。需要查的列是id, name, commission_pct。用IS NOT NULL过滤非空值。"}, {"id": 115, "t": "s", "q": "从表test_table中查询名字(name)是ZhangSan的员工的编号(id),薪资(salary),正确的查询语句是:", "o": ["A. select id, salary from test_table where name is 'zhangsan';", "B. select id, salary from test_table where name is 'ZhangSan';", "C. select id, salary from test_table where name='ZhangSan';", "D. select id, salary from test_table where name='zhangsan';"], "a": "C", "e": "C。查特定名字用WHERE name='ZhangSan'。SQLite字符串比较默认区分大小写，所以'ZhangSan'≠'zhangsan'。A用IS不是=符号；B也是用IS不对。"}, {"id": 116, "t": "s", "q": "SQLite3中，下面语句的输出是：sqlite> select 17%5;", "o": ["A. Parse error", "B. 3.4", "C. 3", "D. 2"], "a": "D", "e": "D。%是取模（求余数），17÷5=3余2，结果2。记法：%看\"除完剩多少\"，/看\"能除几个\"。逐项排除：A错误，select 17%5是合法SQL不会解析报错；B错误，3.4是17/5做浮点除法的结果；C错误，3是17/5整除的结果（商），取模要余数不要商。"}, {"id": 117, "t": "s", "q": "从表test_table中查询所有名字(name),并在结果中要消除重复,正确的查询语句是:", "o": ["A. select name  from test_table;", "B. select name  from test_table where distinct;", "C. select distinct name  from test_table;", "D. select name from distinct test_table;"], "a": "C", "e": "C。去重用SELECT DISTINCT name FROM test_table。DISTINCT放在SELECT和列名之间。A没去重；B WHERE distinct语法错；D FROM distinct语序错。"}, {"id": 118, "t": "s", "q": "从表test_table中查询所有名字(name),并按名字降序,正确的查询语句是:", "o": ["A. select name from test_table order by name desc;", "B. select name from test_table order by name asc;", "C. select name order by name desc from test_table;", "D. select name order by name asc from test_table;"], "a": "A", "e": "A。降序用ORDER BY name DESC。ASC是升序（默认），DESC是降序。C/D的FROM位置不对（ORDER BY应在FROM之后）。"}, {"id": 119, "t": "s", "q": "在表test_table中,修改编号(id)等于6的用户的薪资(salary)为8000;", "o": ["A. update set salary=6000 from test_table where id=6;", "B. update test_table  set salary=6000  where id=6;", "C. update from test_table  set salary=6000  where id=6;", "D. update test_table  where id=6 set salary=6000;"], "a": "B", "e": "B。正确语序：UPDATE 表名 SET 列=值 WHERE 条件。B是UPDATE test_table SET salary=6000 WHERE id=6，标准格式。A SET在FROM前不对；C多出FROM；D SET在WHERE后不对。"}, {"id": 120, "t": "s", "q": "关于SQLite的安装,正确的说法是:", "o": ["A. SQLite3需要购买许可证后才能安装使用", "B. 需要设置环境变量才可以运行使用SQLite3", "C. 可以运行sqlite命令,启动SQLite3", "D. 可以运行sqlite3命令,启动SQLite3"], "a": "D", "e": "D。启动SQLite3的命令是sqlite3（在终端输入sqlite3）。A不需要购买许可证（开源免费）；B不需要设置环境变量；C命令名少了个3。"}, {"id": 121, "t": "s", "q": "Cursor是Sqlite3提供的游标对象。关于Cursor,下列说法错误的是:", "o": ["A. Cursor是每行数据(记录)的集合。", "B. 使用moveToFirst()定位第一行。", "C. 使用moveToNext()移动到下一行,如果没有下一行,会报错导致程序退出。", "D. 使用close()关闭游标,释放资源。"], "a": "C", "e": "C。题干问\"错误的是\"。游标的moveToNext()在没有下一行时返回false，不会直接报错导致程序退出。报错退出不符合游标的正常设计。ABD均正确。"}, {"id": 122, "t": "s", "q": "采集数据归类为交通,则采集场景是:", "o": ["A. 遮挡多姿态人脸", "B. 单人朗读", "C. 歌曲录音采集", "D. 十字路口"], "a": "D", "e": "D。题干问交通类采集场景。\"十字路口\"是典型交通场景。A遮挡多姿态人脸属于人脸数据；B单人朗读和C歌曲录音属于语音数据。"}, {"id": 123, "t": "s", "q": "采集数据归类为人体行为,则采集场景是:", "o": ["A. 车辆", "B. 多人对话采集", "C. 多表情多姿态人脸", "D. 大叔音"], "a": "D", "e": "D。人体行为数据包括肢体动作和声音行为两大类。逐项归属：A车辆→交通类；B多人对话→语音交互类；C多表情多姿态人脸→面部图像类；D大叔音→人体发声行为特征（音色音质属于生理/行为属性）。只有D能被归入人体行为范畴。"}, {"id": 124, "t": "s", "q": "采集数据归类为人体行为,则采集场景是:", "o": ["A. 手势", "B. 道路街道", "C. 动物叫声", "D. 文本匹配"], "a": "A", "e": "A。手势是人体行为的一种。B道路街道是交通场景；C动物叫声是动物声音；D文本匹配是文本处理。"}, {"id": 125, "t": "s", "q": "采集数据归类为人体行为,则采集场景是:", "o": ["A. 方言语音采集", "B. 驾驶员行为", "C. 意图匹配", "D. 2D 人脸"], "a": "B", "e": "B。驾驶员行为（驾驶动作、疲劳状态等）属于人体行为采集。A方言语音是语音数据；C意图匹配是文本；D 2D人脸是人脸视觉数据。"}, {"id": 126, "t": "s", "q": "采集的数据类型为图片/视频,采集终端可能是:", "o": ["A. 麦克风阵列", "B. 智能音响", "C. 双目摄像头", "D. 录音笔"], "a": "C", "e": "C。双目摄像头采集图像/视频数据。A麦克风阵列和B智能音响采集音频；D录音笔采集音频。"}, {"id": 127, "t": "s", "q": "采集的数据类型为语音,采集终端可能是:", "o": ["A. 激光扫描仪", "B. 手机", "C. 鱼眼相机", "D. 深度相机"], "a": "B", "e": "B。手机内置麦克风，可用于采集语音。A激光扫描仪采集点云；C鱼眼相机和D深度相机采集图像/点云。"}, {"id": 128, "t": "s", "q": "采集的数据类型为点云,采集终端不可能是:", "o": ["A. PC", "B. 激光扫描仪", "C. 深度相机", "D. 双目相机"], "a": "A", "e": "A。PC本身不能直接采集点云数据（需要外接传感器）。B激光扫描仪、C深度相机、D双目相机都可以直接采集点云。"}, {"id": 129, "t": "s", "q": "数据类型为文本的数据格式是:", "o": ["A. jpg", "B. mp3", "C. txt", "D. avi"], "a": "C", "e": "C。txt是纯文本格式。A jpg是图片；B mp3是音频；D avi是视频。"}, {"id": 130, "t": "s", "q": "数据类型为文本的数据格式是:", "o": ["A. ape", "B. csv", "C. dat", "D. aac"], "a": "B", "e": "B。CSV是以纯文本存储的表格数据格式，属于文本数据类型。A ape是音频；C dat可能是二进制；D aac是音频。"}, {"id": 131, "t": "s", "q": "数据类型为图片的数据格式是:", "o": ["A. jpg", "B. avi", "C. mpeg", "D. aac"], "a": "A", "e": "A。JPG/JPEG是图片压缩格式。B avi是视频；C mpeg是视频；D aac是音频。"}, {"id": 132, "t": "s", "q": "数据类型为图片的数据格式是:", "o": ["A. FLV/F4V", "B. FLAC", "C. NRRD", "D. MDB"], "a": "C", "e": "C。NRRD（Nearly Raw Raster Data）是医学图像/科学可视化图片格式。A FLV/F4V是视频；B FLAC是音频；D MDB是数据库。"}, {"id": 133, "t": "s", "q": "数据类型为视频的数据格式是:", "o": ["A. CSV", "B. MP3", "C. JPEG", "D. XviD"], "a": "D", "e": "D。XviD是视频编解码格式。A CSV是文本；B MP3是音频；C JPEG是图片。"}, {"id": 134, "t": "s", "q": "数据类型为视频的数据格式是:", "o": ["A. MOV", "B. PCD", "C. JPEG", "D. ALAC"], "a": "A", "e": "A。MOV是Apple的视频格式。B PCD是点云；C JPEG是图片；D ALAC是音频。"}, {"id": 135, "t": "s", "q": "数据类型为音频的数据格式是:", "o": ["A. MPEG", "B. JPEG", "C. APE", "D. TXT"], "a": "C", "e": "C。APE是无损音频压缩格式。A MPEG是视频；B JPEG是图片；D TXT是文本。"}, {"id": 136, "t": "s", "q": "数据类型为音频的数据格式是:", "o": ["A. AVI", "B. DICOM", "C. CSV", "D. MP3"], "a": "D", "e": "D。MP3是音频压缩格式。A AVI是视频；B DICOM是医学图像；C CSV是文本。"}, {"id": 137, "t": "s", "q": "数据类型为日志的数据格式可以是:", "o": ["A. XML", "B. WAV", "C. APE", "D. JPEG"], "a": "A", "e": "A。XML格式常用于存储结构化日志数据。B WAV是音频；C APE是音频；D JPEG是图片，都不是日志格式。"}, {"id": 138, "t": "s", "q": "数据类型为数据库的数据格式可以是:", "o": ["A. MOV", "B. PCD", "C. DBF", "D. FLAC"], "a": "C", "e": "C。DBF是dBase/FoxPro数据库格式。A MOV是视频；B PCD是点云；D FLAC是音频。"}, {"id": 139, "t": "s", "q": "数据类型为数据库的数据格式可以是:", "o": ["A. MPEG", "B. JPEG", "C. Xvid", "D. MDB"], "a": "D", "e": "D。MDB是Microsoft Access数据库文件格式。A MPEG是视频；B JPEG是图片；C Xvid是视频编解码器。"}, {"id": 140, "t": "s", "q": "对数据进行归类,下列做法错误的是:", "o": ["A. 不同数据类型、来源和格式归类", "B. 根据采集场景和内容归类", "C. 根据采集终端归类", "D. 根据数据大小归类。"], "a": "D", "e": "D。题干问\"错误的是\"。根据数据大小归类不合理——数据大小是物理属性，不是业务分类标准。应按数据类型、来源、场景、终端等归类。"}, {"id": 141, "t": "s", "q": "openpyxl创建工作簿对象,正确的语句是:", "o": ["A. workbook = openpyxl.load_workbook(filename = test.xlsx)", "B. sheet = workbook[Sheet1]", "C. workbook = openpyxl.Workbook()", "D. sheet = workbook.active"], "a": "C", "e": "C。创建新工作簿用openpyxl.Workbook()。A load_workbook是打开已有文件；B是取工作表不是创建工作簿；D是获取活动工作表。"}, {"id": 142, "t": "s", "q": "openpyxl打开Excel表格text.xlsx的正确语句是:", "o": ["A. workbook = openpyxl.load_workbook(filename = test.xlsx)", "B. sheet = workbook[Sheet1]", "C. workbook = openpyxl.Workbook()", "D. sheet = workbook.active"], "a": "A", "e": "A。打开已有Excel文件用load_workbook()。B是取工作表；C是创建新工作簿；D是获取活动工作表。"}, {"id": 143, "t": "s", "q": "openpyxl从表格text.xlsx中获得表格Sheet1的正确语句是:", "o": ["A. workbook = openpyxl.load_workbook(filename = test.xlsx)", "B. sheet = workbook[Sheet1]", "C. workbook = openpyxl.Workbook()", "D. sheet = workbook.active"], "a": "B", "e": "B。从已打开工作簿中取工作表用workbook['Sheet1']。A是打开文件；C是创建新的；D取得活动工作表（不指定名称）。"}, {"id": 144, "t": "s", "q": "为了提高标注质量,在对数据进行标注前,需对采集到的数据做一些数据()工作。", "o": ["A. 整理", "B. 分类", "C. 清洗", "D. 排序"], "a": "C", "e": "C。标注前需先做数据清洗——去除脏数据、重复数据、缺失值等，保证标注质量。A整理是大概念；B分类是标注后的组织工作；D排序不是前置步骤。"}, {"id": 145, "t": "s", "q": "(          )是指发现并纠正数据文件中可识别的错误,包括检查数据一致性、处理无效值和缺失值等异常数据。", "o": ["A. 数据分割", "B. 数据监控", "C. 数据清洗", "D. 数据合并"], "a": "C", "e": "C。题干描述的\"发现并纠正错误、检查一致性、处理无效值和缺失值\"正是数据清洗的定义。A数据分割是拆数据；B监控是监督运行；D合并是拼接数据。"}, {"id": 146, "t": "s", "q": "数据清洗主要对数据异常进行相应的处理,下列不属于数据异常的是(        )", "o": ["A. 语法类异常", "B. 格式错误", "C. 覆盖类异常", "D. 语义类异常"], "a": "B", "e": "B。格式错误在题干分类体系中不属于主要数据异常类型。数据异常主要包括语法类异常（值/格式错误）、覆盖类异常（多源冲突）和语义类异常（逻辑矛盾）。"}, {"id": 147, "t": "s", "q": "语法类异常指的是表示实体的具体数据的值和格式的错误,下列不属于语法异常的是(     )", "o": ["A. 词法错误", "B. 值域格式错误", "C. 不规则的取值", "D. 违反完整性约束规则"], "a": "D", "e": "D。\"违反完整性约束规则\"属于语义类异常（逻辑层面），不是语法类异常（格式/值层面）。ABC都是语法类异常的表现。"}, {"id": 148, "t": "s", "q": "语义类异常是指数据不能全面、无重复地表示客观世界的实体,下列不属于语法异常的是(   )", "o": ["A. 数据中出现矛盾", "B. 数据中存在重复值", "C. 违反完整性约束规则", "D. 无效的元组"], "a": "C", "e": "C。这道题需要仔细读题眼——题干问的是'不属于语法异常'的选项。语法类异常指数据值或格式层面的错误（如拼写错误、格式不一致、类型不匹配）。A 拼写错误、B 数据类型不一致、D 格式不统一都属于语法异常。C'违反完整性约束规则'属于语义类异常——数据值本身没问题，但在业务逻辑层面冲突（如一个人的年龄是负数、订单的客户ID指向不存在的客户）。所以选C。"}, {"id": 149, "t": "s", "q": "下列哪个选项属于单源数据产生脏数据的原因。(            )", "o": ["A. 结构冲突", "B. 粒度不一致", "C. 命名冲突", "D. 拼写错误"], "a": "D", "e": "D。单源数据（同一系统内）产生脏数据的原因通常是拼写错误、数据录入错误等个体层面的问题。A结构冲突、B粒度不一致、C命名冲突都是多源数据整合时才出现的问题。"}, {"id": 150, "t": "s", "q": "下列哪个选项属于多源数据产生脏数据的原因(            )", "o": ["A. 缺少完整性约束", "B. 拼写错误", "C. 命名冲突", "D. 参照完整性冲突"], "a": "C", "e": "C。多源数据整合时，不同来源对同一事物的命名可能不同（如\"客户号\"vs\"用户ID\"），这就是命名冲突。A/BD更偏向单源数据的问题。"}, {"id": 151, "t": "s", "q": "对数据集中不符合规范要求的数据进行检测、修复,以提高数 据质量的过程称为(     ):", "o": ["A. 数据清洗", "B. 数据合并", "C. 数据分类", "D. 数据挖掘"], "a": "A", "e": "A。题干定义的\"检测修复不符合规范的数据\"就是数据清洗。B合并是拼接；C分类是归类；D挖掘是发现模式。"}, {"id": 152, "t": "s", "q": "我们把通过不同方法采集到的部分要求的原始数据称为(      ):", "o": ["A. 原始数据", "B. 备份数据", "C. 健康数据", "D. 脏数据"], "a": "D", "e": "D。不符合规范要求、包含错误的原始数据被称为\"脏数据\"（Dirty Data）。A原始数据范围太广；BC不相关。"}, {"id": 153, "t": "s", "q": "对于因拼写错误而产生的脏数据,一般采用的清洁方法(       )", "o": ["A. 拼写检查器来检错和纠错", "B. 人工干预法", "C. 数据重构", "D. 删除脏数据"], "a": "A", "e": "A。拼写错误用拼写检查器（如编辑距离算法）自动检测和纠正。B人工干预效率低；C数据重构用于结构性问题；D删除会损失数据。"}, {"id": 154, "t": "s", "q": "如果需要移除某个字符串头尾指定字符,可以使用Pytho的Numpy库的哪个函数来实现(      )", "o": ["A. add()", "B. index()", "C. strip()", "D. find()"], "a": "C", "e": "C。Python中移除头尾字符用strip()方法（不带参数去空格，带参数去指定字符）。题干说是\"Numpy库\"但有笔误，实际应为Python字符串方法strip()。A add()不是字符串方法；B index()是查找位置；D find()也是查找。"}, {"id": 155, "t": "s", "q": "如果需要替换某个字符串的指定字符,可以使用Pytho的Numpy库的哪个函数来实现(       )", "o": ["A. replace()", "B. index()", "C. strip()", "D. find()"], "a": "A", "e": "A。Python中替换字符串用replace('旧','新')方法。题干说Numpy库是笔误，实际是Python字符串方法。B index()找位置；C strip()去头尾；D find()查找。"}, {"id": 156, "t": "s", "q": "数字图像的每个像素(pixel)包括两个属性(    )", "o": ["A. 位置和亮度", "B. 位置和高度", "C. 位置和色调", "D. 亮度和色调"], "a": "A", "e": "A。数字图像每个像素包括位置（坐标）和亮度（灰度/颜色值）两个属性。B位置和高度中高度不准确；C色调只是颜色的一部分；D缺少位置属性。"}, {"id": 160, "t": "s", "q": "为提高图像数据的质量,在标注前对必须对所使用的图像数据进行清洗,下列哪个选项不属于图像清洗范畴(            ).", "o": ["A. 写图像文件", "B. 形变失真的图像", "C. 模糊不清的图像", "D. 相似或重复的图像"], "a": "A", "e": "A。写图像文件是文件操作不是图像清洗。BCD（形变失真、模糊、相似重复）都是需要清洗的图像质量问题。注意题眼是\"不属于\"。"}, {"id": 161, "t": "s", "q": "在图像清洗过程中为了判断图片的重复性,除了通过比较两张图片的大小、尺寸、内容等多种特征外,还可以可通过比较图片的(            )", "o": ["A. 哈希值", "B. 颜色", "C. 色调", "D. 距离"], "a": "A", "e": "A。相同图片的哈希值（如MD5、SHA-256）一定相同，可以通过比较哈希值快速判断图片是否重复。B颜色、C色调、D距离都不如哈希值精确。"}, {"id": 162, "t": "s", "q": "(         )是指将待标注数据进行最小可标注颗粒度分割,然后经由平台分发给互不知情的数据标注员来进行数据标注。", "o": ["A. 数据分割", "B. 数据分类", "C. 数据清洗", "D. 数据监控"], "a": "A", "e": "A。题干描述的是数据分割（将数据拆成最小标注单元，分发给不同标注员）。B分类是归类别；C清洗是去错误；D监控是监督过程。"}, {"id": 163, "t": "s", "q": "文本标注的对象是(     )", "o": ["A. 自然语言文本", "B. 计算机程序", "C. 图片", "D. 自然语言语音"], "a": "A", "e": "A。文本标注的对象是自然语言文本。B计算机程序不是标注对象；C图片是图像标注对象；D自然语言语音是语音标注对象。"}, {"id": 164, "t": "s", "q": "截止目前为止(2023年)文本标注主要用于(    )", "o": ["A. 人类自主学习", "B. 强化学习", "C. 监督学习", "D. 非监督学习"], "a": "C", "e": "C。文本标注主要用于监督学习——需要标注好的文本作为训练数据。A人类自主学习不需要标注；B强化学习不依赖文本标注；D非监督学习不需要标注。"}, {"id": 165, "t": "s", "q": "标注出文本一句话中的动词属于(  )", "o": ["A. 分词标注", "B. 实体标注", "C. 词性标注", "D. 词义标注"], "a": "C", "e": "C。标注出句子中词是\"动词、名词、形容词\"等词性的任务叫词性标注。A分词标注是把词切开；B实体标注是识别人名地名；D词义标注是确定词的意思。"}, {"id": 166, "t": "s", "q": "以下哪种语言的文本需要进行分词标注(       )", "o": ["A. 英文", "B. 中文", "C. 泰文", "D. 俄文"], "a": "B", "e": "B。中文词与词之间没有空格分隔（不像英文），所以需要分词标注先将连续的汉字序列切分成独立词语。A英文天然有空格不需要分词；D俄文也用空格分隔。"}, {"id": 167, "t": "s", "q": "使用 doccano 软件完成文本标注任务,具体步骤顺序为(      )", "o": ["A. 建立项目-导入语料-开始打标-添加标签-导出结果-查看结果", "B. 建立项目-导入语料-添加标签-开始打标-导出结果-查看结果", "C. 建立项目-导入语料-添加标签-导出结果-查看结果", "D. 建立项目-导入语料-开始打标-导出结果"], "a": "B", "e": "B。doccano标注的正确流程：建项目→导入语料→添加标签→开始打标→导出结果→查看结果。标签必须在打标前设置好，A错在打标后才添加标签。"}, {"id": 168, "t": "s", "q": "利用 doccano 进行文本标注时,最关键的步骤是(             )", "o": ["A. 导入语料", "B. 添加标签", "C. 开始打标", "D. 导出结果"], "a": "C", "e": "C。打标（实际操作标注）是最关键步骤——之前所有准备都为这一步服务。A导入语料和B添加标签是准备工作；D导出结果是收尾。"}, {"id": 169, "t": "s", "q": "今天是星期天,可是我们还要加班“,这句话所表达的情感是(      )", "o": ["A. 开心", "B. 愤怒", "C. 低落", "D. 悲伤"], "a": "C", "e": "C。\"星期天还要加班\"表达的是低落（无奈）的情绪。A开心（不会这样表达）；B愤怒（语气较平静）；D悲伤（没有明显的悲伤表达）。"}, {"id": 170, "t": "s", "q": "休息了一个暑假,终于开学,噢耶“,这句话所表达的情感是(      )", "o": ["A. 开心", "B. 愤怒", "C. 低落", "D. 悲伤"], "a": "A", "e": "A。\"终于开学，噢耶\"表达的是开心（期待开学）。C低落和D悲伤与语气词\"噢耶\"矛盾。B愤怒没有依据。"}, {"id": 171, "t": "s", "q": "再不退款我就投诉你!跟你没完!“这句话的情感状态是:(  )", "o": ["A. 开心", "B. 愤怒", "C. 低落", "D. 悲伤"], "a": "B", "e": "B。\"投诉你！跟你没完！\"表达的是愤怒情绪（威胁、对抗）。A开心不符合语境；C低落没有；D悲伤没有。"}, {"id": 172, "t": "s", "q": "张三在上海交通大学的霍英东体育中心看了中国男篮的一场比赛“一句中的宾语为(  )", "o": ["A. 张三", "B. 霍英东体育中心", "C. 中国男篮", "D. 比赛"], "a": "D", "e": "D。分析句子结构：主语\"张三\"→谓语\"看了\"→宾语\"比赛\"。\"在体育中心\"是地点状语，\"中国男篮的\"和\"一场\"修饰\"比赛\"。宾语核心是\"比赛\"。"}, {"id": 173, "t": "s", "q": "张三在上海交通大学的霍英东体育中心看了中国男篮的一场比赛“一句中的上海交通大学属于的实体类别为(  )", "o": ["A. PER", "B. ORG", "C. TIME", "D. LOC"], "a": "B", "e": "B。上海交通大学是组织机构（大学），实体类别为ORG（Organization）。PER是人名，LOC是地点/场所，TIME是时间。虽然学校有地理位置属性，但NER标注中「上海交通大学」的核心类别是机构而非地点。"}, {"id": 174, "t": "s", "q": "张三在上海交通大学的霍英东体育中心看了中国男篮的一场比赛“一句中的霍英东体育中心属于的实体类别为(  )", "o": ["A. PER", "B. ORG", "C. TIME", "D. LOC"], "a": "D", "e": "D。霍英东体育中心是地点/场所，实体类别为LOC（Location）。ORG是组织（如学校、公司），体育中心是建筑物地点。"}, {"id": 175, "t": "s", "q": "张三在上海交通大学的霍英东体育中心看了中国男篮的一场比赛“一句中的中国男篮属于的实体类别为(  )", "o": ["A. PER", "B. ORG", "C. TIME", "D. LOC"], "a": "B", "e": "B。中国男篮是组织/机构，实体类别为ORG。PER是人名（个人），LOC是地点，TIME是时间。"}, {"id": 176, "t": "s", "q": "下列不属于文本命名实体识别的序列标注的标注方法的是(             )", "o": ["A. FIFO(First Input First Out)", "B. BIO(Begin Inside Outside)", "C. BIOSE(Begin Inside Outside Sigle End)", "D. BMES(Begin Middle End Sigle)"], "a": "A", "e": "A。FIFO（First Input First Out）是数据结构中的队列操作原则，不是序列标注方法。BIO、BIOSE、BMES都是命名实体识别的标准标注方案。"}, {"id": 177, "t": "s", "q": "随着计算机图形图像学的发展，出现了许多如 BMP、GIF、JPG、TIF、PNG、TAG、PCX 等图像文件格式，其中用于印刷业的图像格式有 （                   ）", "o": ["A. TIF、JPG、TAG 和 PCX", "B. PNG、JPG、TAG 和 PCX", "C. GIF、JPG、TAG 和 PCX", "D. BMP、JPG、TAG 和 PCX"], "a": "A", "e": "A。这道题考察印刷业常用图像格式。在印刷/出版领域，TIFF、JPEG、TAG和PCX是常用格式，而BMP、GIF、PNG更多用于屏幕显示。按Word原题答案选A。"}, {"id": 178, "t": "s", "q": "JPEG 是一种用于连续色调静态图像压缩的标准，主要采用（      ）的联合编码方式，以去除冗余的图像和彩色数据，将图像压缩到很小的储存空间，是一种有损压缩格式文件。", "o": ["A. 预测编码、离散余弦变换和熵编码", "B. 预测编码、离散正弦变换和熵编码", "C. ASCII编码、离散余弦变换和熵编码", "D. 预测编码、离散余弦变换和ASCII编码"], "a": "A", "e": "A。JPEG压缩采用预测编码+离散余弦变换(DCT)+熵编码的联合编码方式。B离散正弦变换不是JPEG用的；C/D中ASCII编码与图像压缩无关。"}, {"id": 179, "t": "s", "q": "下列哪个工具不属于图像数据标注工具(              )", "o": ["A. LabelMe", "B. LabelImg", "C. LabelBox", "D. BRAT"], "a": "D", "e": "D。BRAT是文本标注工具，不是图像标注工具。A LabelMe、B LabelImg、C LabelBox都是图像标注工具。"}, {"id": 180, "t": "s", "q": "图像标注工具 Labelm g采用(        )格式进行数据存储。", "o": ["A. JSON", "B. XML", "C. TXT", "D. EXE"], "a": "A", "e": "A。LabelMe以JSON格式存储标注数据（包含坐标、标签、图像信息等）。B XML是LabelImg的存储格式。"}, {"id": 181, "t": "s", "q": "同时支持CSV、XML、JSON三种文件格式的标注工具(             )", "o": ["A. labelbox", "B. LabelHUB", "C. labelme", "D. BRAT"], "a": "A", "e": "A。LabelBox同时支持CSV、XML、JSON三种导出格式。B LabelHUB、C LabelMe、D BRAT不全部支持这三种。"}, {"id": 182, "t": "s", "q": "XML即可扩展标记语言,是一种允许用户对自己的标记进行定义的语言,可以用来标记数据、定义数据类型,XML由(      )组成", "o": ["A. 键值对", "B. 标签对", "C. 字典", "D. 数据对"], "a": "B", "e": "B。XML由标签对（如<name>张三</name>）组成，用开始标签和结束标签包裹内容。A键值对是JSON的特点；C字典是Python数据结构。"}, {"id": 183, "t": "s", "q": "在对图像数据进行标注时,需要对标注后的图像数据进行质量检测,下列哪个不属于质量检测项(      )", "o": ["A. 目标框是否贴合", "B. 目标类别是否正确", "C. 目标属性是否正确", "D. 目标的顺序"], "a": "D", "e": "D。\"目标的顺序\"不属于图像标注质量检测项。质检主要检查：框是否正确贴合目标（A）、目标类别判断是否正确（B）、目标属性标注是否正确（C）。顺序不影响标注正确性。"}, {"id": 184, "t": "s", "q": "下列不属于图像数据标注类型的是(         )", "o": ["A. 关键点标注", "B. 矩形框标注", "C. 多边形标注", "D. 图像匹配"], "a": "D", "e": "D。\"图像匹配\"是计算机视觉任务不是标注类型。ABC（关键点、矩形框、多边形标注）都是常见图像标注类型。"}, {"id": 185, "t": "s", "q": "正确数据标注的流程的是(            )", "o": ["A. 数据采集、数据清洗、数据标注、数据验收、数据质检", "B. 数据清洗、数据采集、数据标注、数据质检、数据验收", "C. 数据采集、数据清洗、数据标注、数据质检、数据验收", "D. 数据标注、数据清洗、数据采集、数据质检、数据验收"], "a": "C", "e": "C。正确标注流程：数据采集→数据清洗→数据标注→数据质检→数据验收。A和B的质检/验收顺序反了；D采集和清洗顺序反了。"}, {"id": 186, "t": "s", "q": "下列不属于 3D 点云数据的标注工具的是(             )", "o": ["A. BRAT", "B. Semantic Segmentation Editor", "C. Point Cloud Annotation Tool", "D. CloudCompare"], "a": "A", "e": "A。BRAT是文本标注工具，不属于3D点云标注工具。BCD都是点云标注/处理工具。"}, {"id": 187, "t": "s", "q": "音强是取决于发音体(     )的大小。", "o": ["A. 振动频率", "B. 振动相位", "C. 振动幅度", "D. 振动初相"], "a": "C", "e": "C。音强（响度）取决于振动幅度——振幅越大声音越响。A振动频率决定音高；B振动相位影响波形起始点；D振动初相也是相位相关。"}, {"id": 189, "t": "s", "q": "语音合成系统中的韵律标注一般采用(                  )的方式", "o": ["A. 基于语音信息预测韵律", "B. 基于文本信息预测韵律", "C. 基于音调信息预测韵律", "D. 基于图像信息预测韵律"], "a": "B", "e": "B。语音合成中的韵律标注是基于文本信息预测的。TTS前端对输入文本做分词、词性标注、句法分析后，预测韵律边界、重音、语调等特征。A基于语音信号预测韵律属于语音识别/分析领域，不是语音合成韵律标注的方法。"}, {"id": 190, "t": "s", "q": "视频图像的的帧率是指(      )播放的图像数量。", "o": ["A. 每分钟", "B. 每秒钟", "C. 每小时", "D. 每毫秒"], "a": "B", "e": "B。帧率fps（frames per second）指每秒钟播放的图像帧数。A每分钟；C每小时；D每毫秒都不是帧率标准单位。"}, {"id": 192, "t": "s", "q": "视频图像记录的是一个时刻的空间信息,所以视频数据记录的就既有空间信息,也有(       )信息。", "o": ["A. 时间", "B. 地点", "C. 人物", "D. 文本"], "a": "A", "e": "A。视频数据既记录空间信息（每一帧的图像内容）也记录时间信息（帧间变化、运动轨迹）。B地点、C人物、D文本都不全面。"}, {"id": 193, "t": "s", "q": "在对视频数据进行标注时,以下哪个视频属性不属标注内容(              )", "o": ["A. 视频长度", "B. 状态变化", "C. 标注物位置", "D. 属性判断"], "a": "A", "e": "A。视频长度是视频的固有属性，不是需要标注的内容（可自动获取）。BCD（状态变化、标注物位置、属性判断）都需要人工标注判断。"}, {"id": 194, "t": "s", "q": "视频数据标注主要有(             )、视频切割标注和视频连续帧标注三类。", "o": ["A. 视频长标注度", "B. 视频属性标注", "C. 视频内容标注", "D. 视频人物标注"], "a": "B", "e": "B。视频标注三大类为视频属性标注、视频切割标注、视频连续帧标注。A视频长度标注不存在。"}, {"id": 195, "t": "s", "q": "视频质量标注是对（           ）进行分档打分，以便让更优质的视频优先呈现在用户面前，提升用户对视频软件的使用体验。", "o": ["A. 视频内容的长短", "B. 视频的拍摄手法好坏", "C. 视频内容及其对应封面的质量", "D. 视频人物的善恶"], "a": "C", "e": "C。视频质量标注是对视频内容和封面的质量打分评级。A只涉及长度太窄；B拍摄手法不是质量标注的主要对象；D善恶判断太主观不是质量标注。"}, {"id": 196, "t": "s", "q": "标注员在进行视频连续帧标注前,首先要明确(      ),其次要精准掌握标注需求和相关标注规则", "o": ["A. 标注时长", "B. 标注人物", "C. 标注地点", "D. 标注对象"], "a": "D", "e": "D。视频连续帧标注前首先要明确\"标注对象\"（标什么），其次掌握标注需求和规则。A时长、B人物、C地点都是后续才确定的细节。"}, {"id": 197, "t": "s", "q": "(           )是对视频中的每一帧,采用图像标注技术,标注出对象。", "o": ["A. 单一图像法", "B. 连续帧法", "C. 图像时长标注法", "D. 图像内容标注"], "a": "B", "e": "B。\"连续帧法\"对视频每一帧用图像标注技术标注出目标对象。A单一图像法是针对单张图；C/D不是标准方法名称。"}, {"id": 198, "t": "s", "q": "Excel 是(  )的一款电子表格软件。", "o": ["A. Microsoft (微软公司)", "B. 金山软件", "C. 百度", "D. 北京奇虎科技有限公司"], "a": "A", "e": "A。Excel是Microsoft公司开发的电子表格软件。B金山软件做WPS；C百度是搜索公司；D北京奇虎是360。"}, {"id": 199, "t": "s", "q": "Excel是一款()处理软件。", "o": ["A. 文本", "B. 图形", "C. 电子表格", "D. 音频"], "a": "C", "e": "C。Excel是电子表格处理软件。A Word是文本处理软件；B Photoshop是图形处理软件；D不是Excel的功能定位。"}, {"id": 200, "t": "s", "q": "Excel 工作簿文件的缺省类型是( )", "o": ["A. TXT", "B. XLSX", "C. DOCX", "D. PPTX"], "a": "B", "e": "B。Excel工作簿默认扩展名为.xlsx（Office 2007及以后版本）。A TXT是文本文件；C DOCX是Word文档；D PPTX是PPT演示文稿。"}, {"id": 201, "t": "s", "q": "在编辑Excel工作表数据时,如要恢复误操作以前的状态可以使用()快捷键。", "o": ["A. Ctrl+C", "B. Ctrl+V", "C. Ctrl+Z", "D. Ctrl+X"], "a": "C", "e": "C。Ctrl+Z是撤销操作的快捷键（Undo）。Ctrl+C复制，Ctrl+V粘贴，Ctrl+X剪切。"}, {"id": 203, "t": "s", "q": "下列不属于Excel 主要功能的是(   )", "o": ["A. 排序与筛选", "B. 数据图表", "C. 数据分析", "D. 文字处理"], "a": "D", "e": "D。文字处理是Word的核心功能不是Excel的。ABC（排序筛选、数据图表、数据分析）都是Excel的核心功能。"}, {"id": 204, "t": "s", "q": "在Excel中系统默认一个工作薄包含3个工作表,用户对工作表()", "o": ["A. 可以增加或删除", "B. 不可以增加或删除", "C. 只能增加", "D. 只能删除"], "a": "A", "e": "A。Excel默认3个工作表，用户可以增加（点+号）或删除（右键删除）。B/C/D都说了一部分，不完整。"}, {"id": 206, "t": "s", "q": "下面哪一个选项不属于“单元格格式”对话框中数学标签的内容()", "o": ["A. 日期", "B. 货币", "C. 字体", "D. 分数"], "a": "C", "e": "C。\"字体\"属于\"字体\"标签页的内容，不在\"数字\"标签页里。日期、货币、分数都是数字格式的分类。注意题眼是\"不属于\"。"}, {"id": 207, "t": "s", "q": "在EXCEL操作过程中,当鼠标的形状为空心十字时,你可以用它去( )", "o": ["A. 拖动选择某些单元格", "B. 选择某张工作表", "C. 选择某个菜单项或图标按钮", "D. 选定某个单元格,以便输入汉字"], "a": "A", "e": "A。空心十字（默认选择光标）用于拖动选择单元格区域。B选择工作表用鼠标点击标签；C选择菜单/按钮用普通箭头；D输入需要双击单元格。"}, {"id": 208, "t": "s", "q": "某个单元格中的树值为大于0的数,但其显示却是“########”。使用何种操纵,可以正常显示实践而又不影响该单元格的数据", "o": ["A. 加大该单元格的行高", "B. 加大该单元格列宽", "C. 重新输入数据", "D. 使用复制命令复制数据"], "a": "B", "e": "B。\"######\"表示列宽不够，无法显示完整数值。加大列宽即可正常显示（数据本身未丢失）。A行高不够用\"###\"不全；C数据没错不需要重新输入。"}, {"id": 209, "t": "s", "q": "Excel中将单元格变为活动单元格的操作是()。", "o": ["A. 用鼠标单击该单元格", "B. 将鼠标指针指向该单元格", "C. 在当前单元格内键入该目标单元格地址", "D. 没必要,因为每一个单元格都是活动的"], "a": "A", "e": "A。单击单元格可将其变为活动单元格（选中状态）。B仅指向不会激活；C在名称框输入地址也可以但不够直接。"}, {"id": 210, "t": "s", "q": "在Excel工作表中,当前单元格的填充名柄在其( )", "o": ["A. 左上角", "B. 右上角", "C. 左下角", "D. 右下角"], "a": "D", "e": "D。填充柄在活动单元格右下角的小黑方块，拖动可自动填充序列数据。"}, {"id": 211, "t": "s", "q": "Excel升序排列中有空白单元格的行会被( )", "o": ["A. 不被排序", "B. 保持原有次序", "C. 放置在排序的数据清单最前", "D. 放置在排序的数据清单最后"], "a": "D", "e": "D。Excel升序排列时空白单元格默认放在排序结果的最后。A不参与排序不是完全对；B保留次序可能被打破。"}, {"id": 212, "t": "s", "q": "Excel中工作表某单元格显示为#DIV/0!这表示( )", "o": ["A. 公式错误", "B. 格式错误", "C. 行高不够", "D. 列宽不够"], "a": "A", "e": "A。#DIV/0!表示公式错误，具体是除数（分母）为0或引用了空单元格。B格式错误用#VALUE!；CD行高列宽不够用###。"}, {"id": 213, "t": "s", "q": "Excel中拆分工作表的目的是( )", "o": ["A. 把一个大的工作表分成两个或多个小的工作表", "B. 把工作表分成多小,便于管理", "C. 使表的内容展开成为明显的俩部分", "D. 当工作表很大的时候,可以通过拆分来看到工作表的不同部分"], "a": "D", "e": "D。拆分窗口（视图→拆分）将窗口分为多个区域，方便同时查看同一张工作表的不同部分（如同时看表头和底部数据）。A不是分割成独立文件。"}, {"id": 214, "t": "s", "q": "有关编辑单元格内容的说法不正确的是( )", "o": ["A. 单击待编辑的单元格,然后在编辑栏内进行编辑", "B. 双击待编辑的单元格,可对其内容进行修改", "C. 向单元格输入所有的字符数据时,必须在字符数据前加上单引号", "D. 在修改内容后按Esc键,可以取消对单元格内容的改动"], "a": "C", "e": "C。题干问\"不正确的是\"。并非所有字符数据都需要加单引号——只有需要强制文本格式的数字（如身份证号、电话号码前导0）才需加单引号。普通文字直接输入即可。"}, {"id": 215, "t": "s", "q": "在Excel中,单元格中文本数据缺省的水平对齐方式为( )", "o": ["A. 靠左对齐", "B. 靠右对齐", "C. 居中对齐", "D. 两端对齐"], "a": "A", "e": "A。Excel中文本数据默认水平对齐方式为左对齐。数字数据默认右对齐，逻辑值默认居中。"}, {"id": 216, "t": "s", "q": "在excel中要想设置行高、列宽,应选用(   )功能区中的“格式”命令", "o": ["A. 视图", "B. 插入", "C. 页面布局", "D. 开始"], "a": "D", "e": "D。行高和列宽设置在\"开始\"选项卡→\"单元格\"组→\"格式\"下拉菜单中。A视图主要管显示方式；B插入管添加元素；C页面布局管打印设置。"}, {"id": 217, "t": "s", "q": "下面关于打印Excel图表的说法不正确的是()", "o": ["A. 对于嵌入图表,在打印工作表时可以同时打印出来", "B. 图表工作表可以单独打印", "C. 嵌入图表不能单独打印,但可以作为工作表的一部分打印出来", "D. 打印某个工作表时,由它提供数据建立的图表,无论是嵌入图表,还是图表工作表都会同时打印出来"], "a": "D", "e": "D。Excel图表分两种：①嵌入图表——直接放在工作表里，打印工作表时一并打出（A对、C对）；②图表工作表——独占一个sheet的独立图表，需要选中该sheet单独打印（B对）。D错误：打印数据工作表时，独立的图表工作表不会自动跟着一起打印。记住口诀：\"嵌入随表走，独立要单打\"。"}, {"id": 218, "t": "s", "q": "将数值小于50 的所有单元格都以红色数字显示,这个样式可以使用“格式”菜单命令中的哪个命令实现?( )", "o": ["A. 单元格", "B. 样式", "C. 自动套用格式", "D. 条件格式"], "a": "D", "e": "D。条件格式可以根据单元格数值自动设置格式（如<50显示红色）。A单元格格式是手动设置不够自动；B样式是预置格式组合。"}, {"id": 219, "t": "s", "q": "如果想对工作簿进行加密,则应打开[工具]菜单栏中的哪个命令( )", "o": ["A. 修订", "B. 保护", "C. 方案", "D. 自动更正"], "a": "B", "e": "B。工作簿加密通过\"文件\"→\"信息\"→\"保护工作簿\"（或审阅→保护工作簿）实现。A修订用于追踪修改；C方案是数据分析工具；D自动更正不是加密功能。"}, {"id": 220, "t": "s", "q": "在Excel中,想要删除已有图表的一个数据系列,不能实现的操作方法是( )。", "o": ["A. 在图表中单击选定这个数据系列,按[Delete]键", "B. 在工作表中选定这个数据系列,执行编辑→清除菜单命令", "C. 在图表中单击选定这个数据系列,执行编辑→清除→系列命令", "D. 在工作表中选定这个数据系列,执行编辑→清除→内容命令"], "a": "B", "e": "B。题干问\"不能实现的是\"。在工作表中选定数据系列后用\"编辑→清除\"不能删除图表中的数据系列——只能清除工作表中的数据（这会影响图表但方法不对）。ACD都可以实现删除图表数据系列。"}, {"id": 221, "t": "s", "q": "Excel中的数据类型有()。", "o": ["A. 数值型", "B. 字符型", "C. 逻辑型", "D. 以上全部"], "a": "D", "e": "D。Excel支持数值型、字符型（文本型）、逻辑型（TRUE/FALSE）三种基本数据类型。"}, {"id": 222, "t": "s", "q": "在excel中要录入身份证号,数字分类应选择(   )格式", "o": ["A. 常规", "B. 科学计数", "C. 科学计数", "D. 文本"], "a": "D", "e": "D。身份证号为18位纯数字，Excel默认会以科学计数法显示大数字。应设置为\"文本\"格式，这样数字不会被截断或变形。AB科学计数法更不行。"}, {"id": 223, "t": "s", "q": "Excel不能进行的操作是()", "o": ["A. 自动求和", "B. 自动填充数据", "C. 自动筛选", "D. 自动排版"], "a": "D", "e": "D。Excel不能进行\"自动排版\"——排版是Word的功能。ABC（自动求和、自动填充、自动筛选）都是Excel可以自动完成的操作。"}, {"id": 224, "t": "s", "q": "在Excel的工作表中,要求出C1到C8区域的和并存放到选中的单元格中,可以输入()", "o": ["A. =SUM(C1:C8)", "B. SUM(C1:C8)", "C. =SUM(C1,C8)", "D. SUM(C1,C8)"], "a": "A", "e": "A。求和公式=SUM(C1:C8)，必须以=开头，C1:C8表示C1到C8的连续区域。B缺少等号；C用逗号表示C1和C8两个单元格不是区域。"}, {"id": 228, "t": "s", "q": "在Excel中输入公式时,如出现“#REF!”提示表示", "o": ["A. 某个数字出错", "B. 引用了无效的单元格", "C. 运算符号有错", "D. 没有可用的数值"], "a": "B", "e": "B。#REF!表示公式中引用了无效的单元格（如被删除的单元格）。A数值错用#VALUE!；C运算符号错用#NAME?。"}, {"id": 229, "t": "s", "q": "下列关于Excel公式或函数的说法中,错误的是()", "o": ["A. 公式中的乘、除号分别用*和/表示", "B. 公式复制后,被引用的地址有可能变化", "C. 函数MAX(A1:D4)引用了4个单元格", "D. 公式必须以“=”号开头"], "a": "C", "e": "C。题干问\"错误的是\"。MAX(A1:D4)引用了A1到D4共计4列×4行=16个单元格，不是4个。ABD均为正确说法：*和/确实是乘除号，复制后相对引用会变化，公式必须以=开头。"}, {"id": 6, "t": "s", "q": "为了能够清楚地反映每个销售部门的销售业绩，张先生建立了一个 Excel 表格。下列能最直接反映每个部门销售业绩高低的操作方法是（）。", "o": ["A. 筛选", "B. 排序", "C. 分类汇总", "D. 直接比较判别"], "a": "B", "e": "B。排序能最直接地将部门数据按业绩从高到低排列，一目了然看出每个部门的排名。A筛选只能显示符合条件的不能直接比较高低；C分类汇总用于分组聚合（如每个部门求和），但题干的Excel表中可能每个部门已有多条记录；D直接看眼力不可靠。"}, {"id": 233, "t": "s", "q": "当我们在F3中输入公式=SUM(F1:F2,F4:F6,C3:E3),如果将它复制到G5中去,那么G5中的内容将是", "o": ["A. =SUM(F1:F2,F4:F6,C3:E3)", "B. =SUM(G1:G2,G4:G6,D3:F3)", "C. =SUM(G3:G4,G6:G8,D5:F5)", "D. =SUM(G2:G3,G5:G7,D4:F4)"], "a": "A", "e": "C。从F3复制到G5，列右移1（F→G）行下移2（3→5）。相对引用均平移：F1:F2→G3:G4（+2行），F4:F6→G6:G8，C3:E3→D5:F5（+2行+1列）。A未移动、B/D移动方向有误。"}, {"id": 234, "t": "s", "q": "在Excel中,若要选择当前工作表的区域A2:D5和E3:F6,应()", "o": ["A. 按鼠标左键从A2拖动到D5,然后按鼠标左键从E3拖动到F6", "B. 按鼠标左键从A2拖动到D5,然后按CTRL键,并按鼠标左键从E3拖动到F6", "C. 按鼠标左键从A2拖动到D5,然后按SHIFT键,并按鼠标左键从E3拖动到F6", "D. 按鼠标左键从A2拖动到D5,然后按TAB键,并按鼠标左键从E3拖动到F6"], "a": "B", "e": "B。选择不连续区域：先选第一个区域，然后按住Ctrl键选择第二个区域。A不按Ctrl会取消第一个选择；Shift用于选连续区域；Tab不用于区域选择。"}, {"id": 235, "t": "s", "q": "在Excel工作表单元格中,输入下列表达式( )是错误的。", "o": ["A. =(15-A1)/3", "B. = A2/C1", "C. SUM(A2:A4)/2", "D. =A2+A3+D4"], "a": "C", "e": "C。题干问\"错误的是\"。Excel公式必须以=开头。C中SUM(A2:A4)/2缺少等号，不算是Excel公式（会被当作文本）。ABD都以=开头，是正确公式。"}, {"id": 236, "t": "s", "q": "下列Excel的表示中,属于绝对地址的表达式是( )。", "o": ["A. F4", "B. $C3", "C. D$", "D. $B$7"], "a": "D", "e": "D。$B$7是绝对地址（行列都锁定）。A F4是相对地址；B $C3是列绝对行相对（混合引用）；C D$是残缺格式（少数字）。"}, {"id": 237, "t": "s", "q": "假设在B1单元格存储一公式为A$5,将其复制到D1后,公式变为( )。", "o": ["A. A$5", "B. D$5", "C. C$5", "D. D$1"], "a": "C", "e": "C。B1中的公式A$5：A列无$（相对），行5有$（绝对）。复制到D1时，列从A移到D（右移3列），行不变。结果：D$5。"}, {"id": 238, "t": "s", "q": "在Excel中,哪一个关于分类汇总的说法正确的?", "o": ["A. 下一次分类汇总总要替换上一次分类汇总", "B. 分类汇总可以嵌套", "C. 只能设置一项汇总", "D. 分类汇总不能被删除"], "a": "B", "e": "B。分类汇总可以嵌套（先按字段A汇总，再按字段B对A的分类进行细分汇总）。A可以保留上次汇总（勾选\"替换当前分类汇总\"不勾选时叠加）；C可以设多项汇总；D可以删除（数据→分类汇总→全部删除）。"}, {"id": 239, "t": "s", "q": "在创建分类汇总前,必须根据分类字段对数据列表进行", "o": ["A. 筛选", "B. 排序", "C. 计算", "D. 指定"], "a": "B", "e": "B。分类汇总前必须按分类字段排序，确保同类数据连续排列。A筛选不影响分类汇总前提条件；C计算是汇总时的操作；D指定不是操作。"}, {"id": 240, "t": "s", "q": "在Excel中,分类汇总时默认的汇总方式是()", "o": ["A. 求和", "B. 计数", "C. 平均值", "D. 最大值"], "a": "A", "e": "A。分类汇总默认汇总方式是\"求和\"。在分类汇总对话框中可改为计数、平均值、最大值等。"}, {"id": 241, "t": "s", "q": "在Excel中,下面关于分类汇总的叙述错误的是(      )", "o": ["A. 分类汇总前必须按关键字段排序", "B. 进行一次分类汇总时的关键字段只能针对一个字段", "C. 分类汇总可以删除,但删除汇总后排序操作不能撤消", "D. 汇总方式只能是求和"], "a": "D", "e": "D。题干问\"错误的是\"。汇总方式不仅限于求和——还可选计数、平均值、最大值、最小值、乘积等。ABC均为正确说法。"}, {"id": 242, "t": "s", "q": "Excel中,在对某个数据库进行分类汇总之前,必须(  )", "o": ["A. 不应对数据排序", "B. 使用数据记录单", "C. 应对数据库的分类字段进行排序", "D. 设置筛选条件"], "a": "C", "e": "C。分类汇总前必须对分类字段进行排序。A说不应排序错误；B数据记录单是录入工具；D筛选不是前提。"}, {"id": 243, "t": "s", "q": "在excel的分类汇总功能中,最常用的是对分类数据求(     )", "o": ["A. 求和", "B. 求最大值", "C. 求平均值", "D. 求最小值"], "a": "A", "e": "A。分类汇总最常用的功能就是对各类数据求和。计数、平均值等是备选方式但使用频率不如求和。"}, {"id": 244, "t": "m", "q": "对于Excel的数据透视表,以下描述正确的是 ()", "o": ["A. 可以展示或折叠数据透视表内的项目", "B. 可以按照需要提取和组织数据", "C. 可以根据需要显示区域中的细节数据", "D. 可以使用行列转换按扭查看不同汇总结果"], "a": ["A", "B", "C", "D"], "e": "正确答案可以展示或折叠数据透视表内的项目、可以按照需要提取和组织数据、可以根据需要显示区域中的细节数据、可以使用行列转换按扭查看不同汇总结果。解题关键在于理解题干考察的知识点。"}, {"id": 245, "t": "s", "q": "使用数据透视表时,数值区域默认的汇总方式是()", "o": ["A. 求和", "B. 计数", "C. 平均值", "D. 最大值"], "a": "A", "e": "A。数据透视表数值区域默认汇总方式是求和（数值字段）或计数（文本字段）。与分类汇总默认相同。"}, {"id": 246, "t": "s", "q": "Excel创建图表的方式之一是使用:", "o": ["A. 模板", "B. 图文框", "C. 插入对象", "D. 图表向导"], "a": "D", "e": "D。老版本Excel中通过\"图表向导\"（现在叫\"插入图表\"）创建图表。A模板用于快速套用格式；B图文框不是创建方式；C插入对象不准确。"}, {"id": 247, "t": "s", "q": "在下列关于Excel数据透视表中切片器的叙述中,正确的是(  )。", "o": ["A. 切片器只能指定一个字段", "B. 切片器只能对应数据透视表中已有的字段", "C. 切片器只能指定连续的多个字段", "D. 只能有一个切片器"], "a": "B", "e": "B。切片器只能对应数据透视表中已有的字段。A可以指定多个字段（多个切片器）；C可以是不连续的多个字段；D可以有多个切片器。"}, {"id": 248, "t": "s", "q": "在创建数据透视表时,对源数据表的要求是(  )。", "o": ["A. 在同一行中既可以有文本也可以有数字", "B. 在数据表中可以有空行,但不能有空列", "C. 在数据表中无空行和空列", "D. 可以没有列标题"], "a": "C", "e": "C。创建数据透视表要求源数据无空行和空列（数据区域必须连续完整）。A同一行可以有文本和数字；B可以有标题行。"}, {"id": 249, "t": "s", "q": "在Excel中,数据透视表是用于(  )的。", "o": ["A. 数理统计分析", "B. 交叉汇总", "C. 叠加汇总", "D. 数据挖掘分析"], "a": "B", "e": "B。数据透视表主要用于交叉汇总（Cross-tabulation）——按行和列两个维度交叉汇总数据。A数理统计需要专业统计工具；C叠加汇总是分类汇总的特点。"}, {"id": 250, "t": "s", "q": "数据透视表字段是指(  )。", "o": ["A. 源数据中的列标题", "B. 源数据中的表名称", "C. 源数据中的行标题", "D. 源数据中的数据值"], "a": "A", "e": "A。数据透视表字段对应源数据中的列标题（表头）。B表名称是数据源名称；C行标题不是字段。"}, {"id": 251, "t": "s", "q": "在创建数据透视表时,存放数据透视表的位置(  )。", "o": ["A. 可以是新工作表,也可以是现有工作表", "B. 只能是现有工作表", "C. 只能是新工作表", "D. 可以是新工作簿"], "a": "A", "e": "A。数据透视表可以放在新工作表或现有工作表的指定位置。B/C只说了一种情况不完整；D新工作簿不对。"}, {"id": 252, "t": "s", "q": "在Excel中.假定存在着一个职工简表,要对职工工资按职称属性进行分类汇总,则在分类汇总前必须进行数据排序。所选的关键字", "o": ["A. 职工号", "B. 性别", "C. 工资", "D. 职称"], "a": "D", "e": "D。按职称分类汇总前，排序的关键字必须是职称（分类字段）。排序的目的是让同一职称的记录连续排列在一起。"}, {"id": 254, "t": "s", "q": "在excel中不可以按照()对记录进行排序", "o": ["A. 数值", "B. 字体颜色", "C. 字体大小", "D. 单元格图标"], "a": "C", "e": "C。Excel排序可以按数值、字体颜色、单元格图标排序，但不能按字体大小排序。注意题眼是\"不可以\"。"}, {"id": 255, "t": "s", "q": "‎Excel中取消工作表的自动筛选后()", "o": ["A. 工作表的数据消失", "B. 只剩下符合筛选条件的记录", "C. 不能取消自动筛选", "D. 工作表恢复原样"], "a": "D", "e": "D。取消自动筛选后，隐藏的行重新显示，工作表恢复到筛选前的完整状态。A数据消失不对；B筛选条件被移除所有记录都显示。"}, {"id": 256, "t": "s", "q": "希望“性别”一列只能从”男“、”女”两个值中进行选择,否则系统提示错误信息,最优的操作方法是(  )。", "o": ["A. 设置条件格式,标记不符合要求的数据。", "B. 设置数据验证,限制输入的“性别”列的输入内容", "C. 通过If函数进行判断,控制“性别”列的输入内容", "D. 请同事帮忙进行检查,错误内容用红色标记。"], "a": "B", "e": "B。数据验证（数据有效性）可以设置下拉列表限制输入值，输入不在列表中的值时弹出错误提示。A条件格式只能标记不能阻止输入；C IF函数只能事后判断不能限制输入；D请同事帮忙不可靠。"}, {"id": 257, "t": "s", "q": "在Excel中,对一个数据表进行排序,当在“排序”对话框中,不选 \"数据包含标题“时,该标题行(  )。", "o": ["A. 将参加排序", "B. 位置总在倒数第一行", "C. 位置总在第一行", "D. 不参加排序"], "a": "A", "e": "A。不选\"数据包含标题\"时，Excel把标题行当作普通数据参与排序。如果选了\"数据包含标题\"，标题行会固定在顶部不参与排序。"}, {"id": 258, "t": "s", "q": "数据透视图是以图表的形式表示()", "o": ["A. 饼图", "B. 柱形图", "C. 折线图", "D. 数据透视表"], "a": "D", "e": "D。数据透视图以图表形式展示数据透视表的汇总结果。A饼图、B柱形图、C折线图是具体图表类型，数据透视图可以包含这些类型但本质是透视表的可视化。"}, {"id": 259, "t": "s", "q": "在Excel工作表中,已创建好的图表中的图例可以执行(  )", "o": ["A. 按Del键可将其删除", "B. 不可改变其位置", "C. 只能在图表向导中修改", "D. 不能修改"], "a": "A", "e": "A。图例可以按Del键删除，也可以在图表元素中取消勾选重新显示。B可以改变位置（拖动或设置）；C不一定只在图表向导中修改；D可以修改。"}, {"id": 260, "t": "s", "q": "从Excel  图表中生成图表时,(  )。", "o": ["A. 图表只能嵌入在当前工作表中,不能做为新工作表保存", "B. 图表不能嵌入在当前工作表中,只能做为新工作表保存", "C. 无法从工作表产生图表", "D. 图表既可以嵌入在当前工作表中,也能做为新工作表保存"], "a": "D", "e": "D。图表既可以嵌入当前工作表（嵌入图表），也可以作为独立图表工作表（Chart Sheet）存在。两种方式都可以。"}, {"id": 261, "t": "s", "q": "​在Excel中,数据源发生变化时,相应的图表(  )。", "o": ["A. 不跟随变化", "B. 不受任何影响", "C. 手动跟随变化", "D. 自动跟随变化"], "a": "D", "e": "D。Excel图表与数据源关联，数据变化后图表自动更新。不需要手动刷新（除非涉及数据透视表）。"}, {"id": 262, "t": "s", "q": "下列有关Excel图表的说法中,错误的是(  )。", "o": ["A. 图表的类型和大小均可以更改", "B. 图表不能作为独立工作表存在", "C. 生成图表的数据改变图表也会变化", "D. 图表呈现数据形象、直观"], "a": "B", "e": "B。题干问\"错误的是\"。图表可以作为独立工作表（Chart Sheet）存在，不仅仅是嵌入方式。ACD均为正确说法：类型可改、数据变化图表也变化、图表直观。"}, {"id": 263, "t": "s", "q": "用图表来展示一年中的天气气温变化情况,最恰当的图表类型应是(  )。", "o": ["A. 面积图", "B. 饼图", "C. XY散点图", "D. 折线图"], "a": "D", "e": "D。展示气温一年变化趋势最合适用折线图，可以清晰显示温度随时间的上升下降。A面积图偏堆积；B饼图显示占比不适合连续变化；C散点图显示变量关系不适合单变量时间序列。"}, {"id": 264, "t": "s", "q": "()用于显示一个数据系列中各项的大小与各大项总和的比例, 适用于显示一个整体内各部分所占的比例。", "o": ["A. 柱状图", "B. 饼图", "C. 折线图", "D. 散点图"], "a": "B", "e": "B。题干描述\"整体内各部分比例\"最适合饼图。A柱状图用于比较大小；C折线图展示趋势；D散点图展示变量关系。"}, {"id": 265, "t": "s", "q": "()用于显示随时间而变化的连续数据。在图中,类别数据沿水平轴均匀分布,数值数据沿垂直轴均匀分布。", "o": ["A. 柱状图", "B. 饼图", "C. 折线图", "D. 散点图"], "a": "C", "e": "C。题干描述\"随时间变化的连续数据\"最适合折线图。柱状图也用于时间但更多用于比较；饼图不可做趋势；散点图是两变量关系。"}, {"id": 266, "t": "s", "q": "()常用于回归分析中,数据点在直角坐标系平面上的分布图,用两组数据构成多个坐标点,考察坐标点的分布,判断两变量之间是否存", "o": ["A. 柱状图", "B. 饼图", "C. 折线图", "D. 散点图"], "a": "D", "e": "D。题干描述\"回归分析、坐标点分布、判断变量关联\"是散点图的典型用法。"}, {"id": 267, "t": "s", "q": "以下不属于创建数据透视表的条件的是()", "o": ["A. 数据是规则数据", "B. 每个字段的数据类型一致", "C. 数据记录一定有合并单元格", "D. 数据记录不能有空白单元格"], "a": "C", "e": "C。题干问\"不属于创建数据透视表的条件\"。数据有合并单元格会影响透视表的创建（结构不规整），这不是创建条件反而是要避免的。ABD是正确条件。"}, {"id": 268, "t": "s", "q": "( )的功能是显示管理SPSS统计分析结果、报表及图形。", "o": ["A. 数据编辑窗口", "B. 结果输出窗口", "C. 数据视图", "D. 变量视图"], "a": "B", "e": "B。结果输出窗口（Output Viewer）专门显示SPSS的分析结果、报表和图形。A数据编辑窗口录入数据；C数据视图看具体数据值；D变量视图设置变量属性。"}, {"id": 269, "t": "s", "q": "SPSS的数据文件后缀名是()", "o": ["A. SAV", "B. DBF", "C. EXE", "D. COM"], "a": "A", "e": "A。SPSS数据文件后缀名为.sav（SPSS Statistics Data File）。B DBF是dBase格式；C EXE是可执行程序；D COM是命令文件。"}, {"id": 270, "t": "s", "q": "下面那一项不属于SPSS的基本变量类型。", "o": ["A. 数值型", "B. 字符串型", "C. 日期型", "D. 整数型"], "a": "D", "e": "D。SPSS基本变量类型：数值型（Numeric）、字符串型（String）、日期型（Date）。没有独立的\"整数型\"——整数是数值型的子格式。"}, {"id": 271, "t": "s", "q": "下面哪一个选项不属于SPSS的数据分析步骤", "o": ["A. 定义数据文件结构", "B. 录入、修改和编辑待分析数据", "C. 进行统计分析", "D. 数据扩展"], "a": "D", "e": "D。SPSS数据分析步骤：定义数据结构→录入编辑数据→统计分析。\"数据扩展\"不是SPSS分析的标准步骤。"}, {"id": 272, "t": "s", "q": "在SPSS数据文件中,下面那一项属于数据的内容:", "o": ["A. 变量类型", "B. 变量值说明", "C. 数据缺失值情况", "D. 数据值"], "a": "D", "e": "D。数据值（具体的记录值）属于数据文件的内容。ABC（变量类型、变量值说明、缺失值情况）都属于变量属性，不是具体数据内容。"}, {"id": 273, "t": "s", "q": "在以下SPSS软件的菜单中,可以用于计算产生变量的是", "o": ["A. Count", "B. Weight cases", "C. Compute", "D. Merge files"], "a": "C", "e": "C。Compute（计算变量）菜单可以根据已有变量计算生成新变量（如总分=平时+实验+卷面）。A Count是计数值出现次数；B Weight cases是加权；D Merge files是合并文件。"}, {"id": 274, "t": "s", "q": "下列关于SPSS的数据文件的说法,正确的是( )", "o": ["A. SPSS数据文件和Excel表格是一样的", "B. 数据文件中一行或一列是一个变量", "C. 数据文件中有变量视窗和数据视窗两个视窗", "D. SPSS数据文件可以用Excel打开"], "a": "C", "e": "C。SPSS数据文件有变量视图（Variable View）和数据视图（Data View）两个视窗。A SPSS和Excel格式不同（.sav vs .xlsx）；B一行是一个个案（case）一列是一个变量；D .sav文件Excel不能直接打开。"}, {"id": 275, "t": "s", "q": "在SPSS中,当需要对变量进行频数分析时,需要选择下面那一项菜单", "o": ["A. 视图", "B. 文件", "C. 分析", "D. 图形"], "a": "C", "e": "C。频数分析通过\"分析\"菜单（Analyze→Descriptive Statistics→Frequencies）实现。A视图管界面显示；B文件管文件操作；D图形管图表绘制。"}, {"id": 276, "t": "s", "q": "SPSS的安装类型有( )", "o": ["A. 典型安装", "B. 压缩安装", "C. 用户自定义安装", "D. 以上都是"], "a": "D", "e": "D。SPSS安装提供三种类型供选择：典型安装（默认推荐，安装最常用组件）、压缩安装（节省磁盘空间）和自定义安装（用户选择需要的模块）。三种类型满足不同用户需求。"}, {"id": 277, "t": "s", "q": "SPSS 软件是 20 世纪 60 年代末,由 ()大学的三位研究生最早研制开发的。", "o": ["A. 哈佛大学", "B. 斯坦福大学", "C. 波士顿大学", "D. 剑桥大学"], "a": "B", "e": "B。SPSS由斯坦福大学的三位研究生（Norman Nie等）于1968年研制开发。A哈佛、C波士顿、D剑桥都不是SPSS的起源地。"}, {"id": 278, "t": "s", "q": "(  )文件格式是 SPSS 独有的,一般无法通过 Word,Excel 等其他软件打开", "o": ["A. SAV", "B. RTF", "C. SWF", "D. MOV"], "a": "A", "e": "A。.sav是SPSS独有的数据文件格式，其他软件（Word、Excel）无法直接打开。B RTF是富文本格式可被Word打开；SWF是Flash格式；MOV是视频格式。"}, {"id": 279, "t": "s", "q": "SPSS中提供的图形编辑功能是( )", "o": ["A. Edit", "B. chart editor", "C. bar", "D. view"], "a": "B", "e": "B。SPSS的图形编辑功能叫Chart Editor，双击图表即可进入。A Edit是通用编辑；C bar是一种图表类型；D view是视图。"}, {"id": 282, "t": "s", "q": "回归分析的第一步是( )。", "o": ["A. 确定解释和被解释变量", "B. 确定回归模型", "C. 建立回归方程", "D. 进行检验"], "a": "A", "e": "A。回归分析第一步是确定解释变量（自变量X）和被解释变量（因变量Y）。B确定模型类型是第二步；C建立方程是第三步。"}, {"id": 283, "t": "s", "q": "对于SPSS来说,能够快捷找到变量数据的最大值和最小值的数据预处理方法是", "o": ["A. 排序", "B. 分类汇总", "C. 变量计算", "D. 分组"], "a": "A", "e": "A。排序可以快速将数据按某变量从小到大或从大到小排列，直接找到最大最小值。B分类汇总用于分组统计；C变量计算生成新变量；D分组用于分类分析。"}, {"id": 284, "t": "s", "q": "在进行数据的统计分析之前,一般需要完成数据的预处理,以下哪一项不属于数据的预处理内容", "o": ["A. 缺失值和异常数据的处理", "B. 峰度和偏度处理", "C. 数据的转换处理", "D. 数据抽样"], "a": "B", "e": "B。数据的峰度和偏度是统计分析的结果（描述数据分布形态），不是预处理的内容。预处理包括缺失值处理、数据转换、抽样等。"}, {"id": 285, "t": "s", "q": "在SPSS中,均值的计算适合下面那一项", "o": ["A. 定距型", "B. 定类型", "C. 定序型", "D. 全都适合"], "a": "A", "e": "A。均值适用于定距型变量（如身高、体重、温度等连续数值）。定类型（如性别：男/女）和定序型（如等级：优/良/差）求均值无意义。"}, {"id": 286, "t": "s", "q": "在统计分析中,描述变量数据分布的对称程度的基本统计量是", "o": ["A. 标准差", "B. 偏度", "C. 峰度", "D. 均值"], "a": "B", "e": "B。偏度（Skewness）描述数据分布的不对称程度：偏度>0右偏（长尾在右），偏度<0左偏（长尾在左）。A标准差衡量离散程度；C峰度衡量陡峭程度；D均值衡量中心位置。"}, {"id": 287, "t": "s", "q": "下面那一种说法是正确的:", "o": ["A. 偏度大于零,则数据分布的长尾巴在右边", "B. 偏度大于零,则数据分布的长尾巴在左边", "C. 偏度大于零,则数据分布没有尾巴", "D. 偏度等于零,则数据分布的长尾巴在左边"], "a": "A", "e": "A。偏度大于0意味着数据分布右偏：右侧有长尾巴，即少数很大的值将分布拉向右边。B说长尾在左边对应偏度小于0。"}, {"id": 288, "t": "s", "q": "设置变量属性时,不属于SPSS提供的变量类型的是( )。", "o": ["A. 数值型", "B. 科学计数型", "C. 分数型", "D. 字符型"], "a": "C", "e": "C。SPSS变量类型不包括\"分数型\"。数值型、科学计数型、字符型（字符串型）都是SPSS支持的变量类型。分数需要以小数形式存储。"}, {"id": 290, "t": "s", "q": "在横向合并数据文件时.两个数据文件都必须事先按关键变量值( )。", "o": ["A. 升序排序", "B. 降序排序", "C. 不排序", "D. 可升可降"], "a": "A", "e": "A。横向合并两个数据文件时，必须按关键变量（如ID号）升序排序，确保记录能正确匹配。降序、不排序或随意排序可能导致匹配错误。"}, {"id": 291, "t": "s", "q": "通过( )可以达到将数据编辑窗口中的计数数据还原为原始数据的目的。", "o": ["A. 数据转置", "B. 加权处理", "C. 数据拆分", "D. 以上不都是"], "a": "B", "e": "B。加权处理（Weight Cases）可以将汇总计数数据还原为原始个案数据。A数据转置是行列互换；C数据拆分是按变量分组分析。"}, {"id": 292, "t": "s", "q": "产品代码、姓名等变量一般定义成( )数据类型。", "o": ["A. 字符型", "B. 数值型", "C. 日期型", "D. 圆点型"], "a": "A", "e": "A。产品代码（如\"A001\"）、姓名等文本标识一般定义为字符型（String）。数值型用于可计算的数字，日期型用于时间。"}, {"id": 293, "t": "s", "q": "SPSS 的主要操作流程大致可以分为五部分,其中第一步是:", "o": ["A. 数据读入", "B. 数据预处理", "C. 结果解读", "D. 模型处理"], "a": "A", "e": "A。SPSS操作流程第一步是数据读入（导入/录入数据）。只有数据进入SPSS后才能进行预处理和后续分析。"}, {"id": 294, "t": "s", "q": "在SPSS中,下面那一项不属于数据分组的目的。", "o": ["A. 有利于连续数据的频数分析", "B. 可实现连续数据的离散化", "C. 更能概括和体现出数据的分布特征", "D. 有利于进行因子分析"], "a": "D", "e": "D。因子分析是数据降维和结构探测，不属于数据分组的目的。ABC均为数据分组的正确目的：频数分析、离散化、概括分布特征。"}, {"id": 295, "t": "s", "q": "在统计分析中,描述变量数据分布的中心位置的基本统计量是:", "o": ["A. 标准差", "B. 偏度", "C. 峰度", "D. 均值"], "a": "D", "e": "D。描述数据分布中心位置的基本统计量是均值（算术平均数）。A标准差衡量离散程度；B偏度衡量对称性；C峰度衡量陡峭程度。"}, {"id": 296, "t": "s", "q": "在统计分析中,描述变量的数据分布的陡峭程度的基本统计量是:", "o": ["A. 标准差", "B. 偏度", "C. 峰度", "D. 均值"], "a": "C", "e": "C。描述数据分布陡峭程度的基本统计量是峰度（Kurtosis）。峰度>0比正态更陡峭（尖峰），峰度<0比正态更平坦。"}, {"id": 297, "t": "s", "q": "在学生的一张数据表中,有平时分数、实验分数和卷面分数,如使用SPSS计算最终得分,则需要使用SPSS预处理中的是(   )。", "o": ["A. 排序", "B. 分类汇总", "C. 变量计算", "D. 分组"], "a": "C", "e": "C。需要将平时、实验、卷面分数按一定权重计算最终得分，这就需要用SPSS的Compute（变量计算）功能创建新变量。A排序只是排顺序不做计算；B分类汇总用于分组聚合。"}, {"id": 298, "t": "s", "q": "描述统计是统计分析的基础,它包括数据()。", "o": ["A. 收集、整理、显示", "B. 提取、分析、删减", "C. 统计、输出", "D. 提取、分析、输出"], "a": "A", "e": "A。描述统计包括数据的收集、整理和显示（展示）。B少了整理；C缺了收集和整理且\"统计\"太笼统；D\"提取分析输出\"更偏向数据分析/建模流程，不是描述统计的基础任务。"}, {"id": 299, "t": "s", "q": "当在SPSS数据文件中输入变量为“职工姓名”,则应选择的变量类型是:", "o": ["A. 数值型", "B. 字符串型", "C. 日期型", "D. 整数型"], "a": "B", "e": "B。\"职工姓名\"是文本内容，应设置变量类型为字符串型（String）。A数值型用于数字（如年龄）；C日期型用于时间；D整数型是数值型的子类。"}, {"id": 300, "t": "s", "q": "在高考志愿调查中.问你的报考志愿是那些大学.可以用( )分析。", "o": ["A. 频数分析", "B. 多选项分析", "C. 相关分析", "D. 聚类分析"], "a": "B", "e": "B。高考志愿是多选题（一个人可报多所大学），适合用多选项分析（Multiple Response Analysis）。A频数分析只能分析单选；C相关分析看变量关系；D聚类分析用于分组。"}, {"id": 301, "t": "s", "q": "方差齐性检验是对控制变量不同水平下各观测变量( )是否相等进行分析。", "o": ["A. 总体方差", "B. 总体均值", "C. 总体标准差", "D. 个体均值"], "a": "A", "e": "A。方差齐性检验（Levene检验）是检验各组的总体方差是否相等。方差分析的前提假设之一就是各组方差齐性。B检验均值用t检验/F检验。"}, {"id": 302, "t": "s", "q": "下列不属于测度数据集中趋势的统计量有()。", "o": ["A. 方差", "B. 平均值", "C. 中位数", "D. 众数"], "a": "A", "e": "A。方差衡量的是离散程度，不是集中趋势。集中趋势的统计量包括均值（B）、中位数（C）和众数（D）。"}, {"id": 303, "t": "s", "q": "下列关于方差分析说法错误的是()。", "o": ["A. 判断因素的水平是否对因变量有影响,实际上就是比较组间方差与组内方差之间差异的大小", "B. 组间方差包含系统误差和随机误差", "C. 组间方差和组内方差的大小均与观测量大小有关", "D. 在原假设成立的情况下,可以根据组间方差和组内方差的比值构造一个服从卡方分布的统计量"], "a": "D", "e": "D。题干问\"错误的是\"。方差分析的F统计量在原假设成立时服从F分布，不是卡方分布。ABC均为方差分析的正确描述。"}, {"id": 304, "t": "s", "q": "对于SPSS来说,下面那一项不包括在变量的频数分布内容中。", "o": ["A. 频数", "B. 百分比", "C. 标准差", "D. 累积百分比"], "a": "C", "e": "C。标准差是离散程度指标，不属于频数分布的内容。频数分布内容包括频数、百分比、有效百分比和累积百分比。"}, {"id": 305, "t": "s", "q": "()即变量值落在某个区间中的次数。", "o": ["A. 频数", "B. 百分比", "C. 有效百分比", "D. 累计百分比"], "a": "A", "e": "A。频数（Frequency）就是变量值落在某区间的次数。B百分比是相对比例。"}, {"id": 306, "t": "s", "q": "()即各频数占总样本数的百分比。", "o": ["A. 频数", "B. 百分比", "C. 有效百分比", "D. 累计百分比"], "a": "B", "e": "B。百分比（Percent）是各频数占总样本数的比值。A频数是绝对次数。"}, {"id": 307, "t": "s", "q": "()即各百分比逐级累加起来的结果。最终取值为百分之百。", "o": ["A. 频数", "B. 百分比", "C. 有效百分比", "D. 累计百分比"], "a": "D", "e": "D。累计百分比（Cumulative Percent）是各百分比逐级累加的结果，最终为100%。"}, {"id": 308, "t": "s", "q": "不属于集中趋势的特征值的是()。", "o": ["A. 算术平均数", "B. 标准差", "C. 调和平均数", "D. 几何平均数"], "a": "B", "e": "B。标准差是离散趋势的特征值，不是集中趋势。集中趋势包括算术平均数、调和平均数、几何平均数等。"}, {"id": 309, "t": "s", "q": "集中趋势的特征值有()。", "o": ["A. 全距", "B. 内距", "C. 方差", "D. 众数"], "a": "D", "e": "D。众数是集中趋势的特征值（出现最频繁的值）。A全距（极差）、B内距（四分位距）、C方差都是离散趋势的特征值。"}, {"id": 310, "t": "s", "q": "方差分析认为观测变量值的变化受两类因素的影响.下列选项中不对的是( )。", "o": ["A. 显著因素", "B. 控制因素", "C. 随机因素", "D. 随机变量"], "a": "A", "e": "A。方差分析认为观测变量受两类因素影响：控制因素（分组变量，可被实验控制）和随机因素（不可控的随机误差）。\"显著因素\"不是方差分析的基本分类。"}, {"id": 311, "t": "s", "q": "单因素方差分析的第一个基本步骤是( )。", "o": ["A. 提出原假设", "B. 选择检验统计量", "C. 计算检验统计量的观测值和概率P值", "D. 给定显著性水平α.并作出决策"], "a": "A", "e": "A。单因素方差分析第一步是提出原假设H0（各组均值相等）。B选择检验统计量是第二步。"}, {"id": 312, "t": "s", "q": "多因素方差分析是用来研究两个及两个以上控制变量是否对观测变量产生( )。", "o": ["A. 显著", "B. 不显著", "C. 随机", "D. 不随机"], "a": "A", "e": "A。多因素方差分析用来研究两个及以上控制变量（因素）是否对观测变量产生显著影响。\"显著\"是统计术语——有统计学意义。"}, {"id": 313, "t": "s", "q": "以下属于描述离散趋势的统计量的是:", "o": ["A. 中位数", "B. 众数", "C. 标准差", "D. 算术平均数"], "a": "C", "e": "C。标准差是离散趋势的统计量（衡量数据分散程度）。ABD（中位数、众数、算术平均数）都是集中趋势的统计量。"}, {"id": 314, "t": "s", "q": "离散趋势的特征值有()。", "o": ["A. 算术平均数", "B. 调和平均数", "C. 几何平均数", "D. 离散系数"], "a": "D", "e": "D。离散系数（CV=标准差/均值）是离散趋势特征值。ABC都是集中趋势的特征值。"}, {"id": 315, "t": "s", "q": "分布特征值有()。", "o": ["A. 算术平均数", "B. 峰度系统", "C. 几何平均数", "D. 调和平均数"], "a": "B", "e": "B。峰度系数是分布形态特征值（描述陡峭程度）。ACD都是集中趋势特征值。"}, {"id": 316, "t": "s", "q": "在图表对话框中,图表类型不包含是()。", "o": ["A. 条形图", "B. 饼图", "C. 直方图", "D. 散点图"], "a": "C", "e": "C。在旧版Excel的图表对话框中，常规图表类型包括条形图、饼图、XY散点图，直方图通常通过分析工具库或统计图表功能生成，不在图表对话框的常规类型中。"}, {"id": 317, "t": "s", "q": "在SPSS中,下面那一项不是频数分析中常用的统计图形。", "o": ["A. 柱状图或者条状图", "B. 饼图", "C. 直方图", "D. 分类图"], "a": "D", "e": "D。\"分类图\"不是频数分析中的标准统计图形。频数分析常用柱状图/条形图、饼图和直方图。"}, {"id": 318, "t": "s", "q": "简单散点图是表示( )变量间得统计关系的散点图。", "o": ["A. 一对", "B. 两对", "C. 三对", "D. 多对"], "a": "A", "e": "A。简单散点图表示一对变量间的统计关系（一个X轴变量+一个Y轴变量）。"}, {"id": 319, "t": "s", "q": "三维散点图以( )形式展现三对变量间的统计关系。", "o": ["A. 立体图", "B. 扇形", "C. 方形", "D. 菱形"], "a": "A", "e": "A。三维散点图以立体图形式展示三对变量（X-Y、X-Z、Y-Z）间的统计关系。"}, {"id": 320, "t": "s", "q": "分析学历对工资收入的影响.( )是控制变量。", "o": ["A. 学历", "B. 学历的等级", "C. 工资收入", "D. 工资收入的等级"], "a": "A", "e": "A。在分析学历对工资的影响中，学历是自变量/控制变量（可能影响工资的因素），工资收入是因变量/观测变量（被影响的结果）。"}, {"id": 321, "t": "s", "q": "( )筛选是解释变量不断进入回归方程的过程。", "o": ["A. 向前", "B. 向后", "C. 逐步", "D. 向右"], "a": "A", "e": "A。向前筛选（Forward）是解释变量不断进入回归方程的过程（从无到有，逐个添加）。B向后筛选是从全模型逐个剔除；C逐步筛选结合向前和向后。"}, {"id": 322, "t": "s", "q": "聚类分析中.个体之间的“( )”是极为重要的.它将直接影响最终的聚类结果。", "o": ["A. 远近程度", "B. 亲疏程度", "C. 大小程度", "D. 高低程度"], "a": "B", "e": "B。聚类分析中个体间的\"亲疏程度\"（相似度/距离）决定了聚类结果——相似度高的归为一类。A远近程度不够专业准确。"}, {"id": 323, "t": "s", "q": "个体间的( )通常通过某种距离来测度。", "o": ["A. 差异程度", "B. 相似程度", "C. 相异程度", "D. 相同程度"], "a": "B", "e": "B。题干接上一道：个体间的\"亲疏程度\"通常通过某种距离（如欧氏距离、余弦相似度）来测度相似程度。"}, {"id": 324, "t": "s", "q": "下列可以起到降维作用的是( )。", "o": ["A. 回归分析", "B. 层次聚类", "C. 因子分析", "D. 相关分析"], "a": "C", "e": "C。因子分析是典型的降维方法——将多个变量浓缩为少数几个因子。A回归分析是建立关系模型；B层次聚类是分类；D相关分析是衡量关联度。"}, {"id": 325, "t": "s", "q": "变量之间的关系可以分为两大类.它们是( )。", "o": ["A. 函数关系与相关关系", "B. 线性相关关系和非线性相关关系", "C. 正相关关系和负相关关系", "D. 简单相关关系和复杂相关关系"], "a": "A", "e": "A。变量间关系可分为函数关系（确定性的，如y=2x）和相关关系（非确定性的，如身高和体重趋势相关）。"}, {"id": 326, "t": "m", "q": "层次聚类有两种类型.分别是( )。", "o": ["A. 凝聚方式聚类", "B. 分解方式聚类", "C. Q型聚类", "D. R型聚类"], "a": ["A", "B"], "e": "正确答案凝聚方式聚类、分解方式聚类。解题关键在于理解题干考察的知识点。"}, {"id": 327, "t": "s", "q": "层次聚类又称( )聚类", "o": ["A. 系统聚类", "B. 非系统聚类", "C. 凝聚方式聚类", "D. 分解方式聚类"], "a": "A", "e": "A。层次聚类又称系统聚类（Hierarchical Clustering）。凝聚方式和分解方式是具体类型不是别名。"}, {"id": 328, "t": "s", "q": "在MySQL中,可以使用(    )关键字指定当前工作数据库。", "o": ["A. use", "B. uses", "C. used", "D. using"], "a": "A", "e": "A。MySQL中使用USE关键字指定当前工作数据库，语法：USE 数据库名。B uses不存在；C used是过去式；D using用于JOIN语法。"}, {"id": 329, "t": "s", "q": "(    )不是MySQL的数据类型。", "o": ["A. int", "B. char", "C. string", "D. date"], "a": "C", "e": "C。MySQL中没有string类型，文本类型用VARCHAR或CHAR。A int（整数）、B char（定长字符）、D date（日期）都是MySQL数据类型。"}, {"id": 330, "t": "s", "q": "使用(    )可以修改数据库表结构。", "o": ["A. alter table", "B. modify table", "C. update table", "D. alter structed"], "a": "A", "e": "A。修改表结构用ALTER TABLE语句（如添加列、修改列类型、删除列等）。B modify不是标准DDL命令；C UPDATE修改数据不是表结构。"}, {"id": 331, "t": "s", "q": "使用(    )可以对name列进行倒序排列。", "o": ["A. order by desc name", "B. order by name desc", "C. order by asc name", "D. order by name asc"], "a": "B", "e": "B。倒序排列语法：ORDER BY name DESC。ASC是正序。A把DESC放在列名前语法错；C是正序不是倒序。"}, {"id": 332, "t": "s", "q": "(    )可以用来求个数。", "o": ["A. sum", "B. avg", "C. count", "D. max"], "a": "C", "e": "C。COUNT()函数用于统计行数/个数。A SUM求和；B AVG求平均值；D MAX求最大值。"}, {"id": 333, "t": "s", "q": "在SQL语句中有between 10 and 20,则表示(    )。", "o": ["A. 包括10但不包括20", "B. 包括10和20", "C. 不包括10但包括20", "D. 不包括10和20"], "a": "B", "e": "B。BETWEEN 10 AND 20表示闭区间[10,20]，包括边界值10和20。ACD对边界值的描述都不正确。"}, {"id": 334, "t": "s", "q": "当创建数据库或表时,使用(    )关键字。", "o": ["A. alter", "B. modify", "C. create", "D. new"], "a": "C", "e": "C。CREATE关键字用于创建数据库（CREATE DATABASE）和表（CREATE TABLE）。A ALTER修改已有结构；B MODIFY修改列定义。"}, {"id": 335, "t": "s", "q": "select * from student该SQL语句中的*表示(    )。", "o": ["A. 就是字符*号", "B. 模糊查询", "C. 错误信息", "D. 所有列名"], "a": "D", "e": "D。SELECT * 中的*是通配符，表示\"所有列\"。不是模糊查询（B），模糊查询用LIKE。"}, {"id": 336, "t": "s", "q": "(    )可以用来求总和。", "o": ["A. min", "B. sum", "C. count", "D. avg"], "a": "B", "e": "B。SUM()函数用于求某列数值的总和。A MIN求最小值；C COUNT计数；D AVG求平均值。"}, {"id": 337, "t": "s", "q": "(    )表示降序排列。", "o": ["A. desc", "B. asc", "C. esc", "D. dsc"], "a": "A", "e": "A。DESC（descending降序）是ORDER BY中的降序关键字。B ASC是升序；C ESC是Escape缩写不是排序关键字。"}, {"id": 338, "t": "s", "q": "在mysql中,创建数据库使用(    )。", "o": ["A. create database命令", "B. create table命令", "C. create index命令", "D. new database命令"], "a": "A", "e": "A。创建数据库用CREATE DATABASE命令。B CREATE TABLE创建表；C CREATE INDEX创建索引。"}, {"id": 339, "t": "s", "q": "查找数据库中所有的表,可以使用(    )。", "o": ["A. show database", "B. show tables", "C. show databases", "D. show table"], "a": "B", "e": "B。SHOW TABLES显示当前数据库中的所有表。A/D显示数据库列表；SHOW TABLE（单数）语法不标准。"}, {"id": 340, "t": "s", "q": "(    )可以用来求最大值。", "o": ["A. min", "B. if", "C. max", "D. sum"], "a": "C", "e": "C。MAX()函数求某列的最大值。A MIN求最小值；B IF是条件判断；D SUM求和。"}, {"id": 341, "t": "s", "q": "使用SQL条件为(    )可以查询name不为空的数据。", "o": ["A. where name !NULL", "B. where name is not null", "C. where name != null", "D. where name not null"], "a": "B", "e": "B。查询name不为空用WHERE name IS NOT NULL。A中!NULL不是SQL语法；C中!= null不正确（NULL用IS判断不用=）；D语法不完整。"}, {"id": 342, "t": "s", "q": "在SQL中,会使用到select,update,insert,delete等语句,通常来说,使用最频繁,最重要的语句是(    )。", "o": ["A. select", "B. insert", "C. update", "D. delete"], "a": "A", "e": "A。SELECT是最常用最重要的SQL语句——用于查询数据，是数据分析和报表的基础。使用频率远超INSERT/UPDATE/DELETE。"}, {"id": 343, "t": "s", "q": "显示当前所有数据库的命令是(    )。", "o": ["A. list database", "B. list databases", "C. show database", "D. show databases"], "a": "D", "e": "D。显示所有数据库用SHOW DATABASES命令。A/B中的LIST不是SQL关键字；C SHOW DATABASE（单数）语法不对。"}, {"id": 344, "t": "s", "q": "(    )指令可以删除数据库。", "o": ["A. drop table", "B. delete table", "C. delete database", "D. drop database"], "a": "D", "e": "D。删除数据库用DROP DATABASE命令。A DROP TABLE删除表；B/D用DELETE ——DELETE只删数据不删结构。"}, {"id": 345, "t": "s", "q": "Excel工作表中(    )函数是求平均值。", "o": ["A. sum", "B. avg", "C. count", "D. max"], "a": "B", "e": "B。按本套题库口径，avg被视为Excel中求平均值的函数（虽然实际Excel函数是AVERAGE）。题干选项与Excel实际函数名不严格匹配，按题库应试答案选B。A sum求和；C count计数；D max最大值。"}, {"id": 346, "t": "s", "q": "在Excel中,如果某个单元格显示多个#(比如:####),表示(    )。", "o": ["A. 列宽不够", "B. 行高不够", "C. 数据错误", "D. 公式错误"], "a": "A", "e": "A。\"####\"表示列宽不够显示数字（数字太长或被格式化为日期后列不够宽）。B行高不够显示不全行；C数据错误用#VALUE!等；D公式错误用#REF!等。"}, {"id": 347, "t": "s", "q": "Excel文件称之为(    )。", "o": ["A. 数据库", "B. 单元格", "C. 工作簿", "D. 工作表"], "a": "C", "e": "C。Excel文件称为工作簿（Workbook，.xlsx文件）。工作表（Worksheet）是工作簿中的一个标签页。"}, {"id": 348, "t": "s", "q": "在Excel图表中,用(    )能表现数据的变化趋势。", "o": ["A. 柱状图", "B. 折线图", "C. 条形图", "D. 饼图"], "a": "B", "e": "B。折线图最适合展示数据的变化趋势（随时间/序列的上升下降走向）。A柱状图用于数值比较；C条形图是横向柱状图；D饼图展示比例。"}, {"id": 349, "t": "s", "q": "Excel中最小的单位是(    )。", "o": ["A. 单元格", "B. 工作簿", "C. 文件", "D. 工作表"], "a": "A", "e": "A。Excel最小操作单位是单元格（Cell）。多个单元格组成工作表，多张工作表组成工作簿。"}, {"id": 350, "t": "s", "q": "在Excel中若输入的数字超过单元格能显示的位数时,则以(    )表示。", "o": ["A. 百分比", "B. 货币", "C. 科学记数", "D. 自定义"], "a": "C", "e": "C。数字超过列宽时Excel自动以科学记数法显示（如1.23E+10）。A百分比是格式设置；B货币有专门格式。"}, {"id": 351, "t": "s", "q": "以下关于Excel说法正确的是(    )。", "o": ["A. 一个工作簿只能包含一个工作表", "B. 一个工作簿可以包含多个工作表", "C. 工作簿就是工作表", "D. 一个工作表可以包含多个工作簿"], "a": "A", "e": "正确。题干描述的是SPSS中将分组变量移入因子列表的标准操作流程。①因子列表就是存放分组变量（分类自变量）的位置，操作就是从源变量框选中变量点箭头进入因子列表，题干描述准确。②\"观察值\"指变量取到的类别水平（如性别变量取\"男\"\"女\"），按观察值分组即按分类变量的不同类别分组，表述正确。"}, {"id": 352, "t": "s", "q": "Excel功能区上的(    )命令允许您将新工作表插入工作簿?", "o": ["A. 文件", "B. 主页", "C. 插入", "D. 查看"], "a": "C", "e": "C。通过\"开始\"或\"插入\"选项卡中的\"插入工作表\"命令可以添加新工作表。按本题选项选C（插入选项卡）。"}, {"id": 353, "t": "s", "q": "(    )函数将计算Excel中一系列单元格的平均值?", "o": ["A. 格式", "B. 查看", "C. 编辑", "D. 插入"], "a": "D", "e": "D。平均值函数在Excel中的入口是\"公式\"→\"插入函数\"对话框。在Excel中通过\"公式\"→\"插入函数\"（或fx按钮）→选择AVERAGE函数来计算平均值。按题库口径选D\"插入\"——指插入函数对话框。"}, {"id": 354, "t": "s", "q": "Excel中的(    )函数将计算一系列单元格的总和。", "o": ["A. count", "B. max", "C. min", "D. sum"], "a": "D", "e": "D。SUM函数计算一系列单元格的总和。A COUNT计数；B MAX最大值；C MIN最小值。"}, {"id": 355, "t": "s", "q": "(    )公式可以在Excel中将两个单元格的内容相乘。", "o": ["A. =A1*A2", "B. =A1+A3", "C. =A1/A4", "D. =A1-A5"], "a": "A", "e": "A。乘法用星号*：=A1*A2表示A1单元格的值乘以A2单元格的值。B是加法；C是除法；D是减法。"}, {"id": 356, "t": "s", "q": "Excel中的(    )命令允许隐藏行或列。", "o": ["A. Hide", "B. Delete", "C. Format", "D. Insert"], "a": "A", "e": "A。Hide（隐藏）命令可以隐藏选中的行或列。B Delete是删除不是隐藏；C Format是格式设置；D Insert是插入。"}, {"id": 357, "t": "s", "q": "打开Excel帮助菜单的快捷键是(    )。", "o": ["A. Ctrl+H", "B. F1", "C. Alt+H", "D. Ctrl+Shift+L"], "a": "B", "e": "B。F1是Excel帮助菜单的快捷键。A Ctrl+H是查找替换；C Alt+H是激活\"开始\"选项卡；D Ctrl+Shift+L是切换筛选。"}, {"id": 358, "t": "s", "q": "Excel中的(    )命令允许将两个或多个单元格合并为一个。", "o": ["A. Merge", "B. Split", "C. Format Cells", "D. Insert"], "a": "A", "e": "A。Merge（合并）命令将选中的多个单元格合并为一个单元格。B Split是拆分（不是合并）；C Format Cells是格式设置对话框。"}, {"id": 359, "t": "s", "q": "以下关于Docker安装说法错误的是(    )。", "o": ["A. CentOS安装Docker有两种方式:一,curl获取脚本安装,另外是yum仓库安装", "B. 可通过docker version命令参看Docker版本信息", "C. Docker服务端和客户端必须运行在一台机器上", "D. .Docker支持在Windows、Linux、MacOS等系统上安装"], "a": "C", "e": "C。题干问\"错误的是\"。Docker服务端和客户端可以运行在不同机器上（远程Docker）。ABD均为正确说法。"}, {"id": 360, "t": "s", "q": "Docker是一种(    )的虚拟化技术?", "o": ["A. 全虚拟化", "B. 半虚拟化", "C. 容器虚拟化", "D. 轻量级虚拟化"], "a": "C", "e": "C。Docker是容器虚拟化技术（Container Virtualization），共享宿主操作系统内核，比传统虚拟机更轻量。A全虚拟化使用Hypervisor；B半虚拟化是Xen等方式。"}, {"id": 361, "t": "s", "q": "Docker最初是基于(    )开源项目发展而来的。", "o": ["A. OpenStack", "B. Kubernetes", "C. Linux Containers", "D. FreeBSD Jails"], "a": "C", "e": "C。Docker基于Linux Containers（LXC）开源项目发展而来。A OpenStack是云计算平台；B Kubernetes是容器编排工具（晚于Docker）。"}, {"id": 362, "t": "s", "q": "Docker使用的是(    )编程语言开发的。", "o": ["A. Java", "B. Python", "C. Go", "D. Ruby"], "a": "C", "e": "C。Docker是用Go语言开发的。A Java、B Python、D Ruby都不是Docker的开发语言。"}, {"id": 363, "t": "s", "q": "Docker中的Dockerfile是用来做什么的?", "o": ["A. 定义Docker镜像", "B. 定义容器运行时的环境变量", "C. 定义网络配置", "D. 定义数据卷"], "a": "A", "e": "A。Dockerfile是一个文本文件，用于定义Docker镜像的构建步骤（FROM、RUN、COPY等指令）。B环境变量在Dockerfile中可设置但不能概括其用途。"}, {"id": 364, "t": "s", "q": "Docker中的镜像是(    )。", "o": ["A. Docker容器的运行环境", "B. Docker容器打包的软件包", "C. Docker集群的管理工具", "D. Docker官方提供的镜像仓库"], "a": "B", "e": "B。Docker镜像是一个打包了应用和依赖的只读模板/软件包。A运行环境是容器不是镜像；C集群管理工具是Swarm/K8s。"}, {"id": 365, "t": "s", "q": "Docker中的命令docker run的作用是(    )。", "o": ["A.
