 运行Docker容器", "B. 移除Docker容器", "C. 构建Docker镜像", "D. 导出Docker镜像"], "a": "A", "e": "A。docker run命令根据镜像创建并启动容器。B移除容器用docker rm；C构建镜像用docker build；D导出镜像用docker save。"}, {"id": 366, "t": "s", "q": "Docker中的命令docker build的作用是(    )。", "o": ["A. 运行Docker容器", "B. 移除Docker容器", "C. 构建Docker镜像", "D. 导出Docker镜像"], "a": "C", "e": "C。docker build命令根据Dockerfile构建镜像。A运行是docker run；B移除容器是docker rm；D导出是docker save。"}, {"id": 367, "t": "s", "q": "Docker中的命令docker push的作用是(    )。", "o": ["A. 上传Docker镜像至Docker Hub", "B. 下载Docker镜像至本地", "C. 移除Docker镜像", "D. 运行Docker容器"], "a": "A", "e": "A。docker push将本地镜像上传到Docker Hub或私有仓库。B下载用docker pull；C移除镜像用docker rmi。"}, {"id": 368, "t": "s", "q": "Docker中的命令docker rmi的作用是(    )。", "o": ["A. 移除Docker容器", "B. 移除Docker镜像", "C. 构建Docker镜像", "D. 上传Docker镜像至Docker Hub"], "a": "B", "e": "B。docker rmi（remove image）删除本地镜像。A删除容器用docker rm；C构建用docker build；D上传用docker push。"}, {"id": 369, "t": "s", "q": "Docker中的命令docker ps的作用是(    )。", "o": ["A. 查看正在运行的Docker容器", "B. 查看Docker镜像", "C. 运行Docker容器", "D. 构建Docker镜像"], "a": "A", "e": "A。docker ps列出正在运行的容器（加-a列出所有容器包括已停止的）。B查看镜像用docker images；C运行用docker run。"}, {"id": 370, "t": "s", "q": "Docker中的命令docker images的作用是(    )。", "o": ["A. 查看正在运行的Docker容器", "B. 查看Docker镜像", "C. 运行Docker容器", "D. 构建Docker镜像"], "a": "B", "e": "B。docker images列出本地所有镜像。A查看容器用docker ps；C运行容器用docker run。"}, {"id": 371, "t": "s", "q": "Docker中的命令docker stop的作用是(    )。", "o": ["A. 停止Docker容器", "B. 移除Docker容器", "C. 启动Docker容器", "D. 构建Docker镜像"], "a": "A", "e": "A。docker stop停止正在运行的容器。B移除用docker rm；C启动用docker start；D构建用docker build。"}, {"id": 502, "t": "m", "q": "按照学习方法不同,可以将机器学习分为以下哪些类型。", "o": ["聚类", "监督学习", "无监督学习", "自监督学习"], "a": ["B", "C", "D"], "e": "正确答案BCD。按学习方法分：监督学习（有标签）、无监督学习（无标签）、自监督学习（从数据自身生成标签）。A\"聚类\"是无监督学习的一种具体方法，不是学习方法的大类。"}, {"id": 503, "t": "m", "q": "以下哪些是你职业道德调节的范围", "o": ["调节从业人员内部关系", "调节从业人员外部关系", "调节从业人员与其服务对象之间的关系", "调节从业人员与其家人的关系"], "a": ["A", "B", "C"], "e": "正确答案ABC。职业道德调节从业人员内部关系（同事间）、外部关系（与服务对象间），以及从业人员与职业本身的关系。D\"与家人关系\"属于私人生活范畴，不是职业道德的调节范围。"}, {"id": 504, "t": "m", "q": "深度学习是人工智能最重要的技术范式,其表现形式主要有:", "o": ["监督学习", "半监督学习", "无监督学习", "强化学习"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。深度学习作为技术范式，可用于监督学习（有标注数据）、半监督学习（少量标注+大量无标注）、无监督学习（无标注）、强化学习（基于奖励信号）四种学习范式。"}, {"id": 505, "t": "m", "q": "数据标注是提高数据质量的重要环节,它具有以下特点:", "o": ["数据标注内容的颗粒度小", "数据标注需求量大", "数据标注需求迭代快", "数据标注需求单一"], "a": ["A", "B", "C"], "e": "正确答案ABC。数据标注特点：标注内容颗粒度小（需细化到最小单元）、需求量大（AI训练需要海量标注数据）、需求迭代快（模型优化需求变化快）。D\"需求单一\"不对——标注需求多样（图像、文本、语音等）。"}, {"id": 506, "t": "m", "q": "以下哪些技术能够从技术角度更好的保证数据的安全性。", "o": ["数据治理", "数据分割", "数据安全传输", "区块链"], "a": ["B", "C", "D"], "e": "正确答案BCD。从技术角度保障数据安全：数据分割（最小化单次访问的数据量）、安全传输（加密传输通道）、区块链（防篡改分布式存储）。A数据治理是管理制度层面不是纯技术手段。"}, {"id": 507, "t": "m", "q": "我国十分重视知识产权的保护,出台了一系列的相关法律法规。其中包括", "o": ["《著作权法》", "《计算机软件保护条件》", "《商业法》", "《反不正当竞争法》"], "a": ["A", "B", "D"], "e": "正确答案ABD。我国知识产权相关法律包括《著作权法》、《计算机软件保护条例》、《反不正当竞争法》（商业秘密保护）。C《商业法》不存在——我国没有以\"商业法\"命名的专门法律。"}, {"id": 508, "t": "m", "q": "职业道德是所有从业人员在职业活动中应该遵循的行为准则,它涵盖了", "o": ["从业人员与服务对象之间的关系", "职业与职工之间的关系", "职业与职工之间的关系", "工人与领导的关系"], "a": ["A", "B", "C"], "e": "正确答案ABC。职业道德涵盖从业人员与服务对象的关系、职业与职工的关系、职工与职业的关系。D\"工人与领导\"是具体上下级关系，不是职业道德的基本三组关系。"}, {"id": 509, "t": "m", "q": "所谓职业道德,就是与职业活动紧密联系的符合职业特点要求的              的总和。", "o": ["道德准则", "道德情操", "道德品质", "道德理想"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。职业道德包括道德准则、道德情操、道德品质和道德理想四个层次，是它们的总和。"}, {"id": 510, "t": "m", "q": "常见的关系数据库主要有:", "o": ["MySQL", "MongoDB", "ORACLE", "HBASE"], "a": ["A", "C"], "e": "正确答案AC。MySQL和Oracle是关系型数据库（使用SQL、表结构、ACID事务）。B MongoDB和D HBase是非关系型数据库（NoSQL）。"}, {"id": 511, "t": "m", "q": "常见的非关系型数据库主要有:", "o": ["MySQL", "MongoDB", "Redis", "HBASE"], "a": ["B", "C", "D"], "e": "正确答案BCD。MongoDB（文档型）、Redis（键值型）、HBase（列族型）都是NoSQL非关系型数据库。A MySQL是关系型数据库。"}, {"id": 512, "t": "m", "q": "SQLite工作机制中的statement,说法正确的是:", "o": ["每一个statement都可以和多个connection 关联", "通常表示一个编译过的SQL 语句", "statement在内部按字符编码进行表示。", "Statement包括执行一个命令所需要一切"], "a": ["B", "D"], "e": "正确答案BD。B正确：Statement是sqlite3_prepare_v2()编译后的VDBE字节码对象，一次编译可多次执行；D正确：编译后的Statement自包含执行所需的一切（字节码+参数占位符+列元数据）。A错误：一个Statement只能绑定到创建它的那一个Connection，不能跨连接关联；C错误：Statement内部是VDBE字节码（bytecode），不是「字符编码」表示，字符编码是SQLite文本存储层面的概念。"}, {"id": 513, "t": "m", "q": "下列采集场景采集的数据,可以归类为交通类别:", "o": ["电梯内行为采集", "动物叫声", "道路街道", "十字路口", "聊天对话"], "a": ["C", "D"], "e": "正确答案CD。交通类采集场景：道路街道、十字路口。A电梯内行为属于室内场景；B动物叫声属于生物类；E聊天对话属于语音/文本。"}, {"id": 514, "t": "m", "q": "下列采集场景采集的数据,可以归类为语音:多风格音色类别:", "o": ["萝莉音", "播音腔", "步态", "2D 人脸", "客服腔"], "a": ["A", "B", "E"], "e": "正确答案ABE。多风格音色类别：萝莉音、播音腔、客服腔属于不同风格音色。C步态是人体行为/生物特征；D 2D人脸是人脸识别类。"}, {"id": 515, "t": "m", "q": "使用下列数据采集终端得到的数据类型为语音", "o": ["深度相机", "智能音响", "鱼眼相机", "录音笔", "双目摄像头"], "a": ["B", "D"], "e": "正确答案BD。智能音响和录音笔采集的是语音数据。A深度相机采集图像/点云；C鱼眼相机采集图像；E双目摄像头采集图像/点云。"}, {"id": 516, "t": "m", "q": "常见的文本数据类型,数据格式有:", "o": ["JPEG", "DICOM", "TXT", "xml", "wav"], "a": ["C", "D"], "e": "正确答案CD。文本数据格式：TXT（纯文本）、XML（标记文本）。A JPEG是图片；B DICOM是医学影像；E WAV是音频。"}, {"id": 517, "t": "m", "q": "常见的视频数据类型,数据格式有:", "o": ["mpeg", "mov", "wav", "jpg", "rmvb"], "a": ["A", "B", "E"], "e": "ABE为视频格式。逐项判别：MPEG是动态图像专家组制定的视频编码标准（常见后缀.mpg/.mpeg），MOV是Apple QuickTime视频容器格式（.mov），RMVB是RealNetworks可变比特率视频格式（.rmvb）。错项排除：WAV是Windows音频波形格式，属于音频类型；JPG/JPEG是静态图像压缩格式，属于图片类型。记忆口诀：视频三剑客——MPEG、MOV、RMVB；WAV听声音，JPG看图片。"}, {"id": 518, "t": "m", "q": "常见的视频数据类型,数据格式有:", "o": ["ape", "xvid", "flv", "mp3", "csv"], "a": ["B", "C"], "e": "正确答案BC。视频格式：Xvid（编解码格式）、FLV（Flash视频）。A APE是音频；D MP3是音频；E CSV是文本。"}, {"id": 519, "t": "m", "q": "点云采集的数据来源,数据格式有:", "o": ["pts", "LAS", "txt", "mp3", "mdb"], "a": ["A", "B"], "e": "正确答案AB。点云格式：PTS（文本点云）、LAS（激光雷达点云）。C TXT是通用文本；D MP3是音频；E MDB是数据库。"}, {"id": 520, "t": "m", "q": "关于大数据汇总的类数据库软件,说法正确的是:", "o": ["EXCEL处理数据量有限,适用日常工作数据量不大的情况。", "EXCEL处理数据量很大,适用工作数据量大的情况。", "BI处理大数据量的性能比EXCEL强很多", "BI处理大数据量的性能不如EXCEL,但可以可以直接连接多个数据库", "BI类 EXCEL 的操作设计,支持拖拉拽等方式,个性化的满足了中国式的复杂报表需求。"], "a": ["A", "C", "E"], "e": "正确答案ACE。Excel处理数据量有限适合日常小数据；BI工具处理大数据能力强、可直连多数据源；BI支持拖拽操作生成中式复杂报表。B说Excel处理数据量大不对；D说BI性能不如Excel不对。"}, {"id": 521, "t": "m", "q": "Python中的openpyxl库,说法正确的是:", "o": ["openpyxl是一个能够在python中处理Exel文件的模块。", "openpyxl是一个第三方库,使用前需要通过pip工具进行安装。", "openpyxl是一个内置的第三方库,使用前不需要通过pip工具进行安装。", "openpyxl不是内置的python库,使用前需要使用import导入。", "openpyxl是内置的python库,使用前不需要使用import导入。"], "a": ["A", "B", "D"], "e": "正确答案ABD。openpyxl是Python处理Excel的第三方模块，需pip安装，使用前需import导入。C说\"内置\"错误（不是标准库）；E说\"不需要import\"错误。"}, {"id": 522, "t": "m", "q": "下列哪些选项属于单源数据产生脏数据的原因。(            )", "o": ["缺少完整性约束", "拼写错误", "命名冲突", "参照完整性冲突"], "a": ["A", "B", "D"], "e": "正确答案ABD。单源数据脏数据原因：缺少完整性约束（系统自身的完整性检查不足）、拼写错误（录入失误）、参照完整性冲突（系统内部的引用不一致）。C命名冲突属于多源数据问题（不同来源对同一事物命名不同）。对照单选的149（单源→拼写错误）和150（多源→命名冲突）可确认本题分类。"}, {"id": 523, "t": "m", "q": "下列哪些选项不属于单源数据产生脏数据的原因(            )", "o": ["结构冲突", "粒度不一致", "命名冲突", "拼写错误"], "a": ["A", "B", "C"], "e": "正确答案ABC。结构冲突、粒度不一致、命名冲突都是多源数据才有的问题。D拼写错误属于单源数据问题。注意题眼是\"不属于\"。"}, {"id": 524, "t": "m", "q": "下列哪些选项属于多源数据产生脏数据的原因(            )", "o": ["粒度不一致", "时间不一致", "命名冲突", "结构冲突"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。多源数据整合的脏数据原因：粒度不一致（如日报vs月报）、时间不一致（不同时区）、命名冲突（同一事物不同名称）、结构冲突（字段定义不同）。"}, {"id": 525, "t": "m", "q": "下列哪些选项不属于多源数据产生脏数据的原因(            )", "o": ["数据失效", "粒度不一致", "命名冲突", "拼写错误"], "a": ["A", "D"], "e": "正确答案AD。数据失效和拼写错误不属于多源数据脏数据原因。BC（粒度不一致、命名冲突）是多源数据典型问题。注意题眼是\"不属于\"。"}, {"id": 526, "t": "m", "q": "下列属于基于模式层脏数据清洗方法类型(       )", "o": ["属性约束", "避免冲突", "空值", "噪声数据"], "a": ["A", "B"], "e": "正确答案AB。基于模式层的清洗方法：属性约束（利用schema定义检验合法性）、避免冲突（解决不同来源的结构/命名冲突）。C空值处理和D噪声数据属于基于实例层的方法。"}, {"id": 527, "t": "m", "q": "对于噪声数据采用的清洁处理方法有 (                   )", "o": ["分箱法", "回归法", "计算机和人工检查相结合处理", "使用不同属性间的约束检测和修正错误"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。噪声数据清洗四种方法：分箱法（平滑数据）、回归法（拟合函数去除噪声）、人工与计算机结合检查、属性间约束检测修正。"}, {"id": 528, "t": "m", "q": "对于空值原因而产生的脏数据的清洗方法有(            )", "o": ["忽略元组", "人工填写空缺值", "使用一个全局变量 填充空缺值", "使用属性的中心度量", "复杂的概率统计函数值填充空缺值"], "a": ["A", "B", "C", "D", "E"], "e": "正确答案ABCDE。空值处理方法：忽略元组（跳过空值记录）、人工填写、全局常量填充（如用0填）、属性中心度量填充（均值/中位数）、复杂概率统计函数填充（如回归预测缺失值）。五种方法都正确。"}, {"id": 529, "t": "m", "q": "下列哪些选项不属于针对空值原因所产生的脏数据清洗方法(            )", "o": ["忽略元组", "人工填写空缺值", "分箱法", "直接删除空值记录项"], "a": ["C", "D"], "e": "正确答案CD。分箱法和直接删除空值记录项不属于针对空值的清洗方法。分箱法用于噪声处理，直接删除是粗糙做法不是首选。AB（忽略元组、人工填写）是标准空值处理方法。注意题眼是\"不属于\"。"}, {"id": 530, "t": "m", "q": "下列属于数据清洗操作的是(            )。", "o": ["去除重复数据", "填补缺失值", "处理异常值", "转换数据格式"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。数据清洗包括：去重（DISTINCT/DropDuplicates）、填补缺失值（fillna）、处理异常值（异常检测与修正）、转换数据格式（类型转换/标准化）。四项都是清洗操作。"}, {"id": 531, "t": "m", "q": "图像根据彩色信息存储所需的位数,一般可分为(      )以及256色图像、RGB 图像和真彩图像。", "o": ["单色图像", "4 色图像", "8 色图像", "16 色图像"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。图像按色彩存储位数分为：单色、4色、8色、16色、256色、RGB和真彩图像。四个选项都是低色阶的分类。"}, {"id": 532, "t": "m", "q": "分辨率可以表示图像呈现的清晰程度,常见的分辨率有(       )等。", "o": ["位分辨率", "图像分辨率", "屏幕分辨率", "打印分辨率"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。分辨率包括：位分辨率（色深）、图像分辨率（像素密度如300dpi）、屏幕分辨率（如1920×1080）、打印分辨率（输出精度）。"}, {"id": 533, "t": "m", "q": "为提高图像数据的质量,在标注前对必须对所使用的图像数据进行清洗,下列哪些选项属于图像清洗范畴(            )", "o": ["不可读的图像文件", "形变失真的图像", "模糊不清的图像", "相似或重复的图像"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。图像清洗范畴：不可读的文件、形变失真的图像、模糊不清的图像、相似或重复的图像。都需要在标注前处理。"}, {"id": 534, "t": "m", "q": "通过视频抽帧采集到的连续图片,其相似度会很高,为了清洗高度相似图像,可以通过计算图像的(    )来解决", "o": ["图像直方图", "哈希值", "汉明距离", "余弦距离"], "a": ["A", "B", "C", "D"], "e": "ABCD全选。四种方法均可用于图像相似度判别：①图像直方图——统计图像的颜色/灰度分布，比对两个直方图的差异即可判断相似度；②哈希值——感知哈希（pHash/aHash/dHash）为每张图生成指纹，相似图的指纹接近；③汉明距离——比对两个等长二进制串（如哈希值）的差异位数，常与感知哈希配套使用；④余弦距离——衡量两个向量在方向上的差异，图像的直方图向量或CNN特征向量同样可以用余弦距离比对。之前旧解析说余弦距离只用于文本是错的——只要是特征向量就能用。记忆：直方图看分布，哈希+汉明配套用，余弦不看大小看方向。"}, {"id": 535, "t": "m", "q": "数据标注的应用场景包括(            ).", "o": ["自动驾驶", "智能安防", "智慧医疗", "新零售"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。数据标注应用场景：自动驾驶（标注道路、行人、车辆）、智能安防（标注人脸、行为）、智慧医疗（标注病灶、器官）、新零售（标注商品、顾客行为）。全选。"}, {"id": 536, "t": "m", "q": "下列哪些选项不属于文本标注的对象是(     )", "o": ["自然语言文本", "计算机程序", "图片", "自然语言语音"], "a": ["B", "C", "D"], "e": "正确答案BCD。文本标注的对象是自然语言文本。B计算机程序、C图片、D自然语言语音都不是文本标注对象。注意题眼是\"不属于\"。"}, {"id": 537, "t": "m", "q": "根据数据标注对象不同,数据标注可分为(         )等", "o": ["文本标注", "图像标注", "视频标注", "语音标注", "信息标注"], "a": ["A", "B", "C", "D", "E"], "e": "正确答案ABCDE。按标注对象不同：文本标注、图像标注、视频标注、语音标注、信息标注。这些都是数据标注的常见类型。"}, {"id": 538, "t": "m", "q": "在数据标注过程中,根据数据标注的构成形式不同,数据标注可分为(       )", "o": ["结构化标注", "非结构化标注", "图像标注", "半结构化标注", "视频标注"], "a": ["A", "B", "D"], "e": "正确答案ABD。按构成形式分为三类：结构化标注（有固定模板/字段）、半结构化标注（部分固定字段+部分自由内容，如XML/JSON格式标注）、非结构化标注（纯自由格式标注）。CE图像标注和视频标注是按标注对象分类的，不属于构成形式维度。"}, {"id": 539, "t": "m", "q": "词语的情感是句子或篇章级情感分析的基础,早期的文本情感分析主要集中在对文本正负极性的判断,具体分析方法主要有(      )", "o": ["基于词典的分析方法", "基于网络的分析方法", "基于语料库的分析方法", "基于语音的分析方法"], "a": ["A", "C"], "e": "正确答案AC。早期文本情感分析方法：基于词典（利用情感词典判断正负极性）和基于语料库（从标注语料学习情感模式）。B基于网络和D基于语音不是文本情感分析的主流早期方法。"}, {"id": 540, "t": "m", "q": "文本数据标注的情感极性分类,主要包括(        )或愤怒、厌恶、喜欢等", "o": ["正面", "负面", "中性", "隐晦"], "a": ["A", "B", "C"], "e": "正确答案ABC。情感极性分类主要包括正面（positive）、负面（negative）和中性（neutral）三类。D隐晦不是标准情感极性分类。"}, {"id": 541, "t": "m", "q": "按文本的标注粒度不同,情感标注又可分为(     )三个层次", "o": ["词语级", "句子级", "篇章级", "段落级"], "a": ["A", "B", "C"], "e": "正确答案ABC。情感标注按粒度分为：词语级（词的情感色彩）、句子级（句子整体情感）、篇章级（整篇文档的情感倾向）。D段落级不是标准三级分类之一。"}, {"id": 542, "t": "m", "q": "常用的图像数据标注工具主要包括(             )", "o": ["LabelMe", "LabelImg", "LabelBox", "BRAT"], "a": ["A", "B", "C"], "e": "正确答案ABC。常用图像标注工具：LabelMe（多边形标注）、LabelImg（矩形框标注）、LabelBox（商业标注平台）。D BRAT是文本标注工具。"}, {"id": 543, "t": "m", "q": "命名实体是指任何可以用专有名词指代的东西,常见实体标签包括(           )", "o": ["人物(PER)", "日期(Date)", "地点(LOC)", "组织(ORG)"], "a": ["A", "C", "D"], "e": "ACD。命名实体识别（NER）的经典标准来自CoNLL-2003评测任务，定义了三大核心实体标签：PER（Person人物）、LOC（Location地点）、ORG（Organization组织），这三类都有专有名词指代的属性。B日期（Date）虽然也是信息抽取的目标，但在NER体系中属于时间表达式（TIMEX），由专门的Temporal Expression Recognition处理，不被归入PER/LOC/ORG命名实体范畴。考试辨别的关键：看英文缩写——出现PER/LOC/ORG就是标准NER标签，Date/TIME/MONEY等属于其他体系。"}, {"id": 544, "t": "m", "q": "下列属于文本命名实体识别的序列标注的标注方法的是(             )", "o": ["FIFO(First Input First Out)", "BIO(Begin Inside Outside)", "BIOSE(Begin Inside Outside Sigle End)", "BMES(Begin Middle End Sigle)"], "a": ["B", "C", "D"], "e": "正确答案BCD。序列标注方法：BIO（Begin-Inside-Outside）、BIOSE（BIO+Single+End）、BMES（Begin-Middle-End-Single）。A FIFO是队列操作原则不是标注方法。"}, {"id": 545, "t": "m", "q": "下列哪些属于文本命名实体识别的序列标注范围(                )", "o": ["关键词提取", "词性标注", "语义角色标注", "槽位抽取(Slot Filling)"], "a": ["B", "C", "D"], "e": "正确答案BCD。序列标注范围：词性标注（POS tagging）、语义角色标注（SRL）、槽位抽取（Slot Filling）。A关键词提取不属于序列标注（每个序列位置都要标注），而是抽取任务。"}, {"id": 546, "t": "m", "q": "以下哪些不是常用的标注文档存储格式(     )", "o": ["DOC", "EXE", "JSON", "XML"], "a": ["A", "B"], "e": "正确答案AB。常用的标注文档存储格式是JSON和XML，不是DOC（Word文档）和EXE（可执行程序）。注意题眼是\"不是\"。"}, {"id": 547, "t": "m", "q": "以下属于图像数据标注工具的是(             )", "o": ["Doccano", "BRAT", "LabelMe", "IEPY", "LabelImg"], "a": ["C", "E"], "e": "正确答案CE。图像标注工具：LabelMe（多边形/语义分割标注）、LabelImg（矩形框标注）。A Doccano是文本标注工具；B BRAT是文本标注工具；D IEPY是信息抽取框架。"}, {"id": 548, "t": "m", "q": "在对数据进行标注过程中,用户所扮演的角色通常可以分为三类,具体是(    )", "o": ["质检员", "标注员", "审核员", "管理员"], "a": ["A", "B", "C"], "e": "正确答案ABC。标注平台中用户角色分为：标注员（执行标注）、质检员（检查标注质量）、审核员（最终审核确认）。D管理员是系统管理角色不是标注流程中的标准三类角色。"}, {"id": 549, "t": "m", "q": "在对图像数据进行标注时,需要对标注后的图像数据进行质量检测,下列哪些属于质量检测项(          )", "o": ["关联一致性", "目标类别是否正确", "目标属性是否正确", "目标框是否贴合"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。图像标注质量检测：关联一致性（标注框与物体一致）、目标类别正确性、目标属性正确性、目标框贴合度。"}, {"id": 550, "t": "m", "q": "图像数据标注流程包括(          )", "o": ["图像获取", "图像预处理", "图像预识别", "图像标注", "图像分割"], "a": ["A", "B", "C", "D", "E"], "e": "正确答案ABCDE。图像标注全流程：图像获取→预处理→预识别（辅助标注）→标注→分割（像素级标注）。"}, {"id": 551, "t": "m", "q": "在对数据进行标注过程中对缺失数据处理的常用方式(         )", "o": ["均值插补", "同类均值插补", "删除含有缺失值的记录", "分箱"], "a": ["A", "B", "C"], "e": "正确答案ABC。缺失数据处理：均值插补（用均值填补）、同类均值插补（用同类均值填补）、删除含有缺失值的记录。D分箱法用于处理噪声数据，不是缺失值处理方法。"}, {"id": 552, "t": "m", "q": "图像的语义分割目前主要应用在(             )等领域。", "o": ["地质检测", "自动驾驶", "精准农业", "医疗影像分析"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。四项均为语义分割的核心应用领域：地质检测（遥感影像土地覆盖分类、岩性识别、滑坡检测等）、自动驾驶（道路/车辆/行人分割）、精准农业（作物/病害区域分割）、医疗影像分析（病灶/器官分割）。"}, {"id": 553, "t": "m", "q": "点云需要通过三维成像传感器获得,下列属于三维成像传感器的是(      )", "o": ["三维激光雷达扫描 仪", "双目相机", "RGB-D 相机", "单反相机"], "a": ["A", "B", "C"], "e": "正确答案ABC。三维成像传感器：激光雷达扫描仪、双目相机（视差计算深度）、RGB-D相机（如Kinect，同时获取颜色和深度）。D单反相机只能拍摄2D图像不产生三维数据。"}, {"id": 554, "t": "m", "q": "下列属于点云存储格式的是(             )", "o": ["pts", "las", "pcd", "xml"], "a": ["A", "B", "C"], "e": "正确答案ABC。点云存储格式：PTS（文本格式）、LAS（激光雷达标准）、PCD（PCL库格式）。D XML不是点云专用存储格式。"}, {"id": 555, "t": "m", "q": "下列哪些选项属于语音数据标注的错误类型(     )", "o": ["有效性错误", "截断错误", "文本错误", "逻辑性错误"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。语音标注错误类型：有效性错误（标注内容无效）、截断错误（语音不完整）、文本错误（转写文本有误）、逻辑性错误（标注逻辑矛盾）。"}, {"id": 556, "t": "m", "q": "常见的语音中的声音特征主要包括(     )", "o": ["音色", "音调", "响度", "音准"], "a": ["A", "B", "C"], "e": "正确答案ABC。声音特征：音色（声音特质辨识说话人）、音调（频率决定高低）、响度（振幅决定大小）。D音准是音乐术语不是一般语音特征。"}, {"id": 557, "t": "m", "q": "每个人的声纹图谱都有一定的差异,主要体现在(        )和音域特征这四个方面。", "o": ["音调特征", "嗓音纯度特征", "共鸣方式特征", "平均音高特征"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。声纹差异体现在：音调特征、嗓音纯度特征、共鸣方式特征、平均音高特征，以及音域特征（题干已给出）。"}, {"id": 558, "t": "m", "q": "Praat 是一款流行的专业语音处理软件,可以完成(       )等任务", "o": ["语音数据标注", "语音录制", "语音合成", "语音分析"], "a": ["A", "B", "C", "D"], "e": "正确答案ABCD。Praat是专业语音处理软件，可完成语音数据标注、录制、合成和分析。"}, {"id": 559, "t": "m", "q": "为了在保证视觉效果的前提下,尽可能减少视频文件的大小,在处理视频数据时都要进行压缩编码,下列属于视频压缩格式有(            )", "o": ["Mp4", "Mp3", "AVI", "FLV"], "a": ["A", "C", "D"], "e": "正确答案ACD。视频压缩格式：MP4、AVI、FLV。B MP3是音频压缩格式不是视频格式。"}, {"id": 560, "t": "m", "q": "SPSS中实现基本统计分析.往往采用两种方式()", "o": ["数值计算", "图形绘制", "计算均值", "频数分析"], "a": ["A", "B"], "e": "正确答案AB。SPSS基本统计分析两种方式：数值计算（计算各类统计量）和图形绘制（可视化展示数据）。C/D是具体分析方法不是两种基本方式。"}, {"id": 561, "t": "m", "q": "下列问题( )使用参数检验分析方法", "o": ["评估灯泡使用寿命", "检验食品某种成分的含量", "全国小学一年级学生一学期的平均课外作业时间", "全国省市小康指数高低"], "a": ["A", "B", "C"], "e": "参数检验的核心前提：总体分布形式已知（通常假定正态分布）、数据是连续型数值变量。A 灯泡寿命：连续数值（小时），通常假定服从正态或 Weibull 分布，可用 t 检验或方差分析。B 食品成分含量：连续数值（百分比/g），组间比较常用参数方法如 t 检验。C 课外作业时间：连续数值（小时），比较不同班级/学校的均值可用参数检验。D 小康指数是人工加权合成的综合指标，不是自然连续测量值，通常不适合参数检验。"}, {"id": 562, "t": "m", "q": "进行频数分析时.利用的工具包括()", "o": ["散点图", "相关系数", "频数分布表", "条形图"], "a": ["C", "D"], "e": "频数分析就是统计每个取值出现了多少次。最常用的两种展示工具：C 频数分布表：表格形式列出各取值（或区间）的频数、百分比和累积百分比——精确但不够直观。D 条形图：把频数分布表画成高低柱——直观但看不出精确数值。两者互补，通常联用。A 散点图展示两个连续变量的关系（如身高和体重），不是频数工具。B 相关系数是一个数字指标（r 值），不是一个可视化'工具'，属于相关分析而非频数分析。"}, {"id": 563, "t": "m", "q": "( )可以刻画集中趋势", "o": ["均值", "全距", "众数", "中位数"], "a": ["A", "C", "D"], "e": "正确答案ACD。集中趋势刻画：均值（算术平均）、众数（最频繁值）、中位数（中间位置值）。B全距是离散程度指标。"}, {"id": 564, "t": "m", "q": "( )可以刻画离散程度", "o": ["标准差", "方差", "全距", "均值标准误差"], "a": ["A", "B", "C"], "e": "正确答案ABC。离散程度刻画：标准差（离均差平方平均的平方根）、方差（离均差平方的平均）、全距（最大值-最小值）。D均值标准误差是抽样误差的指标不属于离散程度。"}, {"id": 565, "t": "m", "q": "( )可以刻画分布形态", "o": ["标准差", "偏度系数", "峰度系数", "均值标准误差"], "a": ["B", "C"], "e": "正确答案BC。分布形态刻画：偏度系数（不对称程度）、峰度系数（陡峭程度）。A标准差衡量离散；D均值标准误差衡量抽样误差。"}, {"id": 566, "t": "m", "q": "以下用于描述“离散趋势”的统计量是", "o": ["方差", "标准差", "中位数", "四分位距", "全距"], "a": ["A", "B", "D", "E"], "e": "离散趋势衡量数据有多'散'，四个主要指标各有侧重：A 方差：每个值与均值偏差的平方再平均——量纲是原数据的平方，不直观但数学性质好。B 标准差：方差的平方根——量纲回到原数据单位，最常用（如'身高标准差 5cm'）。D 四分位距：Q3−Q1，中间 50% 数据的跨度——不受极端值影响。E 全距：最大值−最小值，只看首尾，最粗略。C 中位数是'排序后中间那个数'，描述数据中心在哪（集中趋势），不应选。"}, {"id": 567, "t": "m", "q": "常见的基本描述统计量包括()", "o": ["刻画集中趋势的", "刻画离散程度的", "刻画分布形态的", "刻画模型形式的"], "a": ["A", "B", "C"], "e": "描述统计的三大支柱，缺一不可：A 集中趋势（均值、中位数、众数）——回答'数据中心在哪'。B 离散程度（方差、标准差、全距、四分位距）——回答'数据有多散'。C 分布形态（偏度判断左右偏向、峰度判断尖扁）——回答'数据长什么样'。D 模型形式（线性/非线性、是否含交互项）属于推断统计或机器学习的范畴，描述统计不涉及建模。"}, {"id": 568, "t": "m", "q": "Docker可以运行在哪些操作系统上?", "o": ["Linux", "Windows", "MacOS"], "a": ["A", "B", "C"], "e": "正确答案ABC。Docker支持Linux、Windows、macOS三大操作系统。"}, {"id": 569, "t": "m", "q": "以下属于Docker架构的是(    )。", "o": ["镜像", "虚拟机", "容器", "仓库"], "a": ["A", "C", "D"], "e": "正确答案ACD。Docker架构核心组件：镜像（Image，只读模板）、容器（Container，镜像的运行实例）、仓库（Registry，存储镜像的中央仓库）。B虚拟机不是Docker的架构组件——Docker用容器代替虚拟机。"}, {"id": 1001, "t": "j", "q": "《中华人民共和国劳动法》是在1994年1月1日起实施的。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "《劳动法》于1994年7月5日由全国人大常委会通过，1995年1月1日起实施。题干把实施日期写成1994年1月1日，错误。"}, {"id": 1002, "t": "j", "q": "创造性是知识产权的特点。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "知识产权的特点包括：无形性、专有性、地域性、时间性、可复制性。创造性是专利权的授予条件之一，也是知识产权保护对象（智力成果）的特征之一，但题干表述在该套题中被视为正确。"}, {"id": 1003, "t": "j", "q": "区块链是基于区块链的数据标注平台采用强密算法及分布式技术来确保数据安全。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。区块链保障数据安全的两个核心技术在本场景均成立：①加密算法：标注数据传输和存储时经过加密，即使被拦截也读不出明文。②分布式账本：标注记录存在全网多个节点上，修改一个节点没用——必须同时攻破多数节点才能篡改。基于区块链的标注平台正是利用这两点确保标注数据不可被后门修改。所以题干判正确。"}, {"id": 1004, "t": "j", "q": "数据治理是指对于数据采集、清洗、标注到交付整个项目生命周期每个阶段进行识别、度量、监控、干扰、预警等一系列管理措施。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据治理更偏向建立标准、制度和规则体系，而题干描述的是\"数据质量管理\"（对全生命周期进行识别、度量、监控等）。题干将数据质量管理的功能说成数据治理，概念混淆，判错误。"}, {"id": 1005, "t": "j", "q": "在图像分类和人脸检测等领域,标注的数据量越大,算法的性能就越好。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。「越大就越好」是绝对化表述，不严谨。原因有四：①数据质量比数量更重要，噪声和标注错误反而损害模型；②边际收益递减，数据量达到一定规模后增益趋于饱和；③新增数据分布若与原有数据不一致（场景、光照等），可能导致模型在特定场景下表现变差；④模型容量固定时单纯堆数据不带来正向收益。正确表述应为：在保证标注质量且数据分布合理的前提下，适当增加数据量通常有助于提升算法性能。"}, {"id": 1006, "t": "j", "q": "数据标注内容的颗粒度越细越好,要尽可能覆盖一种可能性。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据标注颗粒度并非越细越好。颗粒度应根据任务需求、标注成本和模型效果综合确定；过细可能增加标注成本和不必要噪声。题干说\"尽可能覆盖一种可能性\"太绝对，判错误。"}, {"id": 1007, "t": "j", "q": "数据标签的复杂性决定了人工智能算法的有效性。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。决定模型效果的，不是标签形式有多复杂，而是三件事：①标注精度：框有没有刚好贴紧目标边缘？类别人名地名有没有标错？②标注一致性：同一张图给三个标注员，标注结果是否一致？不一致说明规则不清晰。③标注量：足够覆盖各种场景变体。举反例：一个简单二分类标签（垃圾邮件/正常邮件）只要标得精准，模型效果远好于复杂的多层级情感标签但标得一塌糊涂。题干把'标签复杂度'和'模型有效性'直接挂钩，犯了归因错误。"}, {"id": 1008, "t": "j", "q": "半监督学习则是监督学习与无监督学习相结合的一种深度学习方式,它主要使用大量的未标记数据进行模型训练。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。半监督学习的典型工作方式：假设你有 1000 张图，其中只有 100 张有人工标注标签，剩下 900 张没有标签。先拿 100 张有标签的训练一个初始模型；然后让这个模型对 900 张无标签数据做预测，挑出预测置信度高的样本，把预测结果当'伪标签'加入训练集，反复迭代。这个过程既有监督（有标签指导方向）又有无监督（利用无标签数据的内在结构），所以题干描述正确。"}, {"id": 1009, "t": "j", "q": "无监督学习主要针对没有标注数据集的场景,通过某种方法(如回报函数)来判断算法是否越来越接近目标。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。这道题的陷阱词是'回报函数'——它是强化学习的专属概念，不是无监督学习。区分三种学习范式：监督学习：给模型题目+标准答案，让它学会答题（如分类、回归）。无监督学习：只给模型一堆数据，不给答案，让它自己发现结构（聚类把相似样本分一组，降维压缩特征维度）。强化学习：让智能体在环境中不断试错，环境给奖励/惩罚信号（回报函数），智能体自己探索最优策略。题干描述的是强化学习，却安在无监督学习头上——狸猫换太子，判错误。"}, {"id": 1010, "t": "j", "q": "所谓职业道德,就是与职业活动紧密联系的符合职业特点要求的道德准则、道德情操与道德品质的总和。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "职业道德的定义正是：与职业活动紧密联系，符合职业特点要求的道德准则、道德情操与道德品质的总和。题干是标准定义，判正确。"}, {"id": 1011, "t": "j", "q": "劳动合同法是调整劳动关系最重要的法律,是劳动法律体系的核心。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "《劳动法》是调整劳动关系的基本法律，《劳动合同法》是劳动法体系的重要组成部分，劳动法是核心。题干将劳动合同法说成核心，按本套题口径判正确。"}, {"id": 1012, "t": "j", "q": "知识产权是因为人类商业活动的独特性而产生的一种权利,保护了个人的商业成果不受他人侵犯。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "知识产权是因为人类智力创造性活动（而非商业活动）产生的一种权利，保护的是智力成果，不是商业成果。题干表述偏离知识产权本质，判错误。"}, {"id": 1013, "t": "j", "q": "在表现形式方面,职业道德往往比较具体、灵活、单一。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "职业道德的表现形式比较具体、灵活，但不是\"单一\"。不同职业有不同的道德规范，同一职业在不同情境下也有不同要求。题干说\"单一\"不准确，判错误。"}, {"id": 1014, "t": "j", "q": "行业不同,但是职业守则是一样的。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "不同行业的职业守则各不相同，例如医护守则和律师守则在核心要求和具体规定上差异很大。题干说\"行业不同守则一样\"，不符合事实，判错误。"}, {"id": 1015, "t": "j", "q": "网络空间安全必须依靠政府实现,企业、社会组织、技术社群和公民等不需要参与。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "《网络安全法》明确要求建立政府、企业、社会组织、技术社群和公民等共同参与的治理体系。题干说只需依靠政府、其他主体不需要参与，违反法律规定，判错误。"}, {"id": 1016, "t": "j", "q": "人工智能“的概念于1956年召开的达特茅斯会议上被提出(    )。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "1956年夏，麦卡锡、明斯基等人在美国达特茅斯学院召开会议，首次提出\"人工智能\"概念。这是AI历史上的标志性事件，判正确。"}, {"id": 1017, "t": "j", "q": "人工智能真正的春天是从1993年开始(    )。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "AI真正的\"春天\"始于2010年代深度学习爆发，不是1993年。1993年AI仍处于低谷期（第二次AI寒冬）。判错误。"}, {"id": 1018, "t": "j", "q": "人工智能产业链的层次中应用层是人工智能工业的核心。(    )", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "AI产业链中技术层（算法模型层）是核心，包括机器学习、计算机视觉、NLP等核心技术。应用层不是核心，题干概念错误，判错误。正确选项：B"}, {"id": 1019, "t": "j", "q": "数据挖掘是指从大量的数据中通过算法搜索隐藏于其中信息的过程。(    )", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。这八个字的定义来自数据挖掘领域的经典教科书（Jiawei Han）。逐词拆解：'大量数据'——不是靠人手工分析几十条记录，而是面对百万级数据量；'算法搜索'——用机器学习/统计学算法自动去发现，不是写 SQL 查已知规则；'隐藏信息'——找出人看不出来的模式，最经典的例子是超市发现'买尿布的男人也买啤酒'，这就是隐藏的关联规则。"}, {"id": 1020, "t": "j", "q": "数据挖掘的很多算法都来自机器学习和统计学。(    )", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。数据挖掘的技术来源不是凭空创造的：分类任务（这封邮件是垃圾还是正常邮件？）→ 决策树、SVM、朴素贝叶斯 → 从机器学习借。聚类任务（把客户分成几个群体？）→ K-means、层次聚类 → 机器学习 + 统计学都有贡献。关联规则（啤酒和尿布一起买？）→ Apriori 算法 → 来自数据库领域 + 统计学。没有机器学习提供分类/聚类算法、统计学提供假设检验和概率模型，数据挖掘就没法干活。"}, {"id": 1021, "t": "j", "q": "数据标注与人工智能是互不影响的,是大部分人工智能算法得以有效应用的关键环节。(    )", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。题干自身逻辑打架——前半句说'互不影响'（各走各的路），后半句说'是……关键环节'（离不开它）。真实关系：数据标注是监督学习训练的必要条件——没有标注，模型不知道正确答案是啥。但也不能反过来说'没有标注就没有 AI'（第 55 题已讨论过，无监督学习和强化学习不需要标注）。本题关键错误点：①逻辑自相矛盾；②'互不影响'与事实不符。"}, {"id": 1022, "t": "j", "q": "数据标注越准确,标注的数据量越大,算法的性能就越好,准确度就越高。(    )", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。监督学习的'乘法定律'：模型效果 ≈ 标注精度 × 数据量。精度不够的后果：把猫标成狗 → 模型学到了错误的映射 → 见了真猫喊狗。数量不够的后果：模型只见过三只猫的图片 → 换一只花纹不一样的猫就认不出（过拟合）。精度和数量都提升了，模型见过的'正确答案'就又多又准，泛化能力自然提升。注意这是趋势性结论，不是线性正比——数据量增加到一定程度后增益会递减。"}, {"id": 1023, "t": "j", "q": "数据标注的意义就是让机器认知这个世界,标注是通过数据来指导机器解决问题的过程。(    )", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据标注的本质就是让机器从标注数据中\"学习认知世界\"，通过示例指导机器完成分类、识别等任务。判正确。"}, {"id": 1024, "t": "j", "q": "数据标注就是将大量的、原始的、杂乱的数据转化为规范化的、计算机能够读懂的、标识出关键特征的数据集，从而支持人工智能的相关应用。（    ）", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。题干描述了数据标注的三层价值递进：第一层'杂乱→规范化'：原始数据噪音多格式乱，标注前先清洗和统一格式。第二层'计算机能读懂'：把人的语言（'这张图里有一只狗'）翻译成机器能处理的结构化标签（类别=狗，矩形框左上角x=100,y=50,宽=200,高=150）。第三层'标识关键特征'：不只是简单分类，而是精确定位和属性描述——告诉模型'要学什么'。三层合在一起就是数据标注的完整定义。"}, {"id": 1025, "t": "j", "q": "数据标注对人工智能来说可有可无。(    )", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据标注对监督学习至关重要，直接影响模型效果。\"可有可无\"严重低估其重要性，判错误。"}, {"id": 1026, "t": "j", "q": "半结构化数据可以用JSON格式进行存储。(    )", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "JSON是半结构化数据的典型存储格式，自描述性强、灵活。判正确。"}, {"id": 1027, "t": "j", "q": "半结构化数据不可以用XML格式来组织并保存。(    )", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "XML本身就是半结构化数据的常用组织格式。题干说\"不可以用XML\"，但XML正是半结构化数据的主流表示方式之一，判错误。"}, {"id": 1028, "t": "j", "q": "半结构化数据不可以转换为结构化数据(    )。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "半结构化数据可以通过解析和映射转换为结构化数据（如存入关系数据库）。题干说\"不可以\"太绝对，判错误。"}, {"id": 1029, "t": "j", "q": "BeautifulSoup库提供的,获取文本和标签属性的find函数,返回第一个匹配的结果。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "BeautifulSoup 的 find() 方法返回文档中第一个匹配的标签对象；find_all() 返回所有匹配结果。题干描述正确，判正确。"}, {"id": 1030, "t": "j", "q": "csv以纯文本形式存储数字和文本。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "CSV以纯文本形式存储表格数据，数字和文本均可保存，不是仅数字和文本。题干说\"存储数字和文本\"范围准确，判正确。"}, {"id": 1031, "t": "j", "q": "JSON采用完全独立于语言的文本格式,结构化程度高,是轻量级的数据交换格式。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "JSON采用纯文本格式，与编程语言无关，是轻量级数据交换格式（不是重量级）。题干描述准确，判正确。"}, {"id": 1032, "t": "j", "q": "点云文件格式只能是ASCII编码形式,可以直接阅读存储的内容。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "点云文件格式包括ASCII（文本）和二进制两种。二进制格式存储效率更高、文件更小。题干说\"只能是ASCII\"不全面，判错误。"}, {"id": 1033, "t": "j", "q": "图片采集方法通常有实时采集和传感器采集两种。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "图片采集确实有实时采集（如摄像头实时拍）和传感器采集（如深度相机、激光雷达）等方式。判正确。"}, {"id": 1034, "t": "j", "q": "cv2.VideoCapture.read()函数是捕获帧函数,能获取视频中的每一帧图 像。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "cv2.VideoCapture.read() 每次调用读取一帧图像，在循环中反复调用才能逐帧读完整个视频。题干\"能获取视频中的每一帧图像\"强调的是循环调用后的效果，按本套题应试逻辑判正确。"}, {"id": 1035, "t": "j", "q": "fps 是视频帧率,就是指录制视频每秒多少帧。fps 越高,细节就越好,但是存储容量也越大。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "fps 即 frames per second（帧/秒），帧率越高画面越流畅细节越好，但文件体积也越大。题干三句话全部正确，判正确。"}, {"id": 1036, "t": "j", "q": "cv2.VideoWriter_fourcc(\"M\",\"P\",\"4\",\"V\") 表示MPEG-4 编码格式, 文件扩展名.avi", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。cv2.VideoWriter_fourcc('M','P','4','V')确实表示MPEG-4编码格式，但MPEG-4编码的标准容器是.mp4而非.avi。OpenCV中AVI容器通常配合XVID或MJPG编码使用，MP4V编码应配.mp4扩展名。常见FourCC还有：XVID(Xvid)、X264(H.264)、MJPG(Motion JPEG)、DIVX(DivX)。"}, {"id": 1037, "t": "j", "q": "视频采集是将视频源的数字信号通过处理转换成模拟信号,并将模拟信息存储在计算机硬盘上的过程。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "视频采集是将模拟信号数字化（模数转换），而非将数字信号变为模拟信号。题干方向说反了，判错误。"}, {"id": 1038, "t": "j", "q": "语音数据采集获得的声音信号,可以用于进行语音识别和语音处理。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "语音数据采集获得的声音信号就是用于语音识别、语音合成、声纹识别等语音处理任务。判正确。"}, {"id": 1039, "t": "j", "q": "在计算机应用中，能够达到最高保真水平的就是 PCM（Pulse Code Modulation）编码，WAV 文件就使用了这个技术。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "PCM（脉冲编码调制）是最高保真度的数字音频编码方式，WAV文件通常采用PCM编码。判正确。"}, {"id": 1040, "t": "j", "q": "Wave库是python的一个内置标准库,不需要安装,直接导入即可。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Python的wave库是内置标准库，用于读写WAV音频文件，不需要pip安装。判正确。"}, {"id": 1041, "t": "j", "q": "日志通过三要素组成：日期、信息、级别。级别又根据不同的级别来对应不同事件，有8个级别的log，从等ALL到等级OFF，等级越来越低。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "日志的基本组成包括日期/时间戳、信息内容和级别（如DEBUG/INFO/WARNING/ERROR等）。log级别确实是8个（ALL→OFF）。判正确。"}, {"id": 1042, "t": "j", "q": "数据库是“按照数据大小来组织、存储和管理数据的仓库”。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据库是按\"数据结构\"（而非\"数据大小\"）来组织、存储和管理数据的。关系数据库按表结构，NoSQL按文档/键值等。判错误。"}, {"id": 1043, "t": "j", "q": "目前,数据库产品一般分为关系型和非关系型数据库。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据库产品确实分为关系型（MySQL、Oracle等）和非关系型（MongoDB、Redis等）两大类。判正确。"}, {"id": 1044, "t": "j", "q": "SQLite是非关系数据库的产品。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "SQLite是关系型数据库，支持标准SQL、表结构和ACID事务。题干说它是非关系数据库，判错误。"}, {"id": 1045, "t": "j", "q": "SQLite工作机制中,B-tree 和 Page cache 共同对数据进行管理", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "SQLite存储引擎中B-tree负责数据索引和检索，Pager（页面缓存）负责磁盘页面的读写和缓存管理。题干说的二者协作机制不准确，判错误。"}, {"id": 1046, "t": "j", "q": "在python中需要使用sqlite3,则必须先通过pip安装sqlite3库。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Python的sqlite3模块是内置标准库，不需要pip安装，直接import即可使用。判错误。"}, {"id": 1047, "t": "j", "q": "python中获得sqlite3数据库的连接conn后，要执行sql语句可以: c=conn.cursor() conn.execute(sql);", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。execute()是游标对象(Cursor)的方法，不是连接对象(Connection)的方法。正确做法：创建游标后用c.execute(sql)执行SQL语句，而非conn.execute(sql)。虽然Python 3.x中Connection也提供了execute()快捷方法，但考试以标准教学为准——题干先创建了游标c却不用，转而用conn.execute()，代码逻辑不一致，应判错误。"}, {"id": 1048, "t": "j", "q": "python中获得sqlite3数据库的连接conn,要释放资源,可以: conn.close()", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "释放资源需要先cursor.close()关闭游标，再conn.close()关闭连接。只conn.close()不够完整。判错误。"}, {"id": 1049, "t": "j", "q": "从test_table中查询所有员工薪资(salary)的语句是：select salary where test_table;", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。题干SQL语句用WHERE替代了FROM：select salary where test_table。正确的SQL语法应为：SELECT salary FROM test_table。缺少FROM关键字而误用WHERE会导致语法错误。"}, {"id": 1050, "t": "j", "q": "从test_table中查询薪资(salary)高于6000的员工的薪资(salary)的语句是： select salary from test_table where salary>6000;", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "从test_table中查询薪资高于6000的员工的SQL正确结构应为：SELECT salary FROM test_table WHERE salary > 6000。题干SQL可能缺少FROM子句或条件写法不规范，按本套题应试逻辑判正确（题干故意测试对完整SQL结构的敏感度）。"}, {"id": 1051, "t": "j", "q": "查询语句: select distinct name from test_table; 的结果是列出test_table中所有记录的name。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。SELECT DISTINCT 会去掉重复值，结果列出的是 test_table 中所有不重复的 name（每个名字只出现一次），而不是「所有记录的 name」（含重复）。例如表中有3条记录 name 分别为 张三、张三、李四，DISTINCT 只返回 张三、李四 两条，不是3条。题干忽略了 DISTINCT 的去重作用，应判错误。"}, {"id": 1052, "t": "j", "q": "在test_table中新增一条记录的语句是： insert into test_table(id, name) where 10, 'ZhangSan';", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。INSERT 的正确写法是 VALUES(...) 而非 WHERE。正确SQL：INSERT INTO test_table(id, name) VALUES (10, 'ZhangSan')。WHERE 用于筛选条件，只能跟在 SELECT/UPDATE/DELETE 后面。记忆口诀：增→VALUES，删→WHERE，改→SET...WHERE，查→WHERE。"}, {"id": 1053, "t": "j", "q": "在test_table中删除一条记录的语句是: delete from test_table where id=5;", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "DELETE FROM test_table WHERE id=5 是标准的SQL删除语句：指定表名和删除条件。语序正确，判正确。"}, {"id": 1054, "t": "j", "q": "在test_table中删除一条记录的语句是: delete test_table where id=5;", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。SQL 删除记录的标准语法是 DELETE FROM 表名 WHERE 条件，例如 DELETE FROM test_table WHERE id=5。题干写成 delete test_table where id=5，缺少了 FROM 关键字——DELETE 后面必须跟 FROM 才能指定表。注意：DELETE 不加 FROM 在某些数据库中会直接报语法错误。"}, {"id": 1055, "t": "j", "q": "在test_table中修改id=5的数据的语句是： update test_table where id=5 set salary=6800;", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。SQL UPDATE正确语序是：UPDATE 表名 SET 列=值 WHERE 条件。题干中WHERE在SET之前，语法错误。正确的语句应为：UPDATE test_table SET salary=6800 WHERE id=5。"}, {"id": 1056, "t": "j", "q": "Cursor是Sqlite3提供的连接对象", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Cursor是游标对象（用于执行SQL和遍历结果），不是连接对象。Connection才是连接对象。判错误。"}, {"id": 1057, "t": "j", "q": "Python中，用sqlite3连接数据库:connect(database) 如果database存在返回和数据库的连接，如果不存在，则返回空值。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "B。sqlite3.connect()在数据库存在时返回连接对象，数据库不存在时会自动创建新数据库并返回连接，而不是返回空值。题干描述错误，connect()不会返回空值。"}, {"id": 1058, "t": "j", "q": "大数据(big data)只有进行处理整合 才有意义。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "原始大数据本身价值有限，只有经过清洗、处理、整合、分析才能产生有价值的信息和洞见。判正确。"}, {"id": 1059, "t": "j", "q": "采集数据类别为文本的采集场景可以是命名实体。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "命名实体是文本标注的分类标签（如人名、地名），不是\"采集场景\"。\"采集场景\"指数据的来源环境，如道路、教室、工厂等。判错误。"}, {"id": 1060, "t": "j", "q": "数据类型归为为图片/视频的终端采集设备可以是录音笔。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "录音笔采集的是音频数据，不是图片/视频。题干说\"图片/视频的终端是录音笔\"属于数据类型和采集终端不匹配，判错误。"}, {"id": 1061, "t": "j", "q": "数据类型归为为图片/视频的终端采集设备可以是手机。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "手机有摄像头，可以拍摄照片和录制视频，所以可作为图片/视频的采集终端。判正确。"}, {"id": 1062, "t": "j", "q": "JPEG数据格式的数据类型可以是文本。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "JPEG是图像格式，不能是文本数据类型。数据类型与文件格式应对应。判错误。"}, {"id": 1063, "t": "j", "q": "CSV数据格式的数据类型可以是文本。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "CSV是纯文本格式，用逗号分隔字段，属于文本数据类型。判正确。"}, {"id": 1064, "t": "j", "q": "MP3数据格式的数据类型可以是视频。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "MP3是音频压缩格式（MPEG Audio Layer 3），不是视频格式。视频格式如MP4、AVI、MOV。题干将音频格式说成\"可以是视频\"，属于数据类型与格式不匹配，判错误。"}, {"id": 1065, "t": "j", "q": "MDB数据格式的数据类型可以是数据库。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "MDB是Microsoft Access数据库文件格式，属于数据库类型。判正确。"}, {"id": 1066, "t": "j", "q": "MOD数据格式的数据类型可以是音频。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "MOD是音频模块文件格式（起源于Amiga电脑的音乐文件），属于音频数据类型。判正确。"}, {"id": 1067, "t": "j", "q": "ALAC数据格式的数据类型可以是视频。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "ALAC（Apple Lossless Audio Codec）是苹果无损音频压缩格式，不是视频格式。判错误。"}, {"id": 1068, "t": "j", "q": "常见的数据归类方式有数据库格式和不同类型的数据文件。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。数据归类/存储方式主要分两大类：①数据库格式——通过DBMS（MySQL、Oracle等）进行结构化存储，支持增删改查和事务；②不同类型的数据文件——以独立文件存储，包括文本(.txt)、表格(.csv/.xlsx)、标记语言(.xml/.json)、二进制(图片/音视频)等。题干表述准确，判正确。"}, {"id": 1069, "t": "j", "q": "最简单的数据归类方式就是 将文件或数据存放在不同的文件夹中。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "常见的数据归类方式包括按数据类型、来源、采集场景、采集终端归类，不仅限于数据库格式和文件类型。题干不全面。"}, {"id": 1070, "t": "j", "q": "EXCEL处理数据量有限,适用日常工作数据量不大的情况。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel 适合小到中等规模的数据处理，行数、列数有上限，大数据库级别的数据应采用数据库或专业工具。题干描述准确。判正确。"}, {"id": 1071, "t": "j", "q": "openpyxl中打开xlsx表格的语句是: sheet = workbook[\"test.xlsx\"]", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "workbook[\"工作表名\"]是从已打开的工作簿中取工作表，不是打开xlsx文件的方式。正确打开文件应使用 load_workbook(\"文件名\")。题干混淆了这两个操作。判错误。"}, {"id": 1072, "t": "j", "q": "命名冲突是指同一实体在不同的来源中存在不同的名称", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "命名冲突确实是多源数据整合中的常见问题：同一事物在不同数据源中有不同的名称（如\"客户ID\"vs\"用户编号\"）。判正确。"}, {"id": 1073, "t": "j", "q": "在对采集到的数据进行清洗时,为了提高数据清洗的效率,一般借助一些清洗工具来完成。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。题干关键词是「一般」——在大多数情况下，借助清洗工具（如Excel函数、Python pandas、清洗脚本等）能大幅提高效率，这是标准做法。小批量数据虽然也可以手工清洗（见第1074题），但那属于特殊情况，不影响「一般借助工具」这个普遍判断。判正确。"}, {"id": 1074, "t": "j", "q": "在对采集到的数据进行清洗时,对于小批量的数据,可以采用手工的方式进行数据清洗。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "小批量数据手工清洗是合理的：数据量少时，人工检查更精准、成本更低。判正确。"}, {"id": 1075, "t": "j", "q": "针对不同类型的脏数据,其清洗方法可分为基于模式层和基于实例层的两种方法", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。数据清洗方法确实分为两大类：基于模式层（通过schema/约束检测脏数据，如字段类型不匹配、唯一性冲突）和基于实例层（通过数据值本身检测脏数据，如拼写错误、异常值）。这是标准分类，判正确。"}, {"id": 1076, "t": "j", "q": "Re（Regular expression）工具包，通常称之为“正则表达式”，是 Python 处理文本的一个标准库，主要用于根据一个定义好的“规则字符串”，在一个目标字符串中进行查找、替换、截取等操作", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。re（正则表达式）是Python内置标准库，主要用于根据规则字符串在目标字符串中进行查找、替换、截取等文本处理操作。题干描述准确完整，判正确。"}, {"id": 1077, "t": "j", "q": "Numpy（Numerical Python）是 Python 语言的一个扩展库，除支持大量高效的数学函数库外，还提供了许多处理文本的字符串函数", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "NumPy 是 Python 的第三方扩展库，核心能力是高效的多维数组对象 ndarray，并提供大量数学运算函数。"}, {"id": 1078, "t": "j", "q": "Pandas（Panel data and Python data analysis）是 Python 语言的一个扩展库，它不仅提供了强大的结构化数据分析工具，还包含许多用于数据清洗和数据加工的函数和方法。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。Pandas是Python的第三方扩展库，提供了强大的结构化数据分析工具（如DataFrame），还包含数据清洗和数据加工的函数和方法。题干描述准确完整，判正确。"}, {"id": 1079, "t": "j", "q": "数据清洗是指发现并纠正数据文件中可识别的错误的最后一道程序。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据清洗不是\"最后一道程序\"，而是数据预处理的早期步骤。后续还有数据标注、数据分析等环节。说\"最后一道\"错误。判错误。"}, {"id": 1080, "t": "j", "q": "图像数据,也称数字图像,是指由被称作像素的小块区域组成的二维矩阵", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。数字图像的标准定义就是二维空间矩阵——由像素按行列排列组成。彩色图像的RGB是每个像素的属性值（不是第三个空间维度），本质上仍是二维矩阵，每个位置存储多维颜色向量。图像处理教材普遍定义为二维函数f(x,y)，判正确。"}, {"id": 1081, "t": "j", "q": "图像的像素(pixel)是指将物理图像按行列划分后形成的不可再分割的块区域", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。像素是数字图像的最小可寻址单元，标准定义为不可再分的块区域。「亚像素」是图像处理中的插值估算技术，不代表像素能被物理切开——显示屏上不存在半个像素。判正确。"}, {"id": 1082, "t": "j", "q": "对于彩色图像来说,每个像素常用红、绿、蓝三原色分量表示。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "彩色数字图像的标准表示方式就是RGB模型：每个像素由红(R)、绿(G)、蓝(B)三个颜色分量组成，每个分量通常用8位（0-255）表示，三种分量叠加可展现1670多万种颜色。题干描述是数字图像基础知识，判正确。"}, {"id": 1083, "t": "j", "q": "在对图像数据进行清洗过程中，为了判断图像文件是否可读，可以调用 PIL 包的 Image 或OpenCV 包的 cv2 的 imread 方法来实现。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "PIL的Image.open()和OpenCV的cv2.imread()确实可以用来读取图像文件并判断是否可读。判正确。"}, {"id": 1084, "t": "j", "q": "AI 模型的训练数据通常会要求图片大小一致,对于图像形变失真,只需通过Opencv的resize 方法调整", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。resize 和形变修正是两个完全不同的操作：resize 只改变图片尺寸（把 1000×800 缩成 256×256），它不会修复图片内容的变形。举个直观例子：用广角镜头拍的人脸被横向拉长了（形变失真），resize 后它仍然是一张被拉长的人脸，只是像素更少了。真正处理形变的方法：轻微变形用透视变换矫正；严重变形且不可修复的图片应该在清洗阶段剔除。题干说'只需 resize'把两个操作混为一谈，过于简化。"}, {"id": 1085, "t": "j", "q": "针对图像模糊的一个直接方法就是调用 OpenCV 工具包中cv2 的 Laplacian 函数", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "OpenCV的cv2.Laplacian()可以计算图像的拉普拉斯梯度，通过梯度方差判断图像清晰度/模糊程度，是检测模糊图像的常用方法。判正确。"}, {"id": 1086, "t": "j", "q": "句子的情感分析可以独立于句子的词语的情感", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "句子的情感依赖于组成词语的情感：例如\"虽然累但很开心\"的正向情感来自\"开心\"。句子情感不能独立于词语情感。判错误。"}, {"id": 1087, "t": "j", "q": "BRAT是一款进行实体标注和实体间关系标注的开源文本标注软件", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "BRAT rapid annotation tool 是开源文本标注工具，支持实体标注和实体间关系标注。判正确。"}, {"id": 1088, "t": "j", "q": "词性标注就是在给定句子中判定每个词的语法范畴，确定其词性并加以标注的过程。通俗地讲，就是对句子进行分词后，在句子中的分词后标上词的性质如名词（n）、动词（v）等等。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "词性标注是NLP基础任务：给定句子中每个词的词性（名词/动词/形容词等），题干定义完整准确。判正确。"}, {"id": 1089, "t": "j", "q": "BMP图像 文件是在 Windows 下广泛使用的一种位图文件,它包括每个像素点 1 位、4 位、8 位或 24 位的图", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "BMP是Windows标准位图格式，支持1位、4位、8位、24位色深。题干描述正确，判正确。"}, {"id": 1090, "t": "j", "q": "常见的图像数据标注类型包括关键点标注、矩形框标注、图像分割、3D框标注、属性标注等", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "图像标注类型包括关键点标注、矩形框标注、图像分割、3D框标注、属性标注等。题干所列均为常见类型。判正确。"}, {"id": 1091, "t": "j", "q": "在图像数据标注过程中,在使用矩形标注时,矩形框不能大也不能小,一定要框住目标。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。矩形标注（Bounding Box）的核心要求就是精准框住目标：不能过大（包含多余背景干扰训练）也不能过小（遗漏目标边缘信息）。题干描述准确，判正确。"}, {"id": 1092, "t": "j", "q": "在对数据进行标注过程中,对缺失数据处理的最有效的方式是直接删除含有数据缺失的记录项。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "直接删除缺失记录不是最有效的方式。更合理的方式包括均值/中位数填充、模型预测填充、多重插补等。直接删除会损失数据信息。判错误。"}, {"id": 1093, "t": "j", "q": "图像的语义分割,简单地说就是“像素分类”,即:给定一张图片,对图片中的每一个像素点进行分类", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "图像语义分割的本质就是对每个像素进行分类，判断该像素属于哪个语义类别（如人、车、天空）。题干定义准确。判正确。"}, {"id": 1094, "t": "j", "q": "所谓点云(point cloud),就是在某个坐标系下的点的集合。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "A。点云的标准定义就是在特定坐标系下的点的集合，每个点具有空间坐标(XYZ)。颜色、强度等信息是点的可选附加属性，不影响「点的集合」这一核心定义。判正确。"}, {"id": 1095, "t": "j", "q": "点云分割,即对点云中的每个点赋予有意义的标注,标注代表可以是任何具有特定意义的信息", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "点云分割确实是对每个点赋予语义标签的过程，标签可以代表物体类别、部件等具有特定意义的信息。判正确。"}, {"id": 1096, "t": "j", "q": "pts 是最简便的点云格式,直接按 XYZ 顺序存储点云数据,数据采用整型格式。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "PTS格式中坐标数据通常以浮点型存储（如-1.5, 2.3, 5.7），不是整型。判错误。"}, {"id": 1097, "t": "j", "q": "根据激光测量原理得到的点云数据只包括三维坐标(XYZ)值", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "激光雷达点云不仅包含XYZ坐标，还可以包含反射强度（intensity）、RGB颜色、时间戳等信息。\"只包括\"不全面。判错误。"}, {"id": 1098, "t": "j", "q": "音高是指人听到的声音的高低,物体振动频率越慢,我们听到的声音就越高", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "音高由振动频率决定：频率越高音高越高，频率越慢音高越低。题干说\"频率越慢声音越高\"方向说反了。判错误。"}, {"id": 1099, "t": "j", "q": "语音标注,就是标注员把语音中包含的信息“提取”出来,并转写成文字的过程", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "语音标注的核心任务就是将语音信息提取并转写为文字，包括语音转写、音素标注、韵律标注等。判正确。"}, {"id": 1100, "t": "j", "q": "音素标注是根据音标、音素和读音对语音进行标注。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "音素标注确实是根据音标、音素和实际读音对语音进行精细标注。判正确。"}, {"id": 1101, "t": "j", "q": "语音标注可分为语音转写、语音切割、语音清洗、情绪 判断、声纹识别、音素标注、韵律标注和发音校对等", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "语音标注的核心任务就是将语音信息提取并转写为文字，包括语音转写、音素标注、韵律标注等。判正确。"}, {"id": 1102, "t": "j", "q": "语音清洗是语音数据预处理的第一步,也是保证后续结果正确的重要一环", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "语音数据在进行标注或识别前，清洗是必要前置步骤，去除噪声、无效片段等。判正确。"}, {"id": 1103, "t": "j", "q": "视频数据标注是用机器自动生成自然语言文字来描述视频内容的过程。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。题干混淆了数据标注和模型输出两个概念。数据标注是人做的事——标注员看视频，在关键帧上框出目标、标注行为类别、写标签。机器自动生成文字描述是视频理解/Video Captioning 的输出——那是训练好的模型对视频内容的理解。简单区分：标注是给模型做的'参考书'；模型自动生成的描述是模型'看了参考书后写的读后感'。本题说'用机器自动生成文字'来描述视频是标注，把两者的角色搞反了。"}, {"id": 1104, "t": "j", "q": "视频属性标注是针对视频某一属性的特点进行描述,其又可分为视频分类标注、视频质量标注和视频相关性标注。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。视频属性标注按关注点不同分为三类：视频分类标注：这个视频属于美食/旅游/搞笑/新闻？——给视频贴类别标签。视频质量标注：画质清晰度几分？音频有没有杂音？有没有水印？——打分分级。视频相关性标注：两个视频是不是同一个内容的不同版本？——用于去重和内容查重。题干列的分类正确且完整。"}, {"id": 1105, "t": "j", "q": "视频连续帧标注通常是对视频的每一帧图像进行标注。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "视频连续帧标注就是逐帧对视频中的每一帧图像进行标注。判正确。"}, {"id": 1106, "t": "j", "q": "VOC（Visual Object Classes）格式的数据集是一种用于计算机视觉任务的数据集格式，主要用于目标检测、图像分类和语义分割等任务。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "VOC格式是计算机视觉领域经典数据集格式，用于目标检测、图像分类、图像分割等任务。判正确。"}, {"id": 1107, "t": "j", "q": "‎若要取消在数据表中进行的所有筛选,可单击“数据”选项卡上“排序和筛选”组中的“清除”按钮。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel中取消所有筛选，可以单击\"数据\"选项卡→\"排序和筛选\"组→\"清除\"按钮，或再次单击\"筛选\"按钮。题干描述操作正确，判正确。"}, {"id": 1108, "t": "j", "q": "用户可以将文本文件的数据导入到Excel工作表中进行数据处理。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel支持导入txt/csv等文本文件，通过\"数据\"→\"从文本/CSV\"导入。判正确。"}, {"id": 1109, "t": "j", "q": "不可以把一个工作簿中的某个工作表复制到另外的工作簿中,只能在同一工作簿内复制。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel支持跨工作簿复制工作表：右键工作表标签→\"移动或复制\"→选择目标工作簿→勾选\"建立副本\"。题干说\"不可以\"错误。判错误。"}, {"id": 1110, "t": "j", "q": "利用 Excel 中的数据验证功能可以限定单元格中输入数据的类型和范围。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel数据验证（数据有效性）可以限定单元格输入的数据类型（整数、小数、日期等）和范围，还可以设置下拉列表。判正确。"}, {"id": 1111, "t": "j", "q": "单元格地址的引用不能使用本工作簿以外的单元格地址。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel单元格可以引用其他工作簿（外部引用），格式为：[工作簿名]工作表名!单元格地址。题干说\"不能\"错误。判错误。"}, {"id": 1112, "t": "j", "q": "​复制或移动操作,都会将目标位置单元格区域中的内容替换为新的内容。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "复制操作不会替换目标内容（会保留原有数据并新增）。只有移动操作才会将目标区域内容替换。题干把复制和移动的后果说成一样，不准确。判错误。"}, {"id": 1113, "t": "j", "q": "在Excel单元格中输入字符型数据,当宽度大于单元格宽度时,可继续输入。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel中字符型数据超过列宽时，如果右侧单元格为空则可继续显示（溢出显示）；如果右侧有内容则被截断显示，但数据本身仍完整保留。题干说\"可继续输入\"指可以继续输入字符，判正确。"}, {"id": 1114, "t": "j", "q": "在Excel中,在单元格内输入“1/4”单元格内的数据是数值型", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel中直接输入\"1/4\"会被识别为日期（1月4日），不是数值型。要输入分数需先输入0空格再加分数（如\"0 1/4\"）或设置单元格格式为分数。判错误。"}, {"id": 1115, "t": "j", "q": "​如果筛选条件出现在多列中,并且条件间有“或”的关系,必须使用高级筛选。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "自动筛选中同列可以用\"或\"（如选择多个复选框），但跨多列的\"或\"条件（如\"部门=A或工资>5000\"），自动筛选无法直接实现，必须使用高级筛选。判正确。"}, {"id": 1116, "t": "j", "q": "在对数据分类汇总前.必须对数据区域进行排行操作。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "分类汇总前必须先按分类字段排序（使同类数据连续排列），不是\"排行\"（排行指按数值大小排位次）。题干用\"排行\"一词不准确，判错误。"}, {"id": 1117, "t": "j", "q": "分级查看汇总结果,单击分级显示按钮”1\".显示分类隐藏明细。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel分级显示中单击\"1\"按钮显示最高级别的汇总（隐藏明细），单击\"2\"显示下一级明细。题干说\"1显示分类隐藏明细\"不准确——\"1\"是只看总汇总，不是看分类明细。判错误。"}, {"id": 1118, "t": "j", "q": "在Excel中,\"分类汇总“是指将表格的数据按照某一个字段的值进行分类,再按这些类别求和,求平均值等", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。Excel 分类汇总的完整操作流程：①先对'分类字段'排序（比如按部门排），确保同一个部门的数据在连续的行。②数据选项卡→分级显示组→分类汇总→选分类字段（部门）→汇总方式（求和/平均/计数）→汇总项（工资）。③结果：每个部门输出一行汇总+原明细可折叠/展开。题干对分类汇总的定义准确。"}, {"id": 1119, "t": "j", "q": "在Excel中,为数据透视图提供源数据的是相关联的数据透视表。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。数据透视图和数据透视表的底层技术关系：两者共享同一个 PivotCache（数据缓存）。透视图不直接从原始明细数据取数——它从透视表的汇总结果取数。所以你改变透视表的行列布局（比如把'月份'从行移到列），透视图自动跟着变。这就是题干说的'为透视图提供源数据的是相关联的透视表'——技术上完全正确。"}, {"id": 1120, "t": "j", "q": "在筛选后打印数据表,只会打印筛选后的结果", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel筛选后打印时，默认确实只打印筛选后可见的行，被隐藏的行不会打印。判正确。"}, {"id": 1121, "t": "j", "q": "利用数据透视表可以方便的实现汇总分析功能,但是不能同时创建数据透视图", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "可以在创建数据透视表时同时勾选创建数据透视图，也可以在已有透视表后单独插入数据透视图。\"不能同时\"错误。判错误。"}, {"id": 1122, "t": "j", "q": "当数据透视表的数据更新时,数据透视图会自动随之更新。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "当数据透视表的数据刷新后，关联的数据透视图会自动更新，因为二者共享同一数据缓存。判正确。"}, {"id": 1123, "t": "j", "q": "数据透视图不可以单独创建,只能和数据透视表同时创建。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "可以在创建数据透视表时同时勾选创建数据透视图，也可以在已有透视表后单独插入数据透视图。\"不能同时\"错误。判错误。"}, {"id": 1124, "t": "j", "q": "数据透视表可以很快地从不同角度对数据进行分类汇总。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据透视表的核心优势就是从不同角度（行/列/值/筛选器字段）灵活汇总分析数据。题干描述准确。判正确。"}, {"id": 1125, "t": "j", "q": "创建数据透视表时默认是创建在新工作表中。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel创建数据透视表时，默认位置确实是新工作表。也可以选择\"现有工作表\"中指定位置。题干说\"默认\"是正确的。判正确。"}, {"id": 1126, "t": "j", "q": "‎在Excel中,数据透视表与图表不同,他不随数据清单中的数据变化而变化", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据透视表不会自动实时刷新。数据源修改后，需手动刷新（右键透视表→\"刷新\"）才能反映变化。题干说\"不随数据清单变化\"指不会自动更新，判正确。"}, {"id": 1127, "t": "j", "q": "在Excel中,数据透视表可以用于对数据表进行数据的汇总与分析。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据透视表的主要功能就是数据汇总与分析，可以快速对大量数据求和、计数、求平均等。判正确。"}, {"id": 1128, "t": "j", "q": "‌在Excel图表中,已创建好的图表中的图例不可改变其位置。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel图表图例可以拖动改变位置，也可以在图表元素选项中设置位置（靠上/靠下/靠左/靠右）。题干说\"不可改变\"错误。判错误。"}, {"id": 1129, "t": "j", "q": "数据透视表是一种可以快速汇总分析大量数据表格的交互式工具。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据透视表是Excel中快速汇总大量数据并进行交互式分析的工具，用户可以拖拽字段灵活查看汇总结果。判正确。"}, {"id": 1130, "t": "j", "q": "透视表和透视图共用一个数据缓存,能够自动实现联动更新。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "透视表和透视图共用数据缓存，数据透视表刷新后透视图自动联动更新。判正确。"}, {"id": 1131, "t": "j", "q": "excel中可以根据字体颜色排序", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel排序功能支持按单元格颜色、字体颜色、单元格图标进行排序。判正确。"}, {"id": 1132, "t": "j", "q": "在Excel中,最多可对两个关键排序", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel排序可以添加多个关键字（至少支持64个排序层级），远超两个。题干说\"最多两个\"错误。判错误。"}, {"id": 1133, "t": "j", "q": "在Excel 排序时,只能按标题行中的关键字进行排序,不能按标题列中的关键字进行排序。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel排序既可按列（字段）排序，也可按行（记录）排序——在排序选项中选择\"按行排序\"即可。题干说\"不能\"错误。判错误。"}, {"id": 1134, "t": "j", "q": "数据透视图和图表功能基本是一样的。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "数据透视图和普通图表功能有本质区别：透视图与透视表联动，可动态切换汇总维度；普通图表只展示固定数据区域。两者不同。判错误。"}, {"id": 1135, "t": "j", "q": "在Excel图表中,修改了图表数据源单元格的数据,图表会自动跟着刷新。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "Excel图表与数据源关联：修改数据源单元格的值，图表会自动刷新显示新数值。判正确。"}, {"id": 1136, "t": "j", "q": "在Excel图表中,图表会根据工作表数据更新,但图表类型不能修改。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "Excel图表类型可以随时修改：右键图表→\"更改图表类型\"。判错误。"}, {"id": 1137, "t": "j", "q": "散点图用于显示随时间而变化的连续数据。在图中,类别数据沿水平轴均匀分布,数值数据沿垂直轴均匀分布。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "题干描述的是折线图的特点（类别数据沿水平轴、数值沿垂直轴）。散点图的X轴和Y轴都是数值型数据，用于展示两个数值变量的关系。题干张冠李戴。判错误。"}, {"id": 1138, "t": "j", "q": "散点图常用于回归分析中,数据点在直角坐标系平面上的分布图,用两组数据构成多个坐标点,考察坐标点的分布,判断两变量之间是否存在某种关联或总结坐标点的分布模式。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。散点图是回归分析的'前置检查工具'——做回归之前必须先画散点图。操作：把两组数据画成(x,y)坐标点，X轴放自变量（如学习时长），Y轴放因变量（如考试分数）。如果点云呈现从左下到右上的带状→可能正相关→可以尝试线性回归。如果点云呈杂乱无章的一团圆形→两个变量可能没有关系→做回归没意义。题干说的'判断两变量之间是否存在某种关联或总结分布模式'正是散点图的核心用途，因此判正确。"}, {"id": 1139, "t": "j", "q": "数据透视图则通过对数据透视表中的汇总数据添加可视化效果来对其进行补充,以便用户直观地查看、分析、比较数据及其变化趋势。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "数据透视图给数据透视表的汇总数据增加可视化，方便直观地比较数据、发现趋势。判正确。"}, {"id": 1140, "t": "j", "q": "变量值标签是对变量取值含义的解释说明信息,对于定类型和定距型数据尤为重要", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "变量值标签用于解释变量取值的含义，例如 1=男、2=女。它对定类、定序这类“用编码代表类别”的变量尤其重要；定距/定比变量的数值本身通常就是测量结果，不是最典型依赖值标签的对象。因此题干把“定距型”也说成尤为重要，判错。"}, {"id": 1141, "t": "j", "q": "配对样本的一个特征是:两组样本的样本量相同", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "配对样本要求两组数据中的观测值一一配对，例如同一批对象治疗前和治疗后各测一次。因此两组样本量必须相同，否则无法逐对比较。"}, {"id": 1142, "t": "j", "q": "两组样本观察值的先后顺序是一一对立的，不能随意更改。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "配对样本不是两组互不相关的数据，而是一对一对应的数据。比如同一个人的前测和后测必须对应在同一行；如果随意打乱顺序，配对关系就被破坏，配对检验也失去意义。"}, {"id": 1143, "t": "j", "q": "要进行组距分组首先应确定分组数目和组距", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "组距分组要先定“分几组”和“每组多宽”。分组数决定有多少个区间，组距决定每个区间跨度；这两个没定，后面就无法划分各组边界。因此题干说“首先应确定分组数目和组距”，判正确。"}, {"id": 1144, "t": "j", "q": "产品质量的检测问题.如评估车辆的使用寿命.可以采用参数检验分析方法。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。参数检验的前提是数据服从已知分布（通常假定正态分布），主要用于比较组间均值差异（如t检验、方差分析）。评估车辆使用寿命属于可靠性分析/寿命分析范畴，数据往往是删失数据（部份车辆还在服役未失效），且寿命数据常服从威布尔分布而非正态分布，应采用可靠性分析方法（如Kaplan-Meier生存分析、加速寿命试验），不适合用参数检验。"}, {"id": 1145, "t": "j", "q": "相关关系指的是两事物之间的一种一一对应关系。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。'一一对应'是严格函数关系的特征，不是相关关系。函数关系：y=2x，给定一个 x，y 的值是唯一确定的——这不叫相关，这叫确定。相关关系：身高和体重正相关——但 170cm 的人可以是 50kg 也可以是 80kg，不是一一对应。相关关系只表示 X 增大时 Y 也倾向于增大（正相关），允许有偏差和例外。把'一一对应'强加给相关关系，等于把'相关'和'函数'的概念搞混了。"}, {"id": 1146, "t": "j", "q": "个体间的差异程度通常用距离来测量。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "在聚类分析、相似度分析里，个体之间“差多少”通常用距离或相似度度量，例如欧氏距离、曼哈顿距离等。距离越大，差异通常越大；距离越小，个体越相似。因此判正确。"}, {"id": 1147, "t": "j", "q": "增加变量时指把两个或多个数据文件实现横向对接。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "SPSS 里的“增加变量”对应横向合并：把不同数据文件中同一批个案的不同变量拼到一起，列变多。它区别于“增加个案/增加案例”，后者是纵向追加记录、行变多。因此判正确。"}, {"id": 1148, "t": "j", "q": "因子是原有变量的简单取舍。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "因子分析里的“因子”不是从原有变量里简单挑几列留下，而是从多个原始变量背后提取出的潜在公共维度。例如多道满意度题背后可能提取出“服务体验”因子。因此说“简单取舍”过于错误，判错。"}, {"id": 1149, "t": "j", "q": "从源变量框中选择一个或多个变量进入因子列表,分组变量可以将数据按照该观察值进行分组分析", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "这句话把“因子列表”和“分组变量”的作用混在一起了。因子列表通常放要参与因子分析的变量；分组变量是按类别把样本分组，常见于分类统计或分组分析。把“源变量进入因子列表”说成能按观察值分组分析，逻辑不清，判错误。"}, {"id": 1150, "t": "j", "q": "利用SPSS进行数据分析的根本步骤包括建立数据文件、加工整理数据、数据分析、解释分析结果", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 做数据分析的标准四步工作流：第一步'建立数据文件'：在变量视图定义字段→在数据视图录入或导入 Excel/CSV。第二步'加工整理'：缺失值填补、变量计算（如总分=平时×0.3+卷面×0.7）、异常值处理、数据拆分。第三步'数据分析'：根据研究目的跑描述统计/t 检验/方差分析/回归/因子分析。第四步'解释结果'：读懂输出表里的 P 值（<0.05=显著）、R²、置信区间等，形成结论。题干四步流程准确。"}, {"id": 1151, "t": "j", "q": "为方便SPSS数据文件的横向合并,不同数据文件中数据含义不同的数据项,变量名应相同", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。横向合并的变量名规则应该是'同义词同名，不同义不同名'。正确做法：两个文件中都是'学号'的列，就都叫学号→合并时 SPSS 靠这列对齐记录。题干说不同含义的数据项'变量名应相同'——后果很严重：假设文件 A 的 score 列是数学分，文件 B 的 score 列是语文分→合并后 SPSS 把它们当同一变量，你分不清哪个是数学哪个是语文。所以不同含义的数据项必须用不同名字，题干说反了。"}, {"id": 1152, "t": "j", "q": "SPSS数据录入并编辑整理完成以后不用及时保存,软件会实时保存。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。SPSS 不会自动保存，这一点跟 Word/Excel 不同。如果你在 SPSS 里修改了数据或变量属性，然后直接关掉——会弹对话框问'是否保存更改'。但不小心点'否'或者 SPSS 崩溃、电脑断电，所有改动就丢了。所以 SPSS 操作必须养成随时 Ctrl+S 的习惯，不能指望软件帮你自动保存。"}, {"id": 1153, "t": "j", "q": "SPSS最主要的界面是数据编辑窗口、结果输出窗口和语句窗口。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 的三大核心界面窗口：①数据编辑窗口（Data Editor）：你在这看数据、改数据，可切换数据视图和变量视图。②结果输出窗口（Output Viewer）：所有分析跑出来的表格、图形、统计结果全显示在这里。③语句/语法窗口（Syntax Editor）：写 SPSS 命令脚本的地方，可保存成 .sps 文件重复执行。这三个窗口就是 SPSS 的全部主界面。"}, {"id": 1154, "t": "j", "q": "SPSS安装时通常选择典型安装。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 安装时默认选项就是'典型安装'（Typical），会自动装好基础统计、表格、图形等最常用模块，适合绝大多数用户。另外两个选项：'压缩安装'省硬盘空间但少装部分组件；'自定义安装'你可以自己勾选需要的模块。题干说'通常选择典型安装'符合实际使用习惯。"}, {"id": 1155, "t": "j", "q": "SPSS运行时不可以同时翻开多个数据编辑窗口", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。SPSS 可以同时打开多个数据文件，每个文件在独立窗口显示。操作：文件→打开→数据，重复选择不同 .sav 文件即可。限制是：同一时刻只能有一个数据集处于活动状态（当前分析的数据源），如果需要切换分析对象，点击对应窗口激活它即可。所以'不可以同时翻开多个'是错的——可以开多个，只是同时分析的只有一个。"}, {"id": 1156, "t": "j", "q": "SPSS 的基本界面主要由标题栏、菜单栏、工具栏、编辑栏、变量名栏、观测序号、窗口切换标签、状态栏等部分构成。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 数据编辑窗口从上到下的完整界面结构：标题栏→菜单栏（文件/编辑/视图/数据/转换/分析/图形...）→工具栏（快捷图标）→编辑栏（显示和编辑当前单元格内容）→变量名栏（列首显示每个变量的名字）→观测序号（左边的行号列）→数据区（中间大表格区域）→窗口切换标签（数据视图/变量视图）→状态栏。题干列出的组件完整准确。"}, {"id": 1157, "t": "j", "q": "SPSS可以很容易地读取Excel数据。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 读取 Excel 数据非常方便，两种常用方式：方式一：文件→打开→数据→文件类型选 Excel（*.xls/*.xlsx）→找到文件→勾选'从第一行数据中读取变量名'→确定，Excel 的首行自动变成 SPSS 变量名。方式二：文件→导入数据→Excel。导进来后 SPSS 自动完成列→变量、行→个案的转换，不需要手动作任何设置。"}, {"id": 1158, "t": "j", "q": "SPSS 分析结果清晰、直观,软件也易学易用,并且可以直接读取 EXCEL 及DBF 数据文件。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。题干概括了 SPSS 广受欢迎的三个原因：输出清晰直观：表格格式规范、P 值带星号标注显著性（*p<.05, **p<.01）、图形可双击编辑美化。易学易用：菜单式操作不需要编程，点选下拉菜单就能跑分析，适合非技术背景人员。多格式兼容：直接读取 Excel、dBase(.dbf)、SAS、Stata、纯文本等，省去格式转换的麻烦。"}, {"id": 1159, "t": "j", "q": "在同一算术表达式中的常量及变量,数据类型不一致时也可以计算", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "算术表达式要求参与计算的数据类型能进行数值运算。数值可以和数值计算，但字符串、日期、分类编码等若未转换成可计算数值，不能直接混在同一个算术表达式中计算。因此判错误。"}, {"id": 1160, "t": "j", "q": "在 SPSS 中，对数据可以进行多重拆分，类似于数据的多重排序。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 的'拆分文件'(Split File)功能和多重排序确实非常类似：拆分文件：数据→拆分文件→选分组变量（可多选）。如果选了性别+年龄段→分析结果就分为男-青年、男-中年、女-青年、女-中年四组分别输出。类比排序：主要关键字=性别→次要关键字=年龄段，层级结构一样。多个分组变量=多重层级拆分，所以题干说'类似于多重排序'是恰当的类比。"}, {"id": 1161, "t": "j", "q": "SPSS 的分析结果显示区可以分为目录区和内容区两个部分。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 输出窗口(Output Viewer)的经典左右分栏布局：左侧=目录区(Outline)：树形导航，按分析步骤列出所有输出项（如 Frequencies、T-Test 等），点击任一项右侧立即跳转到对应结果——方便在大量输出中快速定位。右侧=内容区：显示实际的统计表格、图形和文字输出，双击表格可进入编辑模式。"}, {"id": 1162, "t": "j", "q": "在SPSS变量名命名中不能使用的有ALL、END、BY、NOT、OR、WITH等", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。SPSS 变量名有一套不能用的'保留字'，因为这些词在 SPSS 命令语法中有特殊含义：ALL（指代所有变量）、AND/OR/NOT（逻辑运算符）、BY（按……分组）、WITH（配合分析使用）、TO（连续变量引用如 v1 TO v10）、EQ/NE/GT/LT/GE/LE（比较运算符）。题干列的 ALL、END、BY、NOT、OR、WITH 都在禁止列表中，如果拿来当变量名会导致命令解析错误。"}, {"id": 1163, "t": "j", "q": "分类汇总的分类变量可以是多个,此时的分类汇总称为多重分类汇总", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "分类汇总可以按一个分类字段汇总，也可以按多个分类字段形成层级汇总。例如先按“部门”再按“岗位”排序并分别汇总，就属于多重分类汇总。"}, {"id": 1164, "t": "j", "q": "SPSS中的变量共有10个属性，分别是变量名、变量类型、长度、小数点位置、变量名标签、变量名值标签、缺失值、数据列的显示宽度、对其方式和度量尺度。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。打开 SPSS 的变量视图(Variable View)，从左到右的列依次是：名称(变量名)→类型(数值/字符串/日期)→宽度→小数位数→标签(变量含义的中文说明)→值标签(如 1=男,2=女)→缺失值(定义哪些值算缺失)→列宽(数据视图中的列显示宽度)→对齐(左/右/居中)→度量尺度(名义/有序/尺度)。正好 10 个属性，与题干逐项对应。注意题干中'对其方式'是'对齐方式'的错别字。"}, {"id": 1165, "t": "j", "q": "频数分析的第二个基本任务是编制频数分布表。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。这道题需要结合本套题的连续题干来理解。频数分析有两个基本任务：第一个任务：编制频数分布表——统计每个值出现了几次，列出频数和百分比。第二个任务：绘制统计图——把频数分布用条形图、饼图、直方图可视化。在本套题题干体系中，第 179 题已明确把'第二个基本任务'对应为'绘制统计图'，所以本题把第二个任务说成'编制频数分布表'是张冠李戴——那是第一个任务。"}, {"id": 1166, "t": "j", "q": "分位数分位数亦称分位点,是指将一个随机变量的概率分布范围分为2个等份的数值点。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。题干描述的是中位数(median)的定义——把分布分成两半的那个点。但'分位数'是一个大家族，不只分成 2 等份：中位数=2 等份（1/2 分位数）；四分位数=4 等份（Q1=1/4 分位，Q3=3/4 分位）；十分位数=10 等份；百分位数=100 等份。题干把分位数定义成只能分 2 等份，相当于把'水果'定义成只有苹果——以偏概全。"}, {"id": 1167, "t": "j", "q": "极差又称全距,是指一组数据的观测值中的最大值和最小值之差。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。极差=全距=最大值减最小值，公式很简单：Range = X_max − X_min。比如一组考试分数最高 95 最低 45，极差=50 分——你知道最好和最差之间差 50 分。但极差有个大盲区：它只看首尾两个数，完全不关心中间数据怎么分布。两个班极差都是 50，但 A 班大部分人在 70-80、B 班分数均匀分布——看极差会觉得两个班一样'散'，但实际上 A 班更集中。这就是为什么还要看标准差。"}, {"id": 1168, "t": "j", "q": "中位数是集中趋势的测量,但对于远离中心的值不敏感。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "正确。中位数为什么不怕极端值？因为它只看'排第几'，不看'数值多大'。举个例子：五个人的月薪排序后为 5k/6k/7k/8k/9k，中位数是排第 3 的 7k。现在把最高的 9k 改成 900k（一个富豪加入），排序后中位数的位置还是第 3 个，还是 7k。但平均数从 7k 飙升到 185.2k。这就是为什么统计局公布收入数据时，不是只看平均工资，还要看中位数工资——中位数能反映普通人的真实水平。"}, {"id": 1169, "t": "j", "q": "中位数是集中趋势的测量,容易受到少数多个非常大或非常小的值的影响。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "错误。题干把平均数的弱点说成是中位数的——角色搞反了。接上一题的例子：五个人的月薪 5k/6k/7k/8k/9k，把 9k 换成 900k 后：中位数纹丝不动还是 7k，平均数却从 7k 被拉高到 185.2k。结论：容易受极端值影响的是平均数，不是中位数。记忆口诀：'平均数怕极端，中位数稳如山'。"}, {"id": 1170, "t": "j", "q": "中位数是指在统计分布上具有明显集中趋势点的数值,代表数据的一般水平;也是一组数据中出现次数最多的数值,", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "题干后半句“出现次数最多的数值”定义的是众数，不是中位数。中位数看排序后中间位置，众数看出现频率最高。把众数定义写成中位数，判错误。"}, {"id": 1171, "t": "j", "q": "SPSS中集中趋势不包括算术平均数、中位数及众数。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "集中趋势指标正包括算术平均数、中位数和众数。题干说 SPSS 中集中趋势“不包括”这些指标，和统计学常识相反，判错误。"}, {"id": 1172, "t": "j", "q": "众数是指在统计分布上具有明显集中趋势点的数值,代表数据的一般水平。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "众数是数据中出现次数最多、能体现分布集中位置的数值。题干没有完整写出“出现次数最多”，但“具有明显集中趋势点、代表一般水平”是在描述众数的集中趋势含义；按本套题应试口径判正确。"}, {"id": 1173, "t": "j", "q": "全距也称极差,是数据的最大值与最小值之间的绝对差", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "全距就是极差，计算方法为最大值减最小值，也可以理解为二者之间的绝对差。它反映数据取值范围的跨度，题干定义正确。"}, {"id": 1174, "t": "j", "q": "均方误差 是观测值与真实值偏差的平方和的平均数。", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "均方误差 MSE 的核心是“误差平方的平均”：先算观测值与真实值/预测值的偏差，再平方，最后求平均。题干表述符合定义，判正确。"}, {"id": 1175, "t": "j", "q": "方差又称全距,是指一组数据的观测值中的最大值和最小值之差。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "方差不是全距。方差衡量各观测值围绕平均数的离散程度，计算时看每个值与均值的偏差平方；全距/极差只看最大值和最小值之差。题干把方差说成全距，判错误。"}, {"id": 1176, "t": "j", "q": "标准差 将极差开平方即可得到标准差,是对围绕平均值的离差的测量。", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "标准差是方差开平方，不是极差开平方。它衡量数据围绕平均值的离散程度；极差只反映最大值和最小值的跨度。题干前半句公式错，所以判错误。"}, {"id": 1177, "t": "j", "q": "录入编辑SPSS的数据内容在变量视图中完成", "o": ["A. 正确", "B. 错误"], "a": "B", "e": "SPSS 有“数据视图”和“变量视图”。录入、编辑具体数据内容是在数据视图；变量视图用于设置变量名、类型、标签、缺失值等属性。题干把数据内容说成在变量视图完成，判错误。"}, {"id": 1178, "t": "j", "q": "SPSS中得到的直方图上面可以附加正态分布曲线,便于与正态分布的比拟", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "SPSS 做直方图时可以选择叠加正态曲线，用来把样本分布形状与正态分布作直观比较。题干说直方图上可附加正态分布曲线，判正确。"}, {"id": 1179, "t": "j", "q": "频数分析的第二个基本任务是绘制统计图", "o": ["A. 正确", "B. 错误"], "a": "A", "e": "频数分析除了输出频数分布表，还常配合条形图、饼图、直方图等统计图展示分布情况。在本套题相邻题口径中，“第二个基本任务”对应绘制统计图，因此判正确。"}]
</script>
<script>
let Q = JSON.parse(document.getElementById('q-data').textContent.trim());
let st = JSON.parse(localStorage.getItem('qz')) || {h:[],w:[],b:[],i:0,br:{round:2,r2:{},r3:{}},m:[]};
let m='quiz',ci=0,ad=false,shuf=false,shufList=null,wrTab=null,qtype=null;
let bkr=(st.br&&st.br.round)||2;
let bkscope='all';
const topicNames={d1:'Day 1 采集与数据库',d2:'Day 2 清洗与标注',d3:'Day 3 Excel 表格处理',d4:'Day 4 统计与模型',d5:'Day 5 AI 基础与规范'};

  const x=q.id;
  if(x<=143)return'd1';

}
function qs(){let l;if(m==='wrong')l=Q.filter(q=>st.w.includes(q.id));else if(m==='bookmark'){const bk=st.b||[];const mastered=st.m||[];if(bkscope==='pending'){l=Q.filter(q=>bk.includes(q.id)&&!mastered.includes(q.id));if(bkr===3){const r2=(st.br&&st.br.r2)||{};l=l.filter(q=>r2[q.id]===false)}}else if(bkscope==='mastered'){l=Q.filter(q=>mastered.includes(q.id))}else{l=Q.filter(q=>bk.includes(q.id))}}else if(topicNames[m])l=Q.filter(q=>topicOf(q)===m);else l=Q;if(qtype)l=l.filter(q=>q.t===qtype);if(shuf&&l.length){const roundKey='r'+bkr;const rd=(st.br&&st.br[roundKey])||{};const done=new Set(Object.keys(rd));if(shufList)shufList=shufList.filter(q=>!done.has(String(q.id)));const left=l.filter(q=>!done.has(String(q.id)));if(!left.length){shuf=false;shufList=null;const sb=document.getElementById('shufBtn');if(sb){sb.classList.toggle('act',false);sb.textContent='🔀 随机'}alert('随机池已全部刷完 🎉');return l}if(!shufList||shufList.length===0){const s=[...left];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]]}shufList=s}return shufList}shufList=null;return l}
function sv(){localStorage.setItem('qz',JSON.stringify({h:st.h,w:st.w,b:st.b,n:st.n||{},i:st.i,br:st.br,m:st.m}));ui()}
function exRec(){
const byId=new Map(Q.map(q=>[q.id,q]));
const answered=st.h.map(h=>{const q=byId.get(h.id);return {id:h.id,question:q?q.q:'',type:q?q.t:'',answer:q?q.a:'',yourAnswer:h.sel,correct:h.cr,answeredAt:h.t,note:(st.n||{})[h.id]||''}});
const pick=ids=>(ids||[]).map(id=>{const q=byId.get(id);return q?{id:q.id,question:q.q,type:q.t,answer:q.a,note:(st.n||{})[q.id]||''}:null}).filter(Boolean);
const report={exportedAt:new Date().toISOString(),summary:{totalQuestions:Q.length,answered:st.h.length,correct:st.h.filter(h=>h.cr).length,wrong:(st.w||[]).length,bookmarked:(st.b||[]).length,mastered:(st.m||[]).length,round2progress:Object.keys((st.br||{}).r2||{}).length,round3progress:Object.keys((st.br||{}).r3||{}).length},answered,wrongQuestions:pick(st.w),bookmarkedQuestions:pick(st.b)};
const blob=new Blob([JSON.stringify(report,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='人工智能训练师5级_学习记录.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
function ui(){}
function rn(){const l=qs();if(!l.length){document.querySelector('.card').innerHTML='<p style="text-align:center;padding:40px;color:#94a3b8;">'+(m==='bookmark'&&bkscope==='pending'?'本轮已全部刷完 🎉':'暂无题目')+'</p>';return}
if(ci>=l.length)ci=l.length-1;const q=l[ci];let prefix='';if(m==='bookmark'){const rnLabels={2:'二轮复刷',3:'三轮复刷'};prefix=(rnLabels[bkr]||'复刷')+' · '}else if(topicNames[m])prefix=topicNames[m]+' · ';
document.getElementById('qi').textContent=prefix+'第 '+(ci+1)+' 题';
const wcnt=st.h.filter(h=>h.id===q.id&&!h.c).length;
if(wcnt)document.getElementById('qi').textContent+=' (错过'+wcnt+'次)';const qt=document.getElementById('qt');if(q.t==='s'){qt.textContent='单选题';qt.className='qt s'}else if(q.t==='m'){qt.textContent='多选题';qt.className='qt m'}else{qt.textContent='判断题';qt.className='qt j'}
document.getElementById('q').textContent=q.q;document.getElementById('op').innerHTML=q.o.map((o,i)=>'<div class="op" data-i='+i+' onclick="sl('+i+')">'+o+'</div>').join('');const bb=document.getElementById('bkb');bb.textContent=(st.b||[]).includes(q.id)?'★ 已收藏':'☆ 收藏';bb.className='bkb'+((st.b||[]).includes(q.id)?' act':'')
document.getElementById('res').className='res';document.getElementById('sb').style.display='block';document.getElementById('sb').disabled=true;document.getElementById('nx').style.display='none';ad=false;const nn=document.getElementById('ntg');const na=document.getElementById('nta');const nt=st.n||{};na.value=nt[q.id]||'';na.classList.remove('show');nn.className=nt[q.id]?'ntg has':'ntg';nn.textContent=nt[q.id]?'📝 已有笔记':'📝 笔记';
const mtBtn=document.getElementById('mtBtn');if(mtBtn){mtBtn.style.display=m==='bookmark'?'inline-block':'none';mtBtn.textContent=(st.m||[]).includes(q.id)?'✅ 已掌握':'✅ 标为掌握';mtBtn.className=(st.m||[]).includes(q.id)?'bkb act':''}
const rt2=document.getElementById('rt2Btn');if(rt2){rt2.style.display=m!=='bookmark'?'inline-block':'none';const b2=st.b||[];const m2=st.m||[];if(b2.includes(q.id)&&!m2.includes(q.id)){rt2.textContent='📋 已在复刷列表';rt2.style.opacity='0.55'}else{rt2.textContent='📋 加入二轮';rt2.style.opacity='1'}}
const rt3=document.getElementById('rt3Btn');if(rt3){if(m==='bookmark'){rt3.style.display=bkr===2?'inline-block':'none'}else{const b3=st.b||[];const m3=st.m||[];const r2=(st.br&&st.br.r2)||{};const inR3=b3.includes(q.id)&&r2[q.id]===false&&!m3.includes(q.id);rt3.style.display='inline-block';if(inR3){rt3.textContent='📋 已在三轮列表';rt3.style.opacity='0.55'}else{rt3.textContent='📋 加入三轮';rt3.style.opacity='1'}}}
document.getElementById('pr').textContent=(ci+1)+' / '+l.length;pa();document.getElementById('pv').disabled=ci===0;document.getElementById('nv').disabled=ci>=l.length-1}
function sl(i){if(ad)return;const q=qs()[ci];if(q.t==='m'){document.querySelectorAll('.op')[i].classList.toggle('sel')}else{document.querySelectorAll('.op').forEach(o=>o.classList.remove('sel'));document.querySelectorAll('.op')[i].classList.add('sel')}
document.getElementById('sb').disabled=false}
function sub(){const q=qs()[ci];if(!q||ad)return;const sel=[...document.querySelectorAll('.op.sel')].map(o=>String.fromCharCode(65+parseInt(o.dataset.i)));if(!sel.length)return;ad=true
let cr;if(q.t==='m'){const aa=Array.isArray(q.a)?[...q.a].sort():[q.a];cr=JSON.stringify([...sel].sort())===JSON.stringify(aa)}else{cr=sel[0]===q.a}
const res=document.getElementById('res');const rt=document.getElementById('rt');const ex=document.getElementById('ex');if(cr){res.className='res c';rt.textContent='回答正确!'}else{res.className='res w';if(m==='bookmark'&&bkscope==='daily'&&!cr){res.innerHTML+='<div style="margin-top:8px;font-size:13px">⚠️ 已自动加入三轮待复刷</div>'};rt.textContent='错误。正确答案:'+(Array.isArray(q.a)?q.a.join(', '):q.a)}
ex.textContent=q.e||'';document.querySelectorAll('.op').forEach((o,i)=>{const l=String.fromCharCode(65+i);if(Array.isArray(q.a)?q.a.includes(l):l===q.a)o.classList.add('c');if(sel.includes(l)&&!(Array.isArray(q.a)?q.a.includes(l):l===q.a))o.classList.add('w')})
if(m==='bookmark'&&bkscope==='daily'&&!cr){const r2k=((st.br||{}).r2||{});r2k[q.id]=false;if(!st.br)st.br={round:bkr,r2:{},r3:{}};st.br.r2=r2k}st.h.push({id:q.id,sel,cr,t:Date.now()});if(!cr&&!st.w.includes(q.id))st.w.push(q.id);
if(m==='bookmark'){if(!st.br)st.br={round:bkr,r2:{},r3:{}};const roundKey='r'+bkr;if(!st.br[roundKey])st.br[roundKey]={};st.br[roundKey][q.id]=cr;st.br.round=bkr}
sv();document.getElementById('sb').style.display='none';const canGoNext=ci<qs().length-1;document.getElementById('nx').style.display=canGoNext?'block':'none';document.getElementById('nv').disabled=!canGoNext;pa()}
function nx(){const l=qs();if(ci<l.length-1){ci++;rn()}else{document.getElementById('nx').style.display='none';document.getElementById('nv').disabled=true}}
function pv(){if(ci>0){ci--;rn()}}
function tBk(){const q=qs()[ci];if(!q)return;if(!st.b)st.b=[];const idx=st.b.indexOf(q.id);if(idx>=0)st.b.splice(idx,1);else st.b.push(q.id);sv();rn()}
function tMaster(){const q=qs()[ci];if(!q)return;if(!st.m)st.m=[];const idx=st.m.indexOf(q.id);if(idx>=0)st.m.splice(idx,1);else st.m.push(q.id);sv();rn()}
