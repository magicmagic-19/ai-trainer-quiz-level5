2\u5ea6\u8d8a\u7ec6\u8d8a\u597d,\u8981\u5c3d\u53ef\u80fd\u8986\u76d6\u4e00\u79cd\u53ef\u80fd\u6027\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "B", "e": "\u6570\u636e\u6807\u6ce8\u9897\u7c92\u5ea6\u5e76\u975e\u8d8a\u7ec6\u8d8a\u597d\u3002\u9897\u7c92\u5ea6\u5e94\u6839\u636e\u4efb\u52a1\u9700\u6c42\u3001\u6807\u6ce8\u6210\u672c\u548c\u6a21\u578b\u6548\u679c\u7efc\u5408\u786e\u5b9a\uff1b\u8fc7\u7ec6\u53ef\u80fd\u589e\u52a0\u6807\u6ce8\u6210\u672c\u548c\u4e0d\u5fc5\u8981\u566a\u58f0\u3002\u9898\u5e72\u8bf4\"\u5c3d\u53ef\u80fd\u8986\u76d6\u4e00\u79cd\u53ef\u80fd\u6027\"\u592a\u7edd\u5bf9\uff0c\u5224\u9519\u8bef\u3002"}, {"id": 1007, "t": "j", "q": "\u6570\u636e\u6807\u7b7e\u7684\u590d\u6742\u6027\u51b3\u5b9a\u4e86\u4eba\u5de5\u667a\u80fd\u7b97\u6cd5\u7684\u6709\u6548\u6027\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "B", "e": "\u9519\u8bef\u3002\u51b3\u5b9a\u6a21\u578b\u6548\u679c\u7684\uff0c\u4e0d\u662f\u6807\u7b7e\u5f62\u5f0f\u6709\u591a\u590d\u6742\uff0c\u800c\u662f\u4e09\u4ef6\u4e8b\uff1a\u2460\u6807\u6ce8\u7cbe\u5ea6\uff1a\u6846\u6709\u6ca1\u6709\u521a\u597d\u8d34\u7d27\u76ee\u6807\u8fb9\u7f18\uff1f\u7c7b\u522b\u4eba\u540d\u5730\u540d\u6709\u6ca1\u6709\u6807\u9519\uff1f\u2461\u6807\u6ce8\u4e00\u81f4\u6027\uff1a\u540c\u4e00\u5f20\u56fe\u7ed9\u4e09\u4e2a\u6807\u6ce8\u5458\uff0c\u6807\u6ce8\u7ed3\u679c\u662f\u5426\u4e00\u81f4\uff1f\u4e0d\u4e00\u81f4\u8bf4\u660e\u89c4\u5219\u4e0d\u6e05\u6670\u3002\u2462\u6807\u6ce8\u91cf\uff1a\u8db3\u591f\u8986\u76d6\u5404\u79cd\u573a\u666f\u53d8\u4f53\u3002\u4e3e\u53cd\u4f8b\uff1a\u4e00\u4e2a\u7b80\u5355\u4e8c\u5206\u7c7b\u6807\u7b7e\uff08\u5783\u573e\u90ae\u4ef6/\u6b63\u5e38\u90ae\u4ef6\uff09\u53ea\u8981\u6807\u5f97\u7cbe\u51c6\uff0c\u6a21\u578b\u6548\u679c\u8fdc\u597d\u4e8e\u590d\u6742\u7684\u591a\u5c42\u7ea7\u60c5\u611f\u6807\u7b7e\u4f46\u6807\u5f97\u4e00\u584c\u7cca\u6d82\u3002\u9898\u5e72\u628a'\u6807\u7b7e\u590d\u6742\u5ea6'\u548c'\u6a21\u578b\u6709\u6548\u6027'\u76f4\u63a5\u6302\u94a9\uff0c\u72af\u4e86\u5f52\u56e0\u9519\u8bef\u3002"}, {"id": 1008, "t": "j", "q": "\u534a\u76d1\u7763\u5b66\u4e60\u5219\u662f\u76d1\u7763\u5b66\u4e60\u4e0e\u65e0\u76d1\u7763\u5b66\u4e60\u76f8\u7ed3\u5408\u7684\u4e00\u79cd\u6df1\u5ea6\u5b66\u4e60\u65b9\u5f0f,\u5b83\u4e3b\u8981\u4f7f\u7528\u5927\u91cf\u7684\u672a\u6807\u8bb0\u6570\u636e\u8fdb\u884c\u6a21\u578b\u8bad\u7ec3\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "A", "e": "\u6b63\u786e\u3002\u534a\u76d1\u7763\u5b66\u4e60\u7684\u5178\u578b\u5de5\u4f5c\u65b9\u5f0f\uff1a\u5047\u8bbe\u4f60\u6709 1000 \u5f20\u56fe\uff0c\u5176\u4e2d\u53ea\u6709 100 \u5f20\u6709\u4eba\u5de5\u6807\u6ce8\u6807\u7b7e\uff0c\u5269\u4e0b 900 \u5f20\u6ca1\u6709\u6807\u7b7e\u3002\u5148\u62ff 100 \u5f20\u6709\u6807\u7b7e\u7684\u8bad\u7ec3\u4e00\u4e2a\u521d\u59cb\u6a21\u578b\uff1b\u7136\u540e\u8ba9\u8fd9\u4e2a\u6a21\u578b\u5bf9 900 \u5f20\u65e0\u6807\u7b7e\u6570\u636e\u505a\u9884\u6d4b\uff0c\u6311\u51fa\u9884\u6d4b\u7f6e\u4fe1\u5ea6\u9ad8\u7684\u6837\u672c\uff0c\u628a\u9884\u6d4b\u7ed3\u679c\u5f53'\u4f2a\u6807\u7b7e'\u52a0\u5165\u8bad\u7ec3\u96c6\uff0c\u53cd\u590d\u8fed\u4ee3\u3002\u8fd9\u4e2a\u8fc7\u7a0b\u65e2\u6709\u76d1\u7763\uff08\u6709\u6807\u7b7e\u6307\u5bfc\u65b9\u5411\uff09\u53c8\u6709\u65e0\u76d1\u7763\uff08\u5229\u7528\u65e0\u6807\u7b7e\u6570\u636e\u7684\u5185\u5728\u7ed3\u6784\uff09\uff0c\u6240\u4ee5\u9898\u5e72\u63cf\u8ff0\u6b63\u786e\u3002"}, {"id": 1009, "t": "j", "q": "\u65e0\u76d1\u7763\u5b66\u4e60\u4e3b\u8981\u9488\u5bf9\u6ca1\u6709\u6807\u6ce8\u6570\u636e\u96c6\u7684\u573a\u666f,\u901a\u8fc7\u67d0\u79cd\u65b9\u6cd5(\u5982\u56de\u62a5\u51fd\u6570)\u6765\u5224\u65ad\u7b97\u6cd5\u662f\u5426\u8d8a\u6765\u8d8a\u63a5\u8fd1\u76ee\u6807\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "B", "e": "\u9519\u8bef\u3002\u8fd9\u9053\u9898\u7684\u9677\u9631\u8bcd\u662f'\u56de\u62a5\u51fd\u6570'\u2014\u2014\u5b83\u662f\u5f3a\u5316\u5b66\u4e60\u7684\u4e13\u5c5e\u6982\u5ff5\uff0c\u4e0d\u662f\u65e0\u76d1\u7763\u5b66\u4e60\u3002\u533a\u5206\u4e09\u79cd\u5b66\u4e60\u8303\u5f0f\uff1a\u76d1\u7763\u5b66\u4e60\uff1a\u7ed9\u6a21\u578b\u9898\u76ee+\u6807\u51c6\u7b54\u6848\uff0c\u8ba9\u5b83\u5b66\u4f1a\u7b54\u9898\uff08\u5982\u5206\u7c7b\u3001\u56de\u5f52\uff09\u3002\u65e0\u76d1\u7763\u5b66\u4e60\uff1a\u53ea\u7ed9\u6a21\u578b\u4e00\u5806\u6570\u636e\uff0c\u4e0d\u7ed9\u7b54\u6848\uff0c\u8ba9\u5b83\u81ea\u5df1\u53d1\u73b0\u7ed3\u6784\uff08\u805a\u7c7b\u628a\u76f8\u4f3c\u6837\u672c\u5206\u4e00\u7ec4\uff0c\u964d\u7ef4\u538b\u7f29\u7279\u5f81\u7ef4\u5ea6\uff09\u3002\u5f3a\u5316\u5b66\u4e60\uff1a\u8ba9\u667a\u80fd\u4f53\u5728\u73af\u5883\u4e2d\u4e0d\u65ad\u8bd5\u9519\uff0c\u73af\u5883\u7ed9\u5956\u52b1/\u60e9\u7f5a\u4fe1\u53f7\uff08\u56de\u62a5\u51fd\u6570\uff09\uff0c\u667a\u80fd\u4f53\u81ea\u5df1\u63a2\u7d22\u6700\u4f18\u7b56\u7565\u3002\u9898\u5e72\u63cf\u8ff0\u7684\u662f\u5f3a\u5316\u5b66\u4e60\uff0c\u5374\u5b89\u5728\u65e0\u76d1\u7763\u5b66\u4e60\u5934\u4e0a\u2014\u2014\u72f8\u732b\u6362\u592a\u5b50\uff0c\u5224\u9519\u8bef\u3002"}, {"id": 1010, "t": "j", "q": "\u6240\u8c13\u804c\u4e1a\u9053\u5fb7,\u5c31\u662f\u4e0e\u804c\u4e1a\u6d3b\u52a8\u7d27\u5bc6\u8054\u7cfb\u7684\u7b26\u5408\u804c\u4e1a\u7279\u70b9\u8981\u6c42\u7684\u9053\u5fb7\u51c6\u5219\u3001\u9053\u5fb7\u60c5\u64cd\u4e0e\u9053\u5fb7\u54c1\u8d28\u7684\u603b\u548c\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "A", "e": "\u804c\u4e1a\u9053\u5fb7\u7684\u5b9a\u4e49\u6b63\u662f\uff1a\u4e0e\u804c\u4e1a\u6d3b\u52a8\u7d27\u5bc6\u8054\u7cfb\uff0c\u7b26\u5408\u804c\u4e1a\u7279\u70b9\u8981\u6c42\u7684\u9053\u5fb7\u51c6\u5219\u3001\u9053\u5fb7\u60c5\u64cd\u4e0e\u9053\u5fb7\u54c1\u8d28\u7684\u603b\u548c\u3002\u9898\u5e72\u662f\u6807\u51c6\u5b9a\u4e49\uff0c\u5224\u6b63\u786e\u3002"}, {"id": 1011, "t": "j", "q": "\u52b3\u52a8\u5408\u540c\u6cd5\u662f\u8c03\u6574\u52b3\u52a8\u5173\u7cfb\u6700\u91cd\u8981\u7684\u6cd5\u5f8b,\u662f\u52b3\u52a8\u6cd5\u5f8b\u4f53\u7cfb\u7684\u6838\u5fc3\u3002", "o": ["A. \u6b63\u786e", "B. \u9519\u8bef"], "a": "A", "e": "\u300a\u52b3\u
