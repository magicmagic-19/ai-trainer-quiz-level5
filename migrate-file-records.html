<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>迁移刷题记录</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f8fafc;color:#0f172a}
    main{max-width:760px;margin:40px auto;padding:24px}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    h1{font-size:24px;margin:0 0 12px}
    p{line-height:1.7;color:#475569}
    button,a.btn{display:inline-flex;align-items:center;justify-content:center;margin:8px 8px 0 0;padding:10px 14px;border-radius:6px;border:1px solid #2563eb;background:#2563eb;color:#fff;text-decoration:none;font-size:15px;cursor:pointer}
    button.secondary{background:#fff;color:#2563eb}
    button:disabled{opacity:.45;cursor:not-allowed}
    .ok{color:#047857}
    .bad{color:#b91c1c}
    .muted{color:#64748b}
    .step{background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:14px;margin:10px 0}
    .step h3{margin:0 0 6px;font-size:15px}
  </style>
</head>
<body>
  <main>
    <div class="box">
      <h1>迁移旧刷题记录</h1>
      <p id="status" class="muted">正在读取旧记录...</p>
      <div id="steps" style="display:none">
        <div class="step">
          <h3>步骤 1：复制记录</h3>
          <button id="copyBtn">📋 复制记录到剪贴板</button>
          <span id="copyOk" class="ok" style="display:none;margin-left:8px">✅ 已复制！</span>
        </div>
        <div class="step">
          <h3>步骤 2：去导入</h3>
          <p>点击下方按钮，在新页面粘贴并导入。</p>
          <button id="goBtn">前往导入页 →</button>
        </div>
      </div>
      <p class="muted" style="margin-top:16px">先双击 start.command 启动服务，再操作本页面。</p>
    </div>
  </main>
  <script>
    const raw = localStorage.getItem('qz') || '';
    const statusEl = document.getElementById('status');
    const stepsEl = document.getElementById('steps');
    const copyBtn = document.getElementById('copyBtn');
    const copyOk = document.getElementById('copyOk');
    const goBtn = document.getElementById('goBtn');

    if (raw) {
      try {
        const data = JSON.parse(raw);
        const h = Array.isArray(data.h) ? data.h.length : 0;
        const w = Array.isArray(data.w) ? data.w.length : 0;
        const b = Array.isArray(data.b) ? data.b.length : 0;
        const n = data.n && typeof data.n === 'object' ? Object.keys(data.n).length : 0;
        statusEl.textContent = `找到旧记录：答题 ${h} 条，错题 ${w} 道，收藏 ${b} 道，笔记 ${n} 条`;
        statusEl.className = 'ok';
        stepsEl.style.display = 'block';
      } catch(e) {
        statusEl.textContent = '读取到了记录但格式异常，仍可尝试迁移。';
        statusEl.className = 'bad';
        stepsEl.style.display = 'block';
      }
    } else {
      statusEl.textContent = '没有在这个打开方式下找到旧记录。如果你之前是用 start.command 打开的，记录应该已经在正确位置了。';
      statusEl.className = 'bad';
      goBtn.textContent = '直接打开刷题页 →';
      goBtn.onclick = function(){ location.href = 'http://127.0.0.1:5177/'; };
      stepsEl.style.display = 'block';
      copyBtn.style.display = 'none';
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(raw);
        copyOk.style.display = 'inline';
        copyBtn.textContent = '✅ 已复制';
      } catch(e) {
        fallbackCopy(raw);
      }
    });

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyOk.style.display = 'inline';
      copyBtn.textContent = '✅ 已复制';
    }

    goBtn.addEventListener('click', () => {
      location.href = 'http://127.0.0.1:5177/import-records.html';
    });
  </script>
</body>
</html>
